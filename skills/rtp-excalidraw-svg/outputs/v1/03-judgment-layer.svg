  <text x="600" y="598" text-anchor="middle" fill="#6D28D9" font-size="16" font-weight="700" font-family="Inter, sans-serif">Why this layer matters</text>
  <text x="600" y="622" text-anchor="middle" fill="#78716C" font-size="14" font-family="Inter, sans-serif">Layer 1 asks "should we?" Layer 2 answers "how exactly?" — autonomy levels, moats, eval methods, safety constraints. The hard calls.</text>

