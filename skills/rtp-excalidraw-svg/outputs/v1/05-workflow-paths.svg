<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" width="1200" height="740">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="1200" height="740" rx="16" fill="#FAFAF8"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" rx="16" fill="#FFF7ED"/>
  <rect x="0" y="60" width="1200" height="20" fill="#FFF7ED"/>
  <text x="600" y="36" text-anchor="middle" fill="#C2410C" font-size="28" font-weight="800" font-family="Inter, Segoe UI, sans-serif">6 Workflow Paths</text>
  <text x="600" y="62" text-anchor="middle" fill="#5F6B7A" font-size="15" font-family="Inter, sans-serif">Quick Check — Executive Summary · Different situations need different subsets of the 40-skill graph</text>

  <!-- Row 1: 3 workflows -->
  <!-- Workflow 1: New AI Feature -->
  <rect x="40" y="100" width="370" height="200" rx="16" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="2.5" filter="url(#s)"/>
  <rect x="40" y="100" width="370" height="48" rx="16" fill="#8B5CF6"/>
  <rect x="40" y="134" width="370" height="14" fill="#8B5CF6"/>
  <text x="225" y="131" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800" font-family="Inter, sans-serif">New AI Feature</text>
  <rect x="360" y="108" width="38" height="22" rx="11" fill="#EDE9FE"/>
  <text x="379" y="123" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="800" font-family="Inter, sans-serif">ALL</text>

  <text x="60" y="178" fill="#1B1B1F" font-size="15" font-weight="700" font-family="Inter, sans-serif">Full cycle: discover → strategize → spec → ship</text>
  <text x="60" y="200" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">Runs every layer. The PRD arrives with eval</text>
  <text x="60" y="218" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">gates, failure budgets, and cost models.</text>

  <rect x="56" y="236" width="90" height="24" rx="8" fill="#F0FDFA" stroke="#5EEAD4" stroke-width="1"/>
  <text x="101" y="253" text-anchor="middle" fill="#0D9488" font-size="10" font-weight="600" font-family="Inter, sans-serif">Thinking</text>
  <rect x="152" y="236" width="16" height="24" rx="4" fill="#FAFAF8"/>
  <text x="160" y="253" text-anchor="middle" fill="#9CA3AF" font-size="12" font-family="Inter, sans-serif">→</text>
  <rect x="174" y="236" width="100" height="24" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="224" y="253" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="600" font-family="Inter, sans-serif">Judgment</text>
  <rect x="280" y="236" width="16" height="24" rx="4" fill="#FAFAF8"/>
  <text x="288" y="253" text-anchor="middle" fill="#9CA3AF" font-size="12" font-family="Inter, sans-serif">→</text>
  <rect x="302" y="236" width="90" height="24" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="347" y="253" text-anchor="middle" fill="#B45309" font-size="10" font-weight="600" font-family="Inter, sans-serif">Craft</text>

  <text x="60" y="284" fill="#9CA3AF" font-size="11" font-family="Inter, sans-serif">Best for: greenfield AI products, major feature bets</text>

  <!-- Workflow 2: Discovery Sprint -->
  <rect x="425" y="100" width="370" height="200" rx="16" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2.5" filter="url(#s)"/>
  <rect x="425" y="100" width="370" height="48" rx="16" fill="#14B8A6"/>
  <rect x="425" y="134" width="370" height="14" fill="#14B8A6"/>
  <text x="610" y="131" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800" font-family="Inter, sans-serif">Discovery Sprint</text>
  <rect x="745" y="108" width="38" height="22" rx="11" fill="#CCFBF1"/>
  <text x="764" y="123" text-anchor="middle" fill="#0D9488" font-size="10" font-weight="800" font-family="Inter, sans-serif">30</text>

  <text x="445" y="178" fill="#1B1B1F" font-size="15" font-weight="700" font-family="Inter, sans-serif">Should we build this at all?</text>
  <text x="445" y="200" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">Skips craft layer. Kill conditions defined</text>
  <text x="445" y="218" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">before a single line of code.</text>

  <rect x="441" y="236" width="90" height="24" rx="8" fill="#F0FDFA" stroke="#5EEAD4" stroke-width="1"/>
  <text x="486" y="253" text-anchor="middle" fill="#0D9488" font-size="10" font-weight="600" font-family="Inter, sans-serif">Thinking</text>
  <rect x="537" y="236" width="16" height="24" rx="4" fill="#FAFAF8"/>
  <text x="545" y="253" text-anchor="middle" fill="#9CA3AF" font-size="12" font-family="Inter, sans-serif">→</text>
  <rect x="559" y="236" width="100" height="24" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="609" y="253" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="600" font-family="Inter, sans-serif">Judgment</text>
  <rect x="665" y="236" width="16" height="24" rx="4" fill="#FAFAF8"/>
  <text x="673" y="253" text-anchor="middle" fill="#9CA3AF" font-size="12" font-family="Inter, sans-serif">→</text>
  <rect x="687" y="236" width="90" height="24" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="732" y="253" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="600" font-family="Inter, sans-serif">Go / Kill</text>

  <text x="445" y="284" fill="#9CA3AF" font-size="11" font-family="Inter, sans-serif">Best for: validating ideas, avoiding expensive mistakes</text>

  <!-- Workflow 3: Strategy Review -->
  <rect x="810" y="100" width="370" height="200" rx="16" fill="#FFFFFF" stroke="#A855F7" stroke-width="2.5" filter="url(#s)"/>
  <rect x="810" y="100" width="370" height="48" rx="16" fill="#A855F7"/>
  <rect x="810" y="134" width="370" height="14" fill="#A855F7"/>
  <text x="995" y="131" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800" font-family="Inter, sans-serif">Quarterly Strategy Review</text>
  <rect x="1130" y="108" width="38" height="22" rx="11" fill="#F3E8FF"/>
  <text x="1149" y="123" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="800" font-family="Inter, sans-serif">35</text>

  <text x="830" y="178" fill="#1B1B1F" font-size="15" font-weight="700" font-family="Inter, sans-serif">Does your strategy still hold?</text>
  <text x="830" y="200" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">Heavy on strategy + capability tracking.</text>
  <text x="830" y="218" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">Are your moats decaying?</text>

  <rect x="826" y="236" width="120" height="24" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="886" y="253" text-anchor="middle" fill="#92400E" font-size="10" font-weight="600" font-family="Inter, sans-serif">capability-track</text>
  <rect x="952" y="236" width="100" height="24" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="1002" y="253" text-anchor="middle" fill="#92400E" font-size="10" font-weight="600" font-family="Inter, sans-serif">moat-finder</text>
  <rect x="1058" y="236" width="110" height="24" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="1113" y="253" text-anchor="middle" fill="#92400E" font-size="10" font-weight="600" font-family="Inter, sans-serif">competitive-map</text>

  <text x="830" y="284" fill="#9CA3AF" font-size="11" font-family="Inter, sans-serif">Best for: board prep, roadmap revalidation, pivots</text>

  <!-- Row 2: 3 workflows -->
  <!-- Workflow 4: Eval Ops Setup -->
  <rect x="40" y="320" width="370" height="200" rx="16" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2.5" filter="url(#s)"/>
  <rect x="40" y="320" width="370" height="48" rx="16" fill="#06B6D4"/>
  <rect x="40" y="354" width="370" height="14" fill="#06B6D4"/>
  <text x="225" y="351" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800" font-family="Inter, sans-serif">Eval Ops Setup</text>
  <rect x="360" y="328" width="38" height="22" rx="11" fill="#ECFEFF"/>
  <text x="379" y="343" text-anchor="middle" fill="#0E7490" font-size="10" font-weight="800" font-family="Inter, sans-serif">22</text>

  <text x="60" y="398" fill="#1B1B1F" font-size="15" font-weight="700" font-family="Inter, sans-serif">Evaluation from zero to production</text>
  <text x="60" y="420" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">Error analysis first, then automated evals,</text>
  <text x="60" y="438" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">then monitoring. Foundation for everything.</text>

  <rect x="56" y="456" width="115" height="24" rx="8" fill="#ECFEFF" stroke="#67E8F9" stroke-width="1"/>
  <text x="113" y="473" text-anchor="middle" fill="#0E7490" font-size="10" font-weight="600" font-family="Inter, sans-serif">eval-framework</text>
  <rect x="177" y="456" width="90" height="24" rx="8" fill="#ECFEFF" stroke="#67E8F9" stroke-width="1"/>
  <text x="222" y="473" text-anchor="middle" fill="#0E7490" font-size="10" font-weight="600" font-family="Inter, sans-serif">eval-driven</text>
  <rect x="273" y="456" width="120" height="24" rx="8" fill="#ECFEFF" stroke="#67E8F9" stroke-width="1"/>
  <text x="333" y="473" text-anchor="middle" fill="#0E7490" font-size="10" font-weight="600" font-family="Inter, sans-serif">prod-observability</text>

  <text x="60" y="504" fill="#9CA3AF" font-size="11" font-family="Inter, sans-serif">Best for: teams shipping their first AI feature</text>

  <!-- Workflow 5: Agent Launch -->
  <rect x="425" y="320" width="370" height="200" rx="16" fill="#FFFFFF" stroke="#EC4899" stroke-width="2.5" filter="url(#s)"/>
  <rect x="425" y="320" width="370" height="48" rx="16" fill="#EC4899"/>
  <rect x="425" y="354" width="370" height="14" fill="#EC4899"/>
  <text x="610" y="351" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800" font-family="Inter, sans-serif">Agent Launch Checklist</text>
  <rect x="745" y="328" width="38" height="22" rx="11" fill="#FCE7F3"/>
  <text x="764" y="343" text-anchor="middle" fill="#9D174D" font-size="10" font-weight="800" font-family="Inter, sans-serif">24</text>

  <text x="445" y="398" fill="#1B1B1F" font-size="15" font-weight="700" font-family="Inter, sans-serif">Ship an autonomous AI feature safely</text>
  <text x="445" y="420" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">Trust ladder, tool permissions, harness</text>
  <text x="445" y="438" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">design, safety constraints, then ship.</text>

  <rect x="441" y="456" width="140" height="24" rx="8" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="511" y="473" text-anchor="middle" fill="#9D174D" font-size="10" font-weight="600" font-family="Inter, sans-serif">autonomy-spectrum</text>
  <rect x="587" y="456" width="120" height="24" rx="8" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="647" y="473" text-anchor="middle" fill="#9D174D" font-size="10" font-weight="600" font-family="Inter, sans-serif">safety-by-design</text>
  <rect x="713" y="456" width="70" height="24" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="748" y="473" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="600" font-family="Inter, sans-serif">ship</text>

  <text x="445" y="504" fill="#9CA3AF" font-size="11" font-family="Inter, sans-serif">Best for: copilots, assistants, autonomous agents</text>

  <!-- Workflow 6: Incident Response -->
  <rect x="810" y="320" width="370" height="200" rx="16" fill="#FFFFFF" stroke="#EF4444" stroke-width="2.5" filter="url(#s)"/>
  <rect x="810" y="320" width="370" height="48" rx="16" fill="#EF4444"/>
  <rect x="810" y="354" width="370" height="14" fill="#EF4444"/>
  <text x="995" y="351" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800" font-family="Inter, sans-serif">AI Incident Response</text>
  <rect x="1130" y="328" width="38" height="22" rx="11" fill="#FEF2F2"/>
  <text x="1149" y="343" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="800" font-family="Inter, sans-serif">25</text>

  <text x="830" y="398" fill="#1B1B1F" font-size="15" font-weight="700" font-family="Inter, sans-serif">Your AI broke in production. Now what?</text>
  <text x="830" y="420" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">Triage: model issue, data issue, or system?</text>
  <text x="830" y="438" fill="#5F6B7A" font-size="13" font-family="Inter, sans-serif">Rollback, communicate, post-mortem.</text>

  <rect x="826" y="456" width="130" height="24" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="891" y="473" text-anchor="middle" fill="#991B1B" font-size="10" font-weight="600" font-family="Inter, sans-serif">prod-observability</text>
  <rect x="962" y="456" width="110" height="24" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="1017" y="473" text-anchor="middle" fill="#991B1B" font-size="10" font-weight="600" font-family="Inter, sans-serif">failure-modes</text>
  <rect x="1078" y="456" width="90" height="24" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="1123" y="473" text-anchor="middle" fill="#991B1B" font-size="10" font-weight="600" font-family="Inter, sans-serif">stress-test</text>

  <text x="830" y="504" fill="#9CA3AF" font-size="11" font-family="Inter, sans-serif">Best for: 2 AM pages, model regressions, data drift</text>

  <!-- How to choose callout -->
  <rect x="100" y="548" width="1000" height="100" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#s)"/>
  <text x="600" y="578" text-anchor="middle" fill="#1B1B1F" font-size="17" font-weight="800" font-family="Inter, sans-serif">How to choose your path</text>
  <text x="600" y="602" text-anchor="middle" fill="#5F6B7A" font-size="14" font-family="Inter, sans-serif">Building something new? → New AI Feature. Not sure if you should? → Discovery Sprint.</text>
  <text x="600" y="622" text-anchor="middle" fill="#5F6B7A" font-size="14" font-family="Inter, sans-serif">Checking your bets? → Strategy Review. Setting up quality? → Eval Ops. Shipping agents? → Agent Launch. On fire? → Incident.</text>

  <!-- Footer -->
  <text x="600" y="688" text-anchor="middle" fill="#9CA3AF" font-size="12" font-family="Inter, sans-serif">Ravi's AI Product Mind · 6 Workflow Orchestrations</text>
</svg>