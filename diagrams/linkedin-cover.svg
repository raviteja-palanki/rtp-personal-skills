<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" role="img" aria-label="Think. Judge. Ship. AI Product Manager.">
  <title>Think. Judge. Ship.</title>
  <defs>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9478B8"/>
      <stop offset="50%" stop-color="#5B92B8"/>
      <stop offset="100%" stop-color="#6BA08A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#FAFAF8"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1584" height="4" fill="url(#bar)"/>

  <!-- Three words — large, bold, colored, mobile-readable -->
  <text x="690" y="190" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="72" font-weight="800" fill="#9478B8" letter-spacing="-2">Think</text>
  <circle cx="810" cy="172" r="5" fill="#D0CCC8"/>
  <text x="930" y="190" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="72" font-weight="800" fill="#5B92B8" letter-spacing="-2">Judge</text>
  <circle cx="1050" cy="172" r="5" fill="#D0CCC8"/>
  <text x="1170" y="190" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="72" font-weight="800" fill="#6BA08A" letter-spacing="-2">Ship</text>

  <!-- Subtitle -->
  <text x="930" y="250" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="500" fill="#5F6B7A" letter-spacing="6">AI PRODUCT MANAGER</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="392" width="1584" height="4" fill="url(#bar)" opacity="0.3"/>
</svg>