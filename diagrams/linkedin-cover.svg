<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" role="img" aria-label="Think. Judge. Ship. AI Product Manager.">
  <title>Think · Judge · Ship</title>

  <!-- Background: clean white -->
  <rect width="1584" height="396" fill="#FFFFFF"/>

  <!-- ═══ TOP RAINBOW BAR — 5 segments ═══ -->
  <rect x="0" y="0" width="317" height="6" fill="#8B5CF6"/>
  <rect x="317" y="0" width="317" height="6" fill="#14B8A6"/>
  <rect x="634" y="0" width="316" height="6" fill="#06B6D4"/>
  <rect x="950" y="0" width="317" height="6" fill="#F59E0B"/>
  <rect x="1267" y="0" width="317" height="6" fill="#EC4899"/>

  <!-- ═══ THREE WORDS: bold black, centered in safe zone ═══ -->

  <!-- "Think" with small purple accent circle -->
  <circle cx="555" cy="128" r="6" fill="#8B5CF6"/>
  <text x="600" y="170" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="62" font-weight="800" fill="#1B1B1F">Think</text>
  <rect x="540" y="184" width="120" height="5" rx="2.5" fill="#8B5CF6" opacity="0.35"/>

  <!-- Separator dot -->
  <circle cx="710" cy="155" r="4" fill="#D1D5DB"/>

  <!-- "Judge" with small teal accent circle -->
  <circle cx="755" cy="128" r="6" fill="#14B8A6"/>
  <text x="800" y="170" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="62" font-weight="800" fill="#1B1B1F">Judge</text>
  <rect x="737" y="184" width="126" height="5" rx="2.5" fill="#14B8A6" opacity="0.35"/>

  <!-- Separator dot -->
  <circle cx="913" cy="155" r="4" fill="#D1D5DB"/>

  <!-- "Ship" with small amber accent circle -->
  <circle cx="953" cy="128" r="6" fill="#F59E0B"/>
  <text x="993" y="170" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="62" font-weight="800" fill="#1B1B1F">Ship</text>
  <rect x="938" y="184" width="110" height="5" rx="2.5" fill="#F59E0B" opacity="0.35"/>

  <!-- ═══ SUBTITLE ═══ -->
  <text x="800" y="232" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="500" fill="#6B7280" letter-spacing="4">AI PRODUCT MANAGER</text>

  <!-- ═══ BOTTOM RAINBOW BAR — subtle mirror ═══ -->
  <rect x="0" y="390" width="317" height="6" fill="#8B5CF6" opacity="0.20"/>
  <rect x="317" y="390" width="317" height="6" fill="#14B8A6" opacity="0.20"/>
  <rect x="634" y="390" width="316" height="6" fill="#06B6D4" opacity="0.20"/>
  <rect x="950" y="390" width="317" height="6" fill="#F59E0B" opacity="0.20"/>
  <rect x="1267" y="390" width="317" height="6" fill="#EC4899" opacity="0.20"/>
</svg>
