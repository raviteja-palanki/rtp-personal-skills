<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" width="1200" height="920">

  <!-- Background -->
  <rect width="1200" height="920" fill="#FAFAF8"/>

  <!-- Header Band -->
  <rect x="0" y="0" width="1200" height="74" fill="#F8F6FF" rx="0"/>
  <line x1="0" y1="74" x2="1200" y2="74" stroke="#EDE9FE" stroke-width="1"/>
  <text x="600" y="38" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#5B21B6">What Actually Happens</text>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="500" fill="#4B5563">A Real Problem, Start to Finish</text>

  <!-- ===================== VERTICAL TIMELINE ===================== -->
  <line x1="56" y1="100" x2="56" y2="800" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>

  <!-- Step 1 node -->
  <circle cx="56" cy="120" r="14" fill="#FAFAF8" stroke="#9CA3AF" stroke-width="2"/>
  <text x="56" y="124" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#6B7280">1</text>

  <!-- Step 2 node -->
  <circle cx="56" cy="228" r="14" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="56" y="232" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6">2</text>

  <!-- Step 3 node -->
  <circle cx="56" cy="400" r="14" fill="#F0FDFA" stroke="#14B8A6" stroke-width="2"/>
  <text x="56" y="404" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#14B8A6">3</text>

  <!-- PAR badge (40x18, 11px text, next to Step 3 node) -->
  <rect x="76" y="391" width="40" height="18" rx="4" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1"/>
  <text x="96" y="403" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#14B8A6" letter-spacing="0.5">PAR</text>

  <!-- Step 4 node -->
  <circle cx="56" cy="638" r="14" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="56" y="642" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6">4</text>

  <!-- Step 5 node -->
  <circle cx="56" cy="774" r="14" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <text x="56" y="778" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#16A34A">5</text>

  <!-- ===================== STEP 1 -- THE INPUT ===================== -->
  <!-- Card shadow -->
  <rect x="96" y="96" width="990" height="78" rx="8" fill="#D4D2D8" opacity="0.3"/>
  <!-- Card body -->
  <rect x="94" y="93" width="990" height="78" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Left border bar -->
  <rect x="94" y="97" width="4" height="70" rx="2" fill="#9CA3AF"/>

  <!-- Quote treatment (opening decorative quote only, text ends naturally) -->
  <text x="114" y="116" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1F2937">The Ask</text>
  <text x="114" y="140" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="300" fill="#9CA3AF">"</text>
  <text x="128" y="140" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563" font-style="italic">We want AI in our enterprise app. Can we build an agent that gives users faster insights?</text>
  <text x="114" y="160" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF" letter-spacing="0.5">-- STAKEHOLDER REQUEST, MONDAY MORNING</text>

  <!-- VAGUE REQUEST badge (120px wide) -->
  <rect x="952" y="104" width="120" height="24" rx="12" fill="#FEF2F2"/>
  <text x="1012" y="120" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#DC2626" letter-spacing="0.3">VAGUE REQUEST</text>

  <!-- Arrow 1 to 2 -->
  <path d="M 590,173 C 592,180 588,188 590,196" stroke="#B0B8C4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="584,193 590,204 596,193" fill="#B0B8C4"/>

  <!-- ===================== STEP 2 -- ORCHESTRATOR CLASSIFIES ===================== -->
  <!-- Card shadow -->
  <rect x="96" y="210" width="990" height="108" rx="8" fill="#C4B5E0" opacity="0.25"/>
  <!-- Card body -->
  <rect x="94" y="207" width="990" height="108" rx="8" fill="#FFFFFF" stroke="#EDE9FE" stroke-width="1"/>
  <!-- Left border bar -->
  <rect x="94" y="211" width="4" height="100" rx="2" fill="#8B5CF6"/>

  <text x="114" y="234" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1F2937">The Brain Reads the Situation</text>
  <text x="114" y="258" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">Deep thinking mode. Before touching solutions, the orchestrator identifies what's actually</text>
  <text x="114" y="276" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">being asked: What decisions do users make? What data exists? What's the cost of a wrong</text>
  <text x="114" y="294" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">answer? What autonomy level does this deserve?</text>

  <!-- ORCHESTRATOR badge (120px wide) -->
  <rect x="952" y="218" width="120" height="24" rx="12" fill="#EDE9FE"/>
  <text x="1012" y="234" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#7C3AED" letter-spacing="0.3">ORCHESTRATOR</text>

  <!-- Arrow 2 to fan-out point -->
  <path d="M 590,317 C 592,326 588,334 590,342" stroke="#B0B8C4" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Fan-out lines to workers -->
  <path d="M 590,342 C 530,352 370,358 264,368" stroke="#99D0C8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 590,342 C 592,354 588,362 590,368" stroke="#C4B5E0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 590,342 C 650,352 810,358 916,368" stroke="#F0B4D0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Small dots at fan-out origin -->
  <circle cx="590" cy="342" r="3" fill="#B0B8C4"/>

  <!-- ===================== STEP 3 -- WORKERS IN PARALLEL ===================== -->

  <!-- === Worker 1: PROBLEM FINDER (teal) === -->
  <!-- Shadow -->
  <rect x="96" y="372" width="306" height="200" rx="8" fill="#A7D8CF" opacity="0.3"/>
  <!-- Body -->
  <rect x="94" y="369" width="306" height="200" rx="8" fill="#FFFFFF" stroke="#99F6E4" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="94" y="369" width="306" height="34" rx="8" fill="#0D9488"/>
  <rect x="94" y="391" width="306" height="12" fill="#0D9488"/>
  <text x="247" y="392" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1">PROBLEM FINDER</text>

  <text x="110" y="424" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Runs problem-AI-fit. Finds: users</text>
  <text x="110" y="442" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">need pattern detection across 50+</text>
  <text x="110" y="460" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">data sources. Current process: 4 hrs</text>
  <text x="110" y="478" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">manual. AI opportunity: real, but</text>
  <text x="110" y="496" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">scoped to pattern alerts -- not</text>
  <text x="110" y="514" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">autonomous decisions.</text>

  <!-- Key finding highlight with teal left bar -->
  <rect x="106" y="530" width="280" height="26" rx="4" fill="#F0FDFA"/>
  <rect x="106" y="530" width="2" height="26" rx="1" fill="#0D9488"/>
  <text x="118" y="548" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#0D9488">Pattern alerts, not autonomous action</text>

  <!-- === Worker 2: STRATEGIST (purple) === -->
  <!-- Shadow -->
  <rect x="439" y="372" width="306" height="200" rx="8" fill="#C4B5E0" opacity="0.25"/>
  <!-- Body -->
  <rect x="437" y="369" width="306" height="200" rx="8" fill="#FFFFFF" stroke="#E9E5F5" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="437" y="369" width="306" height="34" rx="8" fill="#7C3AED"/>
  <rect x="437" y="391" width="306" height="12" fill="#7C3AED"/>
  <text x="590" y="392" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1">STRATEGIST</text>

  <text x="453" y="424" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Runs build-or-buy + token economics.</text>
  <text x="453" y="442" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Finds: RAG over internal data is build.</text>
  <text x="453" y="460" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Alert routing is buy. Estimated cost</text>
  <text x="453" y="478" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">at scale: $0.12/query. Break-even</text>
  <text x="453" y="496" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">at 200 daily users.</text>

  <!-- Key finding highlight with purple left bar -->
  <rect x="449" y="530" width="280" height="26" rx="4" fill="#F5F3FF"/>
  <rect x="449" y="530" width="2" height="26" rx="1" fill="#7C3AED"/>
  <text x="461" y="548" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#7C3AED">Build RAG, buy routing. $0.12/query.</text>

  <!-- === Worker 3: SAFETY LEAD (pink) === -->
  <!-- Shadow -->
  <rect x="782" y="372" width="306" height="200" rx="8" fill="#F0B4D0" opacity="0.25"/>
  <!-- Body -->
  <rect x="780" y="369" width="306" height="200" rx="8" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="780" y="369" width="306" height="34" rx="8" fill="#DB2777"/>
  <rect x="780" y="391" width="306" height="12" fill="#DB2777"/>
  <text x="933" y="392" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1">SAFETY LEAD</text>

  <text x="796" y="424" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Runs autonomy-spectrum + safety-by-</text>
  <text x="796" y="442" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">design. Finds: Level 2 autonomy</text>
  <text x="796" y="460" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">(suggest, don't act). Users must</text>
  <text x="796" y="478" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">confirm before any recommendation</text>
  <text x="796" y="496" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">triggers action. Failure mode: false</text>
  <text x="796" y="514" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">confidence on sparse data.</text>

  <!-- Key finding highlight with pink left bar -->
  <rect x="792" y="530" width="280" height="26" rx="4" fill="#FDF2F8"/>
  <rect x="792" y="530" width="2" height="26" rx="1" fill="#DB2777"/>
  <text x="804" y="548" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#DB2777">Level 2: suggest, never act alone</text>

  <!-- Converge curves from workers (deep bezier arcs) -->
  <!-- Left worker arcs right with deep curve -->
  <path d="M 247,571 C 340,610 440,620 490,604" stroke="#99D0C8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Middle worker drops straight down -->
  <path d="M 590,571 C 590,584 590,594 590,604" stroke="#C4B5E0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right worker arcs left with deep curve -->
  <path d="M 933,571 C 840,610 740,620 690,604" stroke="#F0B4D0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Converge point dot -->
  <circle cx="590" cy="604" r="3" fill="#B0B8C4"/>

  <!-- Converge arrow -->
  <path d="M 590,604 C 592,610 588,616 590,622" stroke="#B0B8C4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="584,619 590,630 596,619" fill="#B0B8C4"/>

  <!-- ===================== STEP 4 -- ORCHESTRATOR SYNTHESIZES ===================== -->
  <!-- Card shadow -->
  <rect x="96" y="636" width="990" height="110" rx="8" fill="#C4B5E0" opacity="0.25"/>
  <!-- Card body -->
  <rect x="94" y="633" width="990" height="110" rx="8" fill="#FFFFFF" stroke="#EDE9FE" stroke-width="1"/>
  <!-- Left border bar -->
  <rect x="94" y="637" width="4" height="102" rx="2" fill="#8B5CF6"/>

  <text x="114" y="660" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1F2937">The Brain Makes the Call</text>
  <text x="114" y="684" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">Not "here are three options." One recommendation: Build a Level 2 insight agent scoped to pattern</text>
  <text x="114" y="702" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">detection. Buy the alert routing. Gate on: false positive rate below 8% before expanding scope.</text>
  <text x="114" y="720" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">Ship pilot to 50 users, measure time-to-insight reduction.</text>

  <!-- RECOMMENDATION badge (120px wide) -->
  <rect x="952" y="644" width="120" height="24" rx="12" fill="#DCFCE7"/>
  <text x="1012" y="660" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#15803D" letter-spacing="0.3">RECOMMENDATION</text>

  <!-- Arrow 4 to 5 -->
  <path d="M 590,745 C 592,752 588,758 590,764" stroke="#B0B8C4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="584,761 590,772 596,761" fill="#B0B8C4"/>

  <!-- ===================== STEP 5 -- THE OUTPUT ===================== -->
  <!-- Card shadow -->
  <rect x="96" y="778" width="990" height="84" rx="8" fill="#A7D8B4" opacity="0.3"/>
  <!-- Card body -->
  <rect x="94" y="775" width="990" height="84" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <!-- Left border bar (wider for emphasis) -->
  <rect x="94" y="779" width="5" height="76" rx="2.5" fill="#16A34A"/>

  <text x="116" y="800" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#15803D">What Ships</text>
  <text x="116" y="822" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">A spec with: autonomy level justified, cost model at 3 scales, eval gates defined, failure modes</text>
  <text x="116" y="840" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">mapped, and a section called WHEN WRONG -- three assumptions that would invalidate the entire plan.</text>

  <!-- SHIP-READY badge (120px wide) -->
  <rect x="952" y="786" width="120" height="24" rx="12" fill="#DCFCE7"/>
  <text x="1012" y="802" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#15803D" letter-spacing="0.3">SHIP-READY</text>

  <!-- ===================== PUNCHLINE CALLOUT ===================== -->
  <rect x="94" y="874" width="990" height="32" rx="6" fill="#FFFBEB"/>
  <rect x="94" y="874" width="4" height="32" rx="2" fill="#F59E0B"/>
  <text x="600" y="888" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#92400E">The ask was vague. The output was surgical.</text>
  <text x="600" y="903" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="400" fill="#B45309">That's what happens when thinking precedes doing.</text>

  <!-- ===================== FOOTER ===================== -->
  <text x="600" y="918" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">rtp-personal-skills  ·  The Orchestrator in Action  ·  April 2026</text>

</svg>