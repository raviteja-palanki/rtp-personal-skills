  <rect x="120" y="482" width="960" height="18" rx="4" fill="#FAF8FF"/>
  <rect x="120" y="482" width="4" height="18" rx="2" fill="#7C3AED"/>
  <text x="600" y="496" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">
