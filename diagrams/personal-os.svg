  <text x="34" y="218" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">PRDs, strategy, evals, safety</text>
  <text x="34" y="236" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">-- all pre-tested.</text>
