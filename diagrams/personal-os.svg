    <tspan dx="8" font-weight="400" fill="#6B7280">A few use it to think things they couldn't think before.</tspan>
  </text>

  <!-- Footer -->
  <text x="600" y="522" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">rtp-personal-skills  ·  The Personal OS  ·  April 2026</text>
