<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.09" />
    </filter>

    <!-- Soft gradient for accent -->
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9478B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A892CC;stop-opacity:0.8" />
    </linearGradient>

    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B92B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7BA8D0;stop-opacity:0.8" />
    </linearGradient>

    <linearGradient id="grad-moss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BA08A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#85B8A4;stop-opacity:0.8" />
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B7E77" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#FAFAF8"/>

  <!-- ========== TITLE SECTION ========== -->
  <text x="50" y="45" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#1B1B1F">
    The Architecture
  </text>
  <text x="50" y="80" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#5B5550">
    Three layers. Each earns the right to exist by making the next layer trustworthy.
  </text>

  <!-- ========== LAYER 1: THINKING ========== -->
  <g id="layer-thinking">
    <!-- Band background -->
    <rect x="40" y="110" width="920" height="180" fill="#9478B8" rx="16" filter="url(#shadow)"/>

    <!-- Inner content area -->
    <rect x="50" y="120" width="900" height="160" fill="#F5E8F8" rx="12"/>

    <!-- Layer label -->
    <text x="60" y="145" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#9478B8">
      THINKING
    </text>
    <text x="60" y="163" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#6B4A7F">
      10 skills that produce checks, not documents
    </text>

    <!-- Skill chips -->
    <g id="thinking-chips">
      <rect x="60" y="175" width="88" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="104" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">first-principles</text>

      <rect x="158" y="175" width="72" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="194" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">bias-spotter</text>

      <rect x="240" y="175" width="62" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="271" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">red-team</text>

      <rect x="312" y="175" width="62" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="343" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">dual-lens</text>

      <rect x="384" y="175" width="100" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="434" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">determinism</text>

      <rect x="494" y="175" width="68" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="528" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">stress-test</text>

      <rect x="572" y="175" width="82" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="613" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">failure-modes</text>

      <rect x="664" y="175" width="86" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="707" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">alignment</text>

      <rect x="760" y="175" width="84" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="802" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">judgment-guard</text>

      <rect x="854" y="175" width="76" height="28" fill="#FFFFFF" stroke="#9478B8" stroke-width="1.5" rx="6"/>
      <text x="892" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5B3E7A">problem-type</text>
    </g>
  </g>

  <!-- ========== LAYER 2: JUDGMENT ========== -->
  <g id="layer-judgment">
    <!-- Band background -->
    <rect x="40" y="320" width="920" height="200" fill="#5B92B8" rx="16" filter="url(#shadow)"/>

    <!-- Inner content area -->
    <rect x="50" y="330" width="900" height="180" fill="#EEF5FB" rx="12"/>

    <!-- Layer label -->
    <text x="60" y="355" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#5B92B8">
      JUDGMENT
    </text>
    <text x="60" y="373" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#2B5A7F">
      36 skills across 5 domains — when to ship, when to pivot, when to slow down
    </text>

    <!-- 5 Domain cards -->
    <g id="domains">
      <!-- Product Sense -->
      <rect x="60" y="385" width="158" height="110" fill="#FFFFFF" stroke="#5B92B8" stroke-width="1.5" rx="8"/>
      <text x="139" y="405" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2B5A7F">Product Sense</text>
      <text x="139" y="425" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5B7A8B">9 skills</text>
      <text x="139" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">Discovery &amp;</text>
      <text x="139" y="456" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">positioning</text>

      <!-- AI Strategy -->
      <rect x="228" y="385" width="158" height="110" fill="#FFFFFF" stroke="#5B92B8" stroke-width="1.5" rx="8"/>
      <text x="307" y="405" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2B5A7F">AI Strategy</text>
      <text x="307" y="425" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5B7A8B">10 skills</text>
      <text x="307" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">Models,</text>
      <text x="307" y="456" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">agents &amp; systems</text>

      <!-- Safety &amp; Trust -->
      <rect x="396" y="385" width="158" height="110" fill="#FFFFFF" stroke="#5B92B8" stroke-width="1.5" rx="8"/>
      <text x="475" y="405" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2B5A7F">Safety &amp; Trust</text>
      <text x="475" y="425" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5B7A8B">7 skills</text>
      <text x="475" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">Harm, governance</text>
      <text x="475" y="456" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">&amp; UX</text>

      <!-- Agent Design -->
      <rect x="564" y="385" width="158" height="110" fill="#FFFFFF" stroke="#5B92B8" stroke-width="1.5" rx="8"/>
      <text x="643" y="405" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2B5A7F">Agent Design</text>
      <text x="643" y="425" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5B7A8B">5 skills</text>
      <text x="643" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">Autonomy &amp;</text>
      <text x="643" y="456" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">orchestration</text>

      <!-- Eval &amp; Quality -->
      <rect x="732" y="385" width="158" height="110" fill="#FFFFFF" stroke="#5B92B8" stroke-width="1.5" rx="8"/>
      <text x="811" y="405" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2B5A7F">Eval &amp; Quality</text>
      <text x="811" y="425" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5B7A8B">6 skills</text>
      <text x="811" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">Testing, metrics</text>
      <text x="811" y="456" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A8B9C" font-style="italic">&amp; risk</text>
    </g>
  </g>

  <!-- ========== LAYER 3: CRAFT ========== -->
  <g id="layer-craft">
    <!-- Band background -->
    <rect x="40" y="550" width="920" height="170" fill="#6BA08A" rx="16" filter="url(#shadow)"/>

    <!-- Inner content area -->
    <rect x="50" y="560" width="900" height="150" fill="#E8F4F0" rx="12"/>

    <!-- Layer label -->
    <text x="60" y="585" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#6BA08A">
      CRAFT
    </text>
    <text x="60" y="603" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#3A6A5A">
      8 generators — pre-tested by layers above, ready to ship
    </text>

    <!-- Skill chips -->
    <g id="craft-chips">
      <rect x="60" y="615" width="68" height="28" fill="#FFFFFF" stroke="#6BA08A" stroke-width="1.5" rx="6"/>
      <text x="94" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3A6A5A">ai-prd</text>

      <rect x="138" y="615" width="80" height="28" fill="#FFFFFF" stroke="#6BA08A" stroke-width="1.5" rx="6"/>
      <text x="178" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3A6A5A">context-spec</text>

      <rect x="228" y="615" width="76" height="28" fill="#FFFFFF" stroke="#6BA08A" stroke-width="1.5" rx="6"/>
      <text x="266" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3A6A5A">agent-spec</text>

      <rect x="314" y="615" width="68" height="28" fill="#FFFFFF" stroke="#6BA08A" stroke-width="1.5" rx="6"/>
      <text x="348" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3A6A5A">cost-model</text>

      <rect x="392" y="615" width="82" height="28" fill="#FFFFFF" stroke="#6BA08A" stroke-width="1.5" rx="6"/>
      <text x="433" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3A6A5A">ship-decision</text>

      <rect x="484" y="615" width="94" height="28" fill="#FFFFFF" stroke="#6BA08A" stroke-width="1.5" rx="6"/>
      <text x="531" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3A6A5A">competitive-map</text>

      <rect x="588" y="615" width="68" height="28" fill="#FFFFFF" stroke="#6BA08A" stroke-width="1.5" rx="6"/>
      <text x="622" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3A6A5A">fit-signal</text>

      <rect x="666" y="615" width="100" height="28" fill="#FFFFFF" stroke="#6BA08A" stroke-width="1.5" rx="6"/>
      <text x="716" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3A6A5A">prompt-as-product</text>
    </g>
  </g>

  <!-- ========== RIGHT SIDE: IMPORT FLOW DIAGRAM ========== -->
  <g id="import-flow">
    <!-- Title -->
    <text x="1000" y="145" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5B5550">
      Import chain
    </text>

    <!-- Flow boxes and arrows -->
    <!-- THINK -->
    <rect x="990" y="160" width="80" height="32" fill="#9478B8" rx="6" filter="url(#shadow)"/>
    <text x="1030" y="181" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">THINK</text>

    <!-- Arrow down -->
    <line x1="1030" y1="192" x2="1030" y2="215" stroke="#8B7E77" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- CHECK -->
    <rect x="990" y="215" width="80" height="32" fill="#9478B8" rx="6" filter="url(#shadow)"/>
    <text x="1030" y="236" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">CHECK</text>

    <!-- Arrow down -->
    <line x1="1030" y1="247" x2="1030" y2="270" stroke="#8B7E77" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- JUDGE -->
    <rect x="990" y="270" width="80" height="32" fill="#5B92B8" rx="6" filter="url(#shadow)"/>
    <text x="1030" y="291" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">JUDGE</text>

    <!-- Arrow down -->
    <line x1="1030" y1="302" x2="1030" y2="325" stroke="#8B7E77" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- VALIDATE -->
    <rect x="990" y="325" width="80" height="32" fill="#5B92B8" rx="6" filter="url(#shadow)"/>
    <text x="1030" y="346" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">VALIDATE</text>

    <!-- Arrow down -->
    <line x1="1030" y1="357" x2="1030" y2="380" stroke="#8B7E77" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- CRAFT -->
    <rect x="990" y="380" width="80" height="32" fill="#6BA08A" rx="6" filter="url(#shadow)"/>
    <text x="1030" y="401" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">CRAFT</text>

    <!-- Arrow down -->
    <line x1="1030" y1="412" x2="1030" y2="435" stroke="#8B7E77" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- SHIP -->
    <rect x="990" y="435" width="80" height="32" fill="#D4956A" rx="6" filter="url(#shadow)"/>
    <text x="1030" y="456" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">SHIP</text>

    <!-- Right-side annotation -->
    <text x="1090" y="170" font-family="Inter, sans-serif" font-size="10" fill="#5B5550">
      Each step imports
    </text>
    <text x="1090" y="185" font-family="Inter, sans-serif" font-size="10" fill="#5B5550">
      from the one above
    </text>
  </g>

  <!-- ========== BOTTOM CALLOUTS ========== -->
  <!-- General skills callout -->
  <rect x="40" y="755" width="920" height="60" fill="#FFF5E8" stroke="#D4956A" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="60" y="777" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#7A5A1E">
    Plus 12 general-purpose skills
  </text>
  <text x="60" y="798" font-family="Inter, sans-serif" font-size="11" fill="#5B5550">
    Email mastery, presentations, hand-drawn diagrams, research synthesis, brand system, administration
  </text>

  <!-- What the story tells -->
  <g id="story-callout">
    <rect x="40" y="835" width="920" height="55" fill="#FAFAF8" stroke="#A09890" stroke-width="1" stroke-dasharray="3,2" rx="8"/>
    <text x="60" y="855" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5B5550">
      Without the layers: "We should leverage AI to enhance productivity."
    </text>
    <text x="60" y="875" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5B5550">
      With the layers: A spec where engineering ships fast, finance models accurately, QA knows what to test.
    </text>
  </g>

  <!-- ========== FOOTER ========== -->
  <text x="700" y="885" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#A09890" font-weight="500">
    rtp-personal-skills · 66 skills (54 AIPM + 12 general) · April 2026
  </text>
</svg>
