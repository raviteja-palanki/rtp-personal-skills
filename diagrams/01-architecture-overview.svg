<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="1200" height="850">

  <!-- Background -->
  <rect width="1200" height="850" fill="#FAFAF8" rx="0"/>

  <!-- ============ HEADER (y=0 to 80) ============ -->
  <rect x="0" y="0" width="1200" height="80" fill="#F5F3FF"/>
  <text x="600" y="36" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#1B1B1F">The Architecture</text>
  <text x="600" y="62" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#5F6B7A">Quick Check  ·  Three layers. Each earns the right to exist by making the next layer trustworthy.</text>

  <!-- ============ LAYER 1 — THINKING (y=110 to 290) ============ -->

  <!-- Shadow for outer band -->
  <rect x="52" y="113" width="1100" height="180" rx="16" fill="#E5E7EB" opacity="0.3"/>
  <!-- Outer colored band -->
  <rect x="50" y="110" width="1100" height="180" rx="16" fill="#8B5CF6"/>
  <!-- Inner white area -->
  <rect x="60" y="120" width="1080" height="160" rx="12" fill="#F5F3FF"/>

  <!-- Layer label and description -->
  <text x="80" y="148" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#6D28D9">THINKING</text>
  <text x="80" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">10 skills that produce checks, not documents</text>

  <!-- 10 Thinking skill chips — row at y=185 -->
  <!-- Chip 1: first-principles -->
  <rect x="72" y="183" width="100" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="122" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">first-principles</text>

  <!-- Chip 2: bias-spotter -->
  <rect x="182" y="183" width="86" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="225" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">bias-spotter</text>

  <!-- Chip 3: falsification -->
  <rect x="278" y="183" width="86" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="321" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">falsification</text>

  <!-- Chip 4: dual-lens -->
  <rect x="374" y="183" width="74" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="411" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">dual-lens</text>

  <!-- Chip 5: determinism -->
  <rect x="458" y="183" width="86" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="501" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">determinism</text>

  <!-- Chip 6: stress-test -->
  <rect x="554" y="183" width="78" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="593" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">stress-test</text>

  <!-- Chip 7: failure-modes -->
  <rect x="642" y="183" width="94" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="689" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">failure-modes</text>

  <!-- Chip 8: alignment -->
  <rect x="746" y="183" width="76" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="784" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">alignment</text>

  <!-- Chip 9: judgment-guard -->
  <rect x="832" y="183" width="104" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="884" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">judgment-guard</text>

  <!-- Chip 10: problem-type -->
  <rect x="946" y="183" width="92" height="28" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="992" y="201" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">problem-type</text>

  <!-- Connector arrow from Layer 1 to Layer 2 -->
  <line x1="600" y1="290" x2="600" y2="320" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="594,316 600,326 606,316" fill="#C4B5FD"/>


  <!-- ============ LAYER 2 — JUDGMENT (y=330 to 540) ============ -->

  <!-- Shadow for outer band -->
  <rect x="52" y="333" width="1100" height="210" rx="16" fill="#E5E7EB" opacity="0.3"/>
  <!-- Outer colored band -->
  <rect x="50" y="330" width="1100" height="210" rx="16" fill="#14B8A6"/>
  <!-- Inner white area -->
  <rect x="60" y="340" width="1080" height="190" rx="12" fill="#F0FDFA"/>

  <!-- Layer label and description -->
  <text x="80" y="368" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#0F766E">JUDGMENT</text>
  <text x="80" y="388" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">36 skills across 5 domains — the calls that separate signal from hype</text>

  <!-- 5 Domain Cards — row starting y=402, each ~195w, 16px gaps -->
  <!-- Card widths: 195 each, gap=16. Total = 195*5 + 16*4 = 975+64 = 1039. Start x = 60 + (1080-1039)/2 = 60+20 = 80 -->

  <!-- Card 1: Product Sense -->
  <rect x="82" y="405" width="195" height="110" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1"/>
  <rect x="82" y="405" width="195" height="32" rx="10" fill="#14B8A6"/>
  <!-- Fix bottom corners of header -->
  <rect x="82" y="425" width="195" height="12" fill="#14B8A6"/>
  <text x="179" y="426" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Product Sense</text>
  <text x="179" y="460" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">9 skills</text>
  <text x="179" y="478" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">What to build, why,</text>
  <text x="179" y="492" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">and for whom</text>

  <!-- Card 2: AI Strategy -->
  <rect x="293" y="405" width="195" height="110" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1"/>
  <rect x="293" y="405" width="195" height="32" rx="10" fill="#14B8A6"/>
  <rect x="293" y="425" width="195" height="12" fill="#14B8A6"/>
  <text x="390" y="426" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">AI Strategy</text>
  <text x="390" y="460" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">10 skills</text>
  <text x="390" y="478" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">Architecture, cost,</text>
  <text x="390" y="492" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">and scaling decisions</text>

  <!-- Card 3: Safety & Trust -->
  <rect x="504" y="405" width="195" height="110" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1"/>
  <rect x="504" y="405" width="195" height="32" rx="10" fill="#14B8A6"/>
  <rect x="504" y="425" width="195" height="12" fill="#14B8A6"/>
  <text x="601" y="426" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Safety &amp; Trust</text>
  <text x="601" y="460" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">7 skills</text>
  <text x="601" y="478" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">Guardrails, risk,</text>
  <text x="601" y="492" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">and responsible AI</text>

  <!-- Card 4: Agent Design -->
  <rect x="715" y="405" width="195" height="110" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1"/>
  <rect x="715" y="405" width="195" height="32" rx="10" fill="#14B8A6"/>
  <rect x="715" y="425" width="195" height="12" fill="#14B8A6"/>
  <text x="812" y="426" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Agent Design</text>
  <text x="812" y="460" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">5 skills</text>
  <text x="812" y="478" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">Orchestration, tools,</text>
  <text x="812" y="492" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">and autonomy levels</text>

  <!-- Card 5: Eval & Quality -->
  <rect x="926" y="405" width="195" height="110" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1"/>
  <rect x="926" y="405" width="195" height="32" rx="10" fill="#14B8A6"/>
  <rect x="926" y="425" width="195" height="12" fill="#14B8A6"/>
  <text x="1023" y="426" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Eval &amp; Quality</text>
  <text x="1023" y="460" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">6 skills</text>
  <text x="1023" y="478" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">Metrics, testing,</text>
  <text x="1023" y="492" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">and quality gates</text>

  <!-- Connector arrow from Layer 2 to Layer 3 -->
  <line x1="600" y1="540" x2="600" y2="570" stroke="#5EEAD4" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="594,566 600,576 606,566" fill="#5EEAD4"/>


  <!-- ============ LAYER 3 — CRAFT (y=580 to 730) ============ -->

  <!-- Shadow for outer band -->
  <rect x="52" y="583" width="1100" height="150" rx="16" fill="#E5E7EB" opacity="0.3"/>
  <!-- Outer colored band -->
  <rect x="50" y="580" width="1100" height="150" rx="16" fill="#F59E0B"/>
  <!-- Inner white area -->
  <rect x="60" y="590" width="1080" height="130" rx="12" fill="#FFFBEB"/>

  <!-- Layer label and description -->
  <text x="80" y="618" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#B45309">CRAFT</text>
  <text x="80" y="638" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">8 generators — pre-tested by Layers 1 + 2, ready to ship</text>

  <!-- 8 Craft skill chips — row at y=655 -->
  <!-- Chip widths vary. Total chips: 8. Approx 115 each + 12 gap = 115*8 + 12*7 = 920+84 = 1004. Start x = 60+(1080-1004)/2 = 98 -->

  <!-- Chip 1: ai-prd -->
  <rect x="88" y="655" width="68" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="122" y="673" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">ai-prd</text>

  <!-- Chip 2: context-spec -->
  <rect x="168" y="655" width="92" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="214" y="673" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">context-spec</text>

  <!-- Chip 3: agent-spec -->
  <rect x="272" y="655" width="84" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="314" y="673" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">agent-spec</text>

  <!-- Chip 4: cost-model -->
  <rect x="368" y="655" width="84" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="410" y="673" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">cost-model</text>

  <!-- Chip 5: ship-decision -->
  <rect x="464" y="655" width="96" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="512" y="673" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">ship-decision</text>

  <!-- Chip 6: competitive-map -->
  <rect x="572" y="655" width="110" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="627" y="673" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">competitive-map</text>

  <!-- Chip 7: fit-signal -->
  <rect x="694" y="655" width="76" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="732" y="673" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">fit-signal</text>

  <!-- Chip 8: prompt-as-product -->
  <rect x="782" y="655" width="120" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="842" y="673" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">prompt-as-product</text>


  <!-- ============ FOOTER (y=770) ============ -->

  <!-- Shadow for callout box -->
  <rect x="102" y="773" width="1000" height="50" rx="12" fill="#E5E7EB" opacity="0.3"/>
  <!-- Story callout box -->
  <rect x="100" y="770" width="1000" height="50" rx="12" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="600" y="800" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Without the layers: vague.  With the layers: engineering ships from the spec.</text>

  <!-- Attribution -->
  <text x="600" y="840" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#9CA3AF">AI PM Skills Architecture  ·  Ravi Teja Palanki</text>

</svg>