<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">

  <!-- Background -->
  <rect width="1200" height="900" fill="#FAFAF8" rx="0"/>

  <!-- Header Band -->
  <rect x="0" y="0" width="1200" height="72" fill="#F5F3FF" rx="0"/>
  <text x="600" y="38" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#6D28D9">What Actually Happens</text>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#374151">Comprehensive  ·  A Real Problem, Start to Finish</text>

  <!-- ===================== STEP 1 — THE INPUT ===================== -->
  <!-- Step Label -->
  <text x="40" y="108" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="1.5">STEP 1</text>

  <!-- Card shadow -->
  <rect x="102" y="92" width="1000" height="68" rx="8" fill="#D1D5DB" opacity="0.35"/>
  <!-- Card body -->
  <rect x="100" y="90" width="1000" height="68" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Left border bar -->
  <rect x="100" y="90" width="5" height="68" rx="2" fill="#6B7280"/>

  <text x="120" y="114" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1F2937">The Ask</text>
  <text x="120" y="138" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">"We want AI in our enterprise app. Can we build an agent that gives users faster insights?"</text>

  <!-- VAGUE REQUEST badge -->
  <rect x="980" y="100" width="108" height="24" rx="12" fill="#FEE2E2"/>
  <text x="1034" y="116" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#EF4444">VAGUE REQUEST</text>

  <!-- Arrow 1 to 2 (organic curve) -->
  <path d="M 600,160 C 603,168 597,176 600,183" stroke="#B0B8C4" stroke-width="2.5" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>
  <polygon points="594,180 600,191 606,180" fill="#B0B8C4"/>

  <!-- ===================== STEP 2 — ORCHESTRATOR CLASSIFIES ===================== -->
  <text x="40" y="206" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="1.5">STEP 2</text>

  <!-- Card shadow -->
  <rect x="102" y="190" width="1000" height="100" rx="8" fill="#D1D5DB" opacity="0.35"/>
  <!-- Card body -->
  <rect x="100" y="188" width="1000" height="100" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Left border bar -->
  <rect x="100" y="188" width="5" height="100" rx="2" fill="#8B5CF6"/>

  <text x="120" y="214" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1F2937">The Brain Reads the Situation</text>
  <text x="120" y="236" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">Deep thinking mode. Before touching solutions, the orchestrator identifies what's actually</text>
  <text x="120" y="254" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">being asked: What decisions do users make? What data exists? What's the cost of a wrong</text>
  <text x="120" y="272" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">answer? What autonomy level does this deserve?</text>

  <!-- ORCHESTRATOR badge -->
  <rect x="976" y="200" width="112" height="24" rx="12" fill="#EDE9FE"/>
  <text x="1032" y="216" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#8B5CF6">ORCHESTRATOR</text>

  <!-- Arrow 2 to 3 (organic curve) -->
  <path d="M 600,290 C 603,298 597,306 600,313" stroke="#B0B8C4" stroke-width="2.5" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>
  <polygon points="594,310 600,321 606,310" fill="#B0B8C4"/>

  <!-- Fan-out lines to workers (hand-drawn curves) -->
  <path d="M 600,321 C 520,330 380,340 270,348" stroke="#B0B8C4" stroke-width="2" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>
  <path d="M 600,321 C 603,332 597,341 600,348" stroke="#B0B8C4" stroke-width="2" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>
  <path d="M 600,321 C 680,330 820,340 930,348" stroke="#B0B8C4" stroke-width="2" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>

  <!-- ===================== STEP 3 — WORKERS IN PARALLEL ===================== -->
  <text x="40" y="344" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="1.5">STEP 3</text>
  <text x="40" y="360" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#6B7280">PARALLEL</text>

  <!-- === Worker 1: PROBLEM FINDER (teal) === -->
  <!-- Shadow -->
  <rect x="102" y="350" width="310" height="192" rx="8" fill="#D1D5DB" opacity="0.35"/>
  <!-- Body -->
  <rect x="100" y="348" width="310" height="192" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="100" y="348" width="310" height="32" rx="8" fill="#14B8A6"/>
  <rect x="100" y="368" width="310" height="12" fill="#14B8A6"/>
  <text x="255" y="370" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">PROBLEM FINDER</text>

  <text x="114" y="402" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Runs problem-AI-fit. Finds: users</text>
  <text x="114" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">need pattern detection across 50+</text>
  <text x="114" y="434" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">data sources. Current process: 4 hrs</text>
  <text x="114" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">manual. AI opportunity: real, but</text>
  <text x="114" y="466" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">scoped to pattern alerts -- not</text>
  <text x="114" y="482" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">autonomous decisions.</text>

  <!-- === Worker 2: STRATEGIST (purple) === -->
  <rect x="447" y="350" width="310" height="192" rx="8" fill="#D1D5DB" opacity="0.35"/>
  <rect x="445" y="348" width="310" height="192" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="445" y="348" width="310" height="32" rx="8" fill="#8B5CF6"/>
  <rect x="445" y="368" width="310" height="12" fill="#8B5CF6"/>
  <text x="600" y="370" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">STRATEGIST</text>

  <text x="459" y="402" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Runs build-or-buy + token economics.</text>
  <text x="459" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Finds: RAG over internal data is build.</text>
  <text x="459" y="434" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Alert routing is buy. Estimated cost</text>
  <text x="459" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">at scale: $0.12/query. Break-even</text>
  <text x="459" y="466" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">at 200 daily users.</text>

  <!-- === Worker 3: SAFETY LEAD (pink) === -->
  <rect x="792" y="350" width="310" height="192" rx="8" fill="#D1D5DB" opacity="0.35"/>
  <rect x="790" y="348" width="310" height="192" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="790" y="348" width="310" height="32" rx="8" fill="#EC4899"/>
  <rect x="790" y="368" width="310" height="12" fill="#EC4899"/>
  <text x="945" y="370" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">SAFETY LEAD</text>

  <text x="804" y="402" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">Runs autonomy-spectrum + safety-by-</text>
  <text x="804" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">design. Finds: Level 2 autonomy</text>
  <text x="804" y="434" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">(suggest, don't act). Users must</text>
  <text x="804" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">confirm before any recommendation</text>
  <text x="804" y="466" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">triggers action. Failure mode: false</text>
  <text x="804" y="482" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#4B5563">confidence on sparse data.</text>

  <!-- Converge curves from workers (hand-drawn) -->
  <path d="M 255,542 C 260,558 370,568 430,572" stroke="#B0B8C4" stroke-width="2" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>
  <path d="M 600,542 C 603,550 597,558 600,564" stroke="#B0B8C4" stroke-width="2" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>
  <path d="M 945,542 C 940,558 830,568 770,572" stroke="#B0B8C4" stroke-width="2" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>

  <!-- Converge arrow (organic) -->
  <path d="M 600,564 C 603,574 597,582 600,591" stroke="#B0B8C4" stroke-width="2.5" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>
  <polygon points="594,588 600,599 606,588" fill="#B0B8C4"/>

  <!-- ===================== STEP 4 — ORCHESTRATOR SYNTHESIZES ===================== -->
  <text x="40" y="614" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="1.5">STEP 4</text>

  <!-- Card shadow -->
  <rect x="102" y="598" width="1000" height="104" rx="8" fill="#D1D5DB" opacity="0.35"/>
  <!-- Card body -->
  <rect x="100" y="596" width="1000" height="104" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Left border bar -->
  <rect x="100" y="596" width="5" height="104" rx="2" fill="#8B5CF6"/>

  <text x="120" y="622" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1F2937">The Brain Makes the Call</text>
  <text x="120" y="644" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">Not "here are three options." One recommendation: Build a Level 2 insight agent scoped to pattern</text>
  <text x="120" y="662" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">detection. Buy the alert routing. Gate on: false positive rate below 8% before expanding scope.</text>
  <text x="120" y="680" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">Ship pilot to 50 users, measure time-to-insight reduction.</text>

  <!-- RECOMMENDATION badge -->
  <rect x="956" y="608" width="132" height="24" rx="12" fill="#DCFCE7"/>
  <text x="1022" y="624" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#16A34A">RECOMMENDATION</text>

  <!-- Arrow 4 to 5 (organic curve) -->
  <path d="M 600,702 C 603,710 597,718 600,725" stroke="#B0B8C4" stroke-width="2.5" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>
  <polygon points="594,722 600,733 606,722" fill="#B0B8C4"/>

  <!-- ===================== STEP 5 — THE OUTPUT ===================== -->
  <text x="40" y="748" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="1.5">STEP 5</text>

  <!-- Card shadow -->
  <rect x="102" y="732" width="1000" height="80" rx="8" fill="#D1D5DB" opacity="0.35"/>
  <!-- Card body (green tint) -->
  <rect x="100" y="730" width="1000" height="80" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <!-- Left border bar -->
  <rect x="100" y="730" width="5" height="80" rx="2" fill="#16A34A"/>

  <text x="120" y="756" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1F2937">What Ships</text>
  <text x="120" y="778" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">A spec with: autonomy level justified, cost model at 3 scales, eval gates defined, failure modes</text>
  <text x="120" y="796" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#4B5563">mapped, and a section called WHEN WRONG -- three assumptions that would invalidate the entire plan.</text>

  <!-- SHIP-READY badge -->
  <rect x="980" y="742" width="108" height="24" rx="12" fill="#DCFCE7"/>
  <text x="1034" y="758" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#16A34A">SHIP-READY</text>

  <!-- ===================== PUNCHLINE CALLOUT ===================== -->
  <rect x="100" y="826" width="1000" height="44" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="600" y="848" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#92400E">
    <tspan font-weight="700">The ask was vague. The output was surgical.</tspan>
    <tspan dx="16" font-weight="400" fill="#A16207">That's what happens when thinking precedes doing.</tspan>
  </text>

  <!-- ===================== FOOTER ===================== -->
  <text x="600" y="892" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#6B7280">rtp-personal-skills  ·  The Orchestrator in Action  ·  April 2026</text>

</svg>