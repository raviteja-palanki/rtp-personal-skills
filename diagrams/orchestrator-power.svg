<svg viewBox="0 0 1200 560" width="1200" height="560" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="560" fill="#FAFAF8"/>

  <!-- Header band -->
  <rect x="0" y="0" width="1200" height="70" fill="#F8F6FE"/>
  <rect x="0" y="0" width="600" height="70" fill="#FAF8FE" opacity="0.6"/>
  <line x1="0" y1="70" x2="1200" y2="70" stroke="#EDE9FE" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="2.5">UNDER THE HOOD</text>
  <text x="600" y="56" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="800" fill="#1B1B1F">What Makes the Orchestrator Powerful</text>

  <!-- ========== PANEL 1: SHARED CONTEXT ========== -->
  <!-- Purple-tinted shadow -->
  <rect x="53" y="93" width="350" height="360" rx="12" fill="#D6D0E8" opacity="0.3"/>
  <!-- Card body -->
  <rect x="50" y="90" width="350" height="360" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1.2"/>
  <!-- Header bar -->
  <rect x="50" y="90" width="350" height="38" rx="12" fill="#7C3AED"/>
  <rect x="50" y="116" width="350" height="12" fill="#7C3AED"/>
  <text x="225" y="115" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1">SHARED CONTEXT</text>

  <!-- Outer orbit ring -->
  <circle cx="225" cy="210" r="62" fill="none" stroke="#E8E0F8" stroke-width="1.5" stroke-dasharray="8 5"/>
  <!-- Inner context ring -->
  <circle cx="225" cy="210" r="48" fill="#F9F7FE" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Central orchestrator glow -->
  <circle cx="225" cy="210" r="32" fill="#F5F3FF" opacity="0.5"/>
  <circle cx="225" cy="210" r="22" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="225" y="214" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#7C3AED">ORCH</text>

  <!-- Subtle orbit trail arcs behind workers -->
  <path d="M 195,142 C 210,138 240,138 255,142" stroke="#E8E0F8" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 264,168 C 272,178 278,192 280,205" stroke="#E8E0F8" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 280,218 C 278,232 272,244 264,252" stroke="#E8E0F8" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 255,278 C 240,282 210,282 195,278" stroke="#E8E0F8" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 186,252 C 178,244 172,232 170,218" stroke="#E8E0F8" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 170,205 C 172,192 178,178 186,168" stroke="#E8E0F8" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- 6 worker dots — larger (14px radius), color-encoded, no text labels -->
  <!-- Top: Finder (teal) -->
  <circle cx="225" cy="140" r="14" fill="#14B8A6" opacity="0.18"/>
  <circle cx="225" cy="140" r="10" fill="#14B8A6"/>

  <!-- Top-right: Strategist (purple) -->
  <circle cx="279" cy="175" r="14" fill="#7C3AED" opacity="0.18"/>
  <circle cx="279" cy="175" r="10" fill="#7C3AED"/>

  <!-- Bottom-right: Designer (cyan) -->
  <circle cx="279" cy="245" r="14" fill="#06B6D4" opacity="0.18"/>
  <circle cx="279" cy="245" r="10" fill="#06B6D4"/>

  <!-- Bottom: Eval (amber) -->
  <circle cx="225" cy="280" r="14" fill="#F59E0B" opacity="0.18"/>
  <circle cx="225" cy="280" r="10" fill="#F59E0B"/>

  <!-- Bottom-left: Safety (pink) -->
  <circle cx="171" cy="245" r="14" fill="#EC4899" opacity="0.18"/>
  <circle cx="171" cy="245" r="10" fill="#EC4899"/>

  <!-- Top-left: Spec (green) -->
  <circle cx="171" cy="175" r="14" fill="#16A34A" opacity="0.18"/>
  <circle cx="171" cy="175" r="10" fill="#16A34A"/>

  <!-- Context arrows: orchestrator distributes outward -->
  <path d="M 225,188 C 225,174 225,162 225,154" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 222,157 L 225,149 L 228,157" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 244,198 C 256,190 268,182 274,178" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 270,173 L 277,176 L 272,182" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 244,222 C 256,230 268,238 274,242" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 272,238 L 277,244 L 270,247" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 225,232 C 225,246 225,262 225,270" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 222,267 L 225,275 L 228,267" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 206,222 C 194,230 182,238 176,242" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 180,247 L 173,244 L 178,238" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 206,198 C 194,190 182,182 176,178" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 178,182 L 173,176 L 180,173" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 6-dot color legend below ring -->
  <circle cx="118" cy="308" r="4" fill="#14B8A6"/>
  <text x="127" y="312" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#374151">Finder</text>
  <circle cx="178" cy="308" r="4" fill="#7C3AED"/>
  <text x="187" y="312" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#374151">Strat</text>
  <circle cx="228" cy="308" r="4" fill="#06B6D4"/>
  <text x="237" y="312" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#374151">Design</text>
  <circle cx="290" cy="308" r="4" fill="#F59E0B"/>
  <text x="299" y="312" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#374151">Eval</text>
  <circle cx="118" cy="326" r="4" fill="#EC4899"/>
  <text x="127" y="330" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#374151">Safety</text>
  <circle cx="178" cy="326" r="4" fill="#16A34A"/>
  <text x="187" y="330" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#374151">Spec</text>

  <!-- Explanation text (with 8px more breathing room) -->
  <text x="225" y="358" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">6 teams. One shared context.</text>
  <text x="225" y="384" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Every worker knows the goal,</text>
  <text x="225" y="400" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">the plan, and how their piece fits.</text>

  <text x="225" y="430" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">Cohesion from alignment,</text>
  <text x="225" y="446" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">not from stitching after.</text>

  <!-- ========== PANEL 2: LAYERED VERIFICATION ========== -->
  <!-- Teal-tinted shadow -->
  <rect x="428" y="93" width="350" height="360" rx="12" fill="#B2E8DE" opacity="0.28"/>
  <!-- Card body -->
  <rect x="425" y="90" width="350" height="360" rx="12" fill="#FFFFFF" stroke="#D1E8E4" stroke-width="1.2"/>
  <!-- Header bar -->
  <rect x="425" y="90" width="350" height="38" rx="12" fill="#14B8A6"/>
  <rect x="425" y="116" width="350" height="12" fill="#14B8A6"/>
  <text x="600" y="115" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1">LAYERED VERIFICATION</text>

  <!-- Layer 1: Thinking — with left color bar -->
  <rect x="462" y="148" width="276" height="48" rx="10" fill="#F9F7FE" stroke="#DDD6F3" stroke-width="1"/>
  <rect x="462" y="148" width="3" height="48" rx="1.5" fill="#7C3AED"/>
  <text x="600" y="168" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#7C3AED" letter-spacing="0.5">THINKING</text>
  <text x="600" y="186" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#6D28D9">10 checks</text>

  <!-- Gate 1 -->
  <path d="M 600,196 L 600,212" stroke="#B0B8C4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="572" y="204" width="56" height="16" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="600" y="215" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#EA580C" letter-spacing="0.5">GATE</text>

  <!-- Layer 2: Judgment — with left color bar -->
  <rect x="462" y="226" width="276" height="48" rx="10" fill="#F0FDFA" stroke="#C5EEE6" stroke-width="1"/>
  <rect x="462" y="226" width="3" height="48" rx="1.5" fill="#14B8A6"/>
  <text x="600" y="246" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0F766E" letter-spacing="0.5">JUDGMENT</text>
  <text x="600" y="264" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#0F766E">36 calls</text>

  <!-- Gate 2 -->
  <path d="M 600,274 L 600,290" stroke="#B0B8C4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="572" y="282" width="56" height="16" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="600" y="293" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#EA580C" letter-spacing="0.5">GATE</text>

  <!-- Layer 3: Craft — with left color bar -->
  <rect x="462" y="304" width="276" height="48" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <rect x="462" y="304" width="3" height="48" rx="1.5" fill="#F59E0B"/>
  <text x="600" y="324" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#B45309" letter-spacing="0.5">CRAFT</text>
  <text x="600" y="342" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#B45309">8 generators</text>

  <!-- Explanation text (with 8px more breathing room) -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">Each layer earns the next.</text>
  <text x="600" y="406" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Confidence gates won't proceed</text>
  <text x="600" y="422" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">on bad inputs. No shortcuts.</text>

  <!-- ========== PANEL 3: COMPOUNDING INTELLIGENCE ========== -->
  <!-- Amber-tinted shadow -->
  <rect x="803" y="93" width="350" height="360" rx="12" fill="#F5DEB3" opacity="0.28"/>
  <!-- Card body -->
  <rect x="800" y="90" width="350" height="360" rx="12" fill="#FFFFFF" stroke="#F0E4C8" stroke-width="1.2"/>
  <!-- Header bar -->
  <rect x="800" y="90" width="350" height="38" rx="12" fill="#F59E0B"/>
  <rect x="800" y="116" width="350" height="12" fill="#F59E0B"/>
  <text x="975" y="115" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1">COMPOUNDING INTELLIGENCE</text>

  <!-- Outer dashed orbit -->
  <circle cx="975" cy="222" r="68" fill="none" stroke="#FDE68A" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.5"/>

  <!-- Three nodes -->
  <!-- Top: Session -->
  <rect x="939" y="146" width="72" height="30" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="975" y="166" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#B45309">Session</text>

  <!-- Bottom-right: Pattern -->
  <rect x="1012" y="252" width="72" height="30" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="1048" y="272" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#B45309">Pattern</text>

  <!-- Bottom-left: Rule -->
  <rect x="870" y="252" width="72" height="30" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="906" y="272" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#B45309">Rule</text>

  <!-- Curved arrows — THICKER (3px), bolder, clockwise -->
  <!-- Session to Pattern -->
  <path d="M 1011,166 C 1046,182 1066,218 1048,252" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 1044,247 L 1049,258 L 1053,247" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pattern to Rule -->
  <path d="M 1012,270 C 988,290 948,290 942,270" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 946,274 L 939,266 L 938,278" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Rule back to Session -->
  <path d="M 904,252 C 896,222 914,186 939,166" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 935,170 L 942,160 L 944,172" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "3x" badge with shadow effect -->
  <rect x="955" y="209" width="40" height="26" rx="10" fill="#D97706" opacity="0.25"/>
  <rect x="953" y="207" width="40" height="26" rx="10" fill="#F59E0B"/>
  <text x="973" y="225" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">3x</text>

  <!-- Explanation text (with 8px more breathing room) -->
  <text x="975" y="318" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">The system learns from running.</text>
  <text x="975" y="344" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">After 3 confirmations, a pattern</text>
  <text x="975" y="360" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">gets promoted to a rule.</text>

  <text x="975" y="390" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">10th iteration is structurally different</text>
  <text x="975" y="406" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">from the 1st.</text>

  <!-- ========== PUNCHLINE CALLOUT — two-line pull-quote ========== -->
  <rect x="120" y="472" width="960" height="48" rx="8" fill="#FAF8FF"/>
  <rect x="120" y="472" width="4" height="48" rx="2" fill="#7C3AED"/>
  <text x="144" y="492" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">A great orchestrator doesn't distribute tasks. It distributes understanding.</text>
  <text x="144" y="512" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="400" fill="#6B7280">The difference between cohesive output and collaged output is whether every piece was shaped to fit before it was built.</text>

  <!-- Footer -->
  <rect x="400" y="536" width="400" height="1" fill="#E5E7EB" opacity="0.4"/>
  <text x="600" y="552" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">rtp-personal-skills  &#183;  Under the Hood  &#183;  April 2026</text>

</svg>