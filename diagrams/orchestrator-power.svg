<svg viewBox="0 0 1200 520" width="1200" height="520" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="520" fill="#FAFAF8"/>

  <!-- Header band — warm lavender -->
  <rect x="0" y="0" width="1200" height="72" fill="#F5F2FE"/>
  <rect x="0" y="0" width="400" height="72" fill="#F8F5FF" opacity="0.5"/>
  <rect x="800" y="0" width="400" height="72" fill="#F2EEFE" opacity="0.3"/>
  <rect x="0" y="70" width="1200" height="2" fill="#E9E2F8" opacity="0.7"/>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="3">UNDER THE HOOD</text>
  <text x="600" y="56" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="800" fill="#1B1B1F">What Makes the Orchestrator Powerful</text>

  <!-- ========== PANEL 1: SHARED CONTEXT ========== -->
  <!-- Purple-tinted shadow -->
  <rect x="53" y="93" width="350" height="322" rx="14" fill="#C8BDE0" opacity="0.3"/>
  <!-- Card body -->
  <rect x="50" y="90" width="350" height="322" rx="14" fill="#FFFFFF" stroke="#E4DFF0" stroke-width="1.2"/>
  <!-- Header bar -->
  <rect x="50" y="90" width="350" height="40" rx="14" fill="#7C3AED"/>
  <rect x="50" y="116" width="350" height="14" fill="#7C3AED"/>
  <text x="225" y="116" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1.2">SHARED CONTEXT</text>

  <!-- Outer context ring — ethereal -->
  <circle cx="225" cy="210" r="58" fill="none" stroke="#E8E0F8" stroke-width="1.5" stroke-dasharray="8 5"/>
  <!-- Inner context ring — stronger -->
  <circle cx="225" cy="210" r="44" fill="#FAF8FE" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Central orchestrator — glow + node -->
  <circle cx="225" cy="210" r="30" fill="#F5F3FF" opacity="0.5"/>
  <circle cx="225" cy="210" r="20" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="225" y="214" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#7C3AED">ORCH</text>

  <!-- 6 worker dots — large enough to read, color-encoded -->
  <!-- Top: Finder (teal) -->
  <circle cx="225" cy="142" r="12" fill="#14B8A6" opacity="0.15"/>
  <circle cx="225" cy="142" r="9" fill="#14B8A6"/>
  <!-- Top-right: Strategist (purple) -->
  <circle cx="278" cy="177" r="12" fill="#7C3AED" opacity="0.15"/>
  <circle cx="278" cy="177" r="9" fill="#7C3AED"/>
  <!-- Bottom-right: Designer (cyan) -->
  <circle cx="278" cy="243" r="12" fill="#06B6D4" opacity="0.15"/>
  <circle cx="278" cy="243" r="9" fill="#06B6D4"/>
  <!-- Bottom: Eval (amber) -->
  <circle cx="225" cy="278" r="12" fill="#F59E0B" opacity="0.15"/>
  <circle cx="225" cy="278" r="9" fill="#F59E0B"/>
  <!-- Bottom-left: Safety (pink) -->
  <circle cx="172" cy="243" r="12" fill="#EC4899" opacity="0.15"/>
  <circle cx="172" cy="243" r="9" fill="#EC4899"/>
  <!-- Top-left: Spec (green) -->
  <circle cx="172" cy="177" r="12" fill="#16A34A" opacity="0.15"/>
  <circle cx="172" cy="177" r="9" fill="#16A34A"/>

  <!-- Context arrows — orchestrator distributes outward -->
  <path d="M 225,190 C 225,176 225,162 225,155" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 222,158 L 225,150 L 228,158" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 242,198 C 254,190 266,184 272,180" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 269,175 L 275,179 L 270,184" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 242,222 C 254,230 266,236 272,240" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 270,236 L 275,241 L 269,245" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 225,230 C 225,246 225,262 225,269" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 222,266 L 225,274 L 228,266" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 208,222 C 196,230 184,236 178,240" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 181,245 L 175,241 L 180,236" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 208,198 C 196,190 184,184 178,180" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 180,184 L 175,179 L 181,175" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Compact inline legend — single row -->
  <circle cx="140" cy="308" r="4" fill="#14B8A6"/>
  <circle cx="165" cy="308" r="4" fill="#7C3AED"/>
  <circle cx="190" cy="308" r="4" fill="#06B6D4"/>
  <circle cx="215" cy="308" r="4" fill="#F59E0B"/>
  <circle cx="240" cy="308" r="4" fill="#EC4899"/>
  <circle cx="265" cy="308" r="4" fill="#16A34A"/>
  <text x="225" y="324" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">6 expert teams</text>

  <!-- Explanation text -->
  <text x="225" y="352" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">6 teams. One shared context.</text>
  <text x="225" y="376" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Every worker knows the goal,</text>
  <text x="225" y="394" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">the plan, and how their piece fits.</text>

  <!-- ========== PANEL 2: LAYERED VERIFICATION ========== -->
  <!-- Teal-tinted shadow -->
  <rect x="428" y="93" width="350" height="322" rx="14" fill="#A8E0D4" opacity="0.25"/>
  <!-- Card body -->
  <rect x="425" y="90" width="350" height="322" rx="14" fill="#FFFFFF" stroke="#CCE8E2" stroke-width="1.2"/>
  <!-- Header bar -->
  <rect x="425" y="90" width="350" height="40" rx="14" fill="#14B8A6"/>
  <rect x="425" y="116" width="350" height="14" fill="#14B8A6"/>
  <text x="600" y="116" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1.2">LAYERED VERIFICATION</text>

  <!-- Layer 1: Thinking — with left accent bar -->
  <rect x="462" y="148" width="276" height="50" rx="10" fill="#F9F7FE" stroke="#DDD6F3" stroke-width="1"/>
  <rect x="462" y="152" width="3" height="42" rx="1.5" fill="#7C3AED"/>
  <text x="478" y="170" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#7C3AED">Thinking</text>
  <text x="478" y="188" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#6D28D9">10 checks run first</text>

  <!-- Gate 1 — warm checkpoint, not error -->
  <path d="M 600,198 L 600,216" stroke="#B0B8C4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="574" y="204" width="52" height="18" rx="9" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="600" y="217" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#EA580C">GATE</text>

  <!-- Layer 2: Judgment — with left accent bar -->
  <rect x="462" y="228" width="276" height="50" rx="10" fill="#F0FDFA" stroke="#C5EEE6" stroke-width="1"/>
  <rect x="462" y="232" width="3" height="42" rx="1.5" fill="#14B8A6"/>
  <text x="478" y="250" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#0F766E">Judgment</text>
  <text x="478" y="268" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#0F766E">36 domain calls</text>

  <!-- Gate 2 -->
  <path d="M 600,278 L 600,296" stroke="#B0B8C4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="574" y="284" width="52" height="18" rx="9" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="600" y="297" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#EA580C">GATE</text>

  <!-- Layer 3: Craft — with left accent bar -->
  <rect x="462" y="308" width="276" height="50" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <rect x="462" y="312" width="3" height="42" rx="1.5" fill="#F59E0B"/>
  <text x="478" y="330" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#B45309">Craft</text>
  <text x="478" y="348" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#B45309">8 generators ship</text>

  <!-- Explanation text -->
  <text x="600" y="384" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">Each layer earns the next.</text>
  <text x="600" y="400" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Gates refuse to proceed on bad inputs.</text>

  <!-- ========== PANEL 3: COMPOUNDING INTELLIGENCE ========== -->
  <!-- Amber-tinted shadow -->
  <rect x="803" y="93" width="350" height="322" rx="14" fill="#F0D8A8" opacity="0.28"/>
  <!-- Card body -->
  <rect x="800" y="90" width="350" height="322" rx="14" fill="#FFFFFF" stroke="#EDE0C8" stroke-width="1.2"/>
  <!-- Header bar -->
  <rect x="800" y="90" width="350" height="40" rx="14" fill="#F59E0B"/>
  <rect x="800" y="116" width="350" height="14" fill="#F59E0B"/>
  <text x="975" y="116" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1.2">COMPOUNDING INTELLIGENCE</text>

  <!-- Outer orbit -->
  <circle cx="975" cy="220" r="65" fill="none" stroke="#FDE68A" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.5"/>

  <!-- Three loop nodes — bold and readable -->
  <!-- Top: Session -->
  <rect x="943" y="146" width="64" height="28" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="975" y="165" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#B45309">Session</text>

  <!-- Bottom-right: Pattern -->
  <rect x="1016" y="254" width="64" height="28" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="1048" y="273" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#B45309">Pattern</text>

  <!-- Bottom-left: Rule -->
  <rect x="870" y="254" width="64" height="28" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="902" y="273" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#B45309">Rule</text>

  <!-- Bold clockwise arrows (3px) -->
  <!-- Session → Pattern -->
  <path d="M 1007,164 C 1044,180 1062,216 1048,254" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 1044,249 L 1049,260 L 1053,249" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pattern → Rule -->
  <path d="M 1016,272 C 990,290 948,290 934,272" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 938,276 L 931,268 L 930,280" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Rule → Session -->
  <path d="M 900,254 C 894,222 912,186 943,166" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 939,170 L 946,160 L 948,172" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 3x badge — prominent with depth -->
  <rect x="957" y="210" width="36" height="24" rx="8" fill="#D97706" opacity="0.3"/>
  <rect x="955" y="208" width="36" height="24" rx="8" fill="#F59E0B"/>
  <text x="973" y="225" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">3x</text>

  <!-- Explanation text -->
  <text x="975" y="310" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">The system learns from running.</text>
  <text x="975" y="334" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">After 3 confirmations, a pattern</text>
  <text x="975" y="352" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">gets promoted to a rule.</text>

  <text x="975" y="380" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">10th iteration is structurally different</text>
  <text x="975" y="396" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">from the 1st.</text>

  <!-- ========== PUNCHLINE CALLOUT ========== -->
  <rect x="120" y="436" width="960" height="44" rx="8" fill="#FAF8FF"/>
  <rect x="120" y="436" width="4" height="44" rx="2" fill="#7C3AED"/>
  <text x="144" y="455" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">A great orchestrator doesn't distribute tasks.</text>
  <text x="144" y="473" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="400" fill="#6B7280">It distributes understanding.</text>

  <!-- Footer -->
  <rect x="400" y="498" width="400" height="1" fill="#E5E7EB" opacity="0.4"/>
  <text x="600" y="514" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">rtp-personal-skills  &#183;  Under the Hood  &#183;  April 2026</text>

</svg>
