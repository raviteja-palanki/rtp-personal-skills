<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" width="1200" height="570">
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="570" fill="#FAFAF8"/>

  <!-- Header band — warmer -->
  <rect x="0" y="0" width="1200" height="76" fill="#F7F4EE"/>
  <rect x="0" y="74" width="1200" height="2" fill="#E8E4DD" opacity="0.6"/>
  <text x="40" y="30" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5" fill="#7C3AED">LAYER 1  /  THINKING</text>
  <text x="40" y="56" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#1B1B1F">10 Checks Before You're Allowed to Decide</text>

  <!-- ======================== ROW 1 ======================== -->

  <!-- Card 1: First Principles — deep purple (foundational) — stronger shadow -->
  <rect x="23" y="100" width="218" height="152" rx="12" fill="#C4B5FD" opacity="0.28"/>
  <rect x="20" y="98" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1"/>
  <rect x="20" y="98" width="218" height="34" rx="12" fill="#6D28D9"/>
  <rect x="20" y="116" width="218" height="16" fill="#6D28D9"/>
  <text x="32" y="120" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">First Principles</text>
  <text x="32" y="152" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">Find the ONE atomic</text>
  <text x="32" y="170" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">operation underneath all</text>
  <text x="32" y="186" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">the complexity.</text>
  <!-- Bottom accent line — foundational marker -->
  <rect x="20" y="248" width="218" height="2" rx="1" fill="#6D28D9" opacity="0.3"/>

  <!-- Card 2: Bias Spotter — medium purple (analytical) — lighter shadow -->
  <rect x="256" y="101" width="218" height="152" rx="12" fill="#C4B5FD" opacity="0.14"/>
  <rect x="253" y="99" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#E9D5FF" stroke-width="1"/>
  <rect x="253" y="99" width="218" height="34" rx="12" fill="#7C3AED"/>
  <rect x="253" y="117" width="218" height="16" fill="#7C3AED"/>
  <text x="265" y="121" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Bias Spotter</text>
  <text x="265" y="153" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">Are you seeing what you</text>
  <text x="265" y="171" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">want to see, or what's</text>
  <text x="265" y="187" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">actually there?</text>

  <!-- Card 3: Falsification — medium purple (analytical) — lighter shadow -->
  <rect x="488" y="99" width="218" height="152" rx="12" fill="#C4B5FD" opacity="0.14"/>
  <rect x="486" y="97" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#E9D5FF" stroke-width="1"/>
  <rect x="486" y="97" width="218" height="34" rx="12" fill="#7C3AED"/>
  <rect x="486" y="115" width="218" height="16" fill="#7C3AED"/>
  <text x="498" y="119" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Falsification</text>
  <text x="498" y="151" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">Under what conditions is</text>
  <text x="498" y="169" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">your best recommendation</text>
  <text x="498" y="185" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">dead wrong?</text>

  <!-- Card 4: Failure Design — medium-deep purple (analytical) — lighter shadow -->
  <rect x="721" y="100" width="218" height="152" rx="12" fill="#C4B5FD" opacity="0.14"/>
  <rect x="719" y="98" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#E9D5FF" stroke-width="1"/>
  <rect x="719" y="98" width="218" height="34" rx="12" fill="#7E22CE"/>
  <rect x="719" y="116" width="218" height="16" fill="#7E22CE"/>
  <text x="731" y="120" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Failure Design</text>
  <text x="731" y="152" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">Where does it fail</text>
  <text x="731" y="170" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">gracefully vs. fail</text>
  <text x="731" y="186" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">dangerously?</text>

  <!-- Card 5: Stress Test — medium purple (analytical) — lighter shadow -->
  <rect x="955" y="101" width="218" height="152" rx="12" fill="#C4B5FD" opacity="0.14"/>
  <rect x="952" y="99" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#E9D5FF" stroke-width="1"/>
  <rect x="952" y="99" width="218" height="34" rx="12" fill="#7C3AED"/>
  <rect x="952" y="117" width="218" height="16" fill="#7C3AED"/>
  <text x="964" y="121" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Stress Test</text>
  <text x="964" y="153" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">What happens at 10x scale,</text>
  <text x="964" y="171" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">0.1x budget, or hostile</text>
  <text x="964" y="187" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">input?</text>

  <!-- ======================== ROW 2 (28px gap from row 1) ======================== -->

  <!-- Card 6: Dual Lens — lighter purple (interpersonal) — spread shadow -->
  <rect x="22" y="280" width="218" height="152" rx="12" fill="#DDD6FE" opacity="0.14"/>
  <rect x="20" y="278" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#EDE9FE" stroke-width="1"/>
  <rect x="20" y="278" width="218" height="34" rx="12" fill="#8B5CF6"/>
  <rect x="20" y="296" width="218" height="16" fill="#8B5CF6"/>
  <text x="32" y="300" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Dual Lens</text>
  <text x="32" y="332" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">Business framing AND</text>
  <text x="32" y="350" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">technical framing.</text>
  <text x="32" y="366" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">Every time.</text>

  <!-- Card 7: Determinism Compass — deep purple (foundational) — stronger shadow -->
  <rect x="255" y="279" width="218" height="152" rx="12" fill="#C4B5FD" opacity="0.28"/>
  <rect x="253" y="277" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1"/>
  <rect x="253" y="277" width="218" height="34" rx="12" fill="#6D28D9"/>
  <rect x="253" y="295" width="218" height="16" fill="#6D28D9"/>
  <text x="265" y="299" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Determinism Compass</text>
  <text x="265" y="331" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">How probabilistic is this?</text>
  <text x="265" y="349" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">Who bears the uncertainty</text>
  <text x="265" y="365" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">cost?</text>
  <!-- Bottom accent line — foundational marker -->
  <rect x="253" y="427" width="218" height="2" rx="1" fill="#6D28D9" opacity="0.3"/>

  <!-- Card 8: Problem Type — deep purple (foundational) — stronger shadow -->
  <rect x="489" y="280" width="218" height="152" rx="12" fill="#C4B5FD" opacity="0.28"/>
  <rect x="486" y="278" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1"/>
  <rect x="486" y="278" width="218" height="34" rx="12" fill="#6D28D9"/>
  <rect x="486" y="296" width="218" height="16" fill="#6D28D9"/>
  <text x="498" y="300" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Problem Type</text>
  <text x="498" y="332" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">Is this a known solution,</text>
  <text x="498" y="350" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">or genuine exploration?</text>
  <text x="498" y="366" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">Different tools for each.</text>
  <!-- Bottom accent line — foundational marker -->
  <rect x="486" y="428" width="218" height="2" rx="1" fill="#6D28D9" opacity="0.3"/>

  <!-- Card 9: Alignment Check — lighter purple (interpersonal) — spread shadow -->
  <rect x="720" y="279" width="218" height="152" rx="12" fill="#DDD6FE" opacity="0.14"/>
  <rect x="719" y="277" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#EDE9FE" stroke-width="1"/>
  <rect x="719" y="277" width="218" height="34" rx="12" fill="#8B5CF6"/>
  <rect x="719" y="295" width="218" height="16" fill="#8B5CF6"/>
  <text x="731" y="299" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Alignment Check</text>
  <text x="731" y="331" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">Does your team actually</text>
  <text x="731" y="349" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">agree, or just not</text>
  <text x="731" y="365" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">disagree?</text>

  <!-- Card 10: Judgment Guard — lighter purple (interpersonal) — spread shadow -->
  <rect x="954" y="280" width="218" height="152" rx="12" fill="#DDD6FE" opacity="0.14"/>
  <rect x="952" y="278" width="218" height="152" rx="12" fill="#FFFFFF" stroke="#EDE9FE" stroke-width="1"/>
  <rect x="952" y="278" width="218" height="34" rx="12" fill="#8B5CF6"/>
  <rect x="952" y="296" width="218" height="16" fill="#8B5CF6"/>
  <text x="964" y="300" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Judgment Guard</text>
  <text x="964" y="332" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#374151">Which cognitive bias is</text>
  <text x="964" y="350" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">most likely hijacking</text>
  <text x="964" y="366" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280">this decision?</text>

  <!-- ======================== CALLOUT — Pull Quote ======================== -->
  <!-- Left accent bar — 5px wide -->
  <rect x="40" y="462" width="5" height="64" rx="2" fill="#7C3AED"/>
  <!-- Callout background with warm tint -->
  <rect x="52" y="460" width="1108" height="68" rx="12" fill="#FAF8FF" stroke="#E9D5FF" stroke-width="1"/>
  <!-- Quote text -->
  <text x="76" y="490" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#4C1D95">These don't produce documents.</text>
  <text x="76" y="514" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="400" fill="#6D28D9">They produce confidence that the documents are worth writing.</text>

  <!-- ======================== FOOTER ======================== -->
  <rect x="40" y="544" width="1120" height="1" fill="#E5E7EB" opacity="0.4"/>
  <text x="600" y="562" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">Layer 1  /  Thinking  /  10 Skills  /  April 2026</text>
</svg>