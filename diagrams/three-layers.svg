<svg viewBox="0 0 1200 620" width="1200" height="620" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="620" fill="#FAFAF8"/>

  <!-- Header band -->
  <rect x="0" y="0" width="1200" height="68" fill="#F7F5F0"/>
  <rect x="0" y="66" width="1200" height="2" fill="#E8E4DD" opacity="0.6"/>
  <text x="600" y="30" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5" fill="#7C3AED">THREE LAYERS</text>
  <text x="600" y="52" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#1B1B1F">Why the Output Was Trustworthy</text>

  <!-- ======================== LEFT HALF: LAYER CAKE ======================== -->

  <!-- Layer 1: Thinking — shadow (purple-tinted) -->
  <rect x="53" y="93" width="504" height="96" rx="12" fill="#C4B5FD" opacity="0.25"/>
  <!-- Layer 1: Thinking — card -->
  <rect x="50" y="90" width="504" height="96" rx="12" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <!-- Layer 1: header bar -->
  <rect x="50" y="90" width="504" height="34" rx="12" fill="#7C3AED"/>
  <rect x="50" y="108" width="504" height="16" fill="#7C3AED"/>
  <text x="74" y="112" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Layer 1: Thinking</text>
  <text x="470" y="112" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#E9D5FF">10 checks</text>
  <text x="74" y="148" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Are you solving the right problem?</text>
  <text x="74" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#6B7280">What would make you wrong?</text>

  <!-- Arrow 1: purple-tinted bezier -->
  <path d="M 302,186 C 302,196 298,200 302,210" stroke="#B0A0D0" stroke-width="2" stroke-dasharray="6,4" fill="none" stroke-linecap="round"/>
  <polygon points="296,207 302,218 308,207" fill="#9B8AC4"/>

  <!-- Layer 2: Judgment — shadow (teal-tinted) -->
  <rect x="53" y="228" width="504" height="96" rx="12" fill="#99F6E4" opacity="0.2"/>
  <!-- Layer 2: Judgment — card -->
  <rect x="50" y="225" width="504" height="96" rx="12" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1"/>
  <!-- Layer 2: header bar -->
  <rect x="50" y="225" width="504" height="34" rx="12" fill="#0D9488"/>
  <rect x="50" y="243" width="504" height="16" fill="#0D9488"/>
  <text x="74" y="247" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Layer 2: Judgment</text>
  <text x="470" y="247" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#CCFBF1">36 skills</text>
  <text x="74" y="283" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Build or buy? What autonomy level?</text>
  <text x="74" y="303" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#6B7280">Where does it fail dangerously?</text>

  <!-- Arrow 2: purple-tinted bezier -->
  <path d="M 302,321 C 302,331 298,335 302,345" stroke="#B0A0D0" stroke-width="2" stroke-dasharray="6,4" fill="none" stroke-linecap="round"/>
  <polygon points="296,342 302,353 308,342" fill="#9B8AC4"/>

  <!-- Layer 3: Craft — shadow (amber-tinted) -->
  <rect x="53" y="363" width="504" height="92" rx="12" fill="#FDE68A" opacity="0.2"/>
  <!-- Layer 3: Craft — card body with warm parchment tint -->
  <rect x="50" y="360" width="504" height="92" rx="12" fill="#FFFDF7" stroke="#FDE68A" stroke-width="1"/>
  <!-- Layer 3: header bar -->
  <rect x="50" y="360" width="504" height="34" rx="12" fill="#D97706"/>
  <rect x="50" y="378" width="504" height="16" fill="#D97706"/>
  <text x="74" y="382" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Layer 3: Craft</text>
  <text x="470" y="382" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#FEF3C7">8 generators</text>
  <text x="74" y="416" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Won't start until Layers 1 and 2 have run.</text>
  <text x="74" y="436" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#6B7280">Every output pre-tested.</text>

  <!-- ======================== RIGHT HALF: BEFORE / AFTER ======================== -->

  <!-- WITHOUT panel — ghostly washed background -->
  <rect x="623" y="93" width="530" height="155" rx="12" fill="#FECACA" opacity="0.18"/>
  <!-- WITHOUT panel card -->
  <rect x="620" y="90" width="530" height="155" rx="12" fill="#FFFBFB" stroke="#FCA5A5" stroke-width="1.5"/>
  <!-- Faint diagonal line pattern via thin lines -->
  <line x1="620" y1="130" x2="660" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="620" y1="170" x2="700" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="620" y1="210" x2="740" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="620" y1="245" x2="780" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="660" y1="245" x2="820" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="700" y1="245" x2="860" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="740" y1="245" x2="900" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="780" y1="245" x2="940" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="820" y1="245" x2="980" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="860" y1="245" x2="1020" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="900" y1="245" x2="1060" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="940" y1="245" x2="1100" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="980" y1="245" x2="1150" y2="90" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="1020" y1="245" x2="1150" y2="130" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="1060" y1="245" x2="1150" y2="170" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <line x1="1100" y1="245" x2="1150" y2="210" stroke="#FCA5A5" stroke-width="0.5" opacity="0.15"/>
  <!-- X mark — prominent circle + X -->
  <circle cx="1108" cy="112" r="16" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <line x1="1100" y1="104" x2="1116" y2="120" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1116" y1="104" x2="1100" y2="120" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Header -->
  <text x="646" y="118" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#DC2626">Without the layers</text>
  <!-- Weak/vague text -->
  <text x="646" y="148" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#B0A8A8" font-style="italic">"We should leverage AI to enhance developer</text>
  <text x="646" y="167" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#B0A8A8" font-style="italic">productivity. The market opportunity is</text>
  <text x="646" y="186" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#B0A8A8" font-style="italic">significant."</text>
  <!-- Label for weak output — readable red -->
  <text x="646" y="224" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5" fill="#DC7070">GENERIC   /   NO SPECIFICS   /   NO FALSIFIABILITY</text>

  <!-- WITH panel — shadow (green-tinted) -->
  <rect x="623" y="293" width="530" height="172" rx="12" fill="#BBF7D0" opacity="0.2"/>
  <!-- WITH panel card -->
  <rect x="620" y="290" width="530" height="172" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <!-- Green left accent bar for triumph feel -->
  <rect x="620" y="290" width="3" height="172" rx="1" fill="#16A34A"/>
  <!-- Checkmark — prominent circle + check -->
  <circle cx="1108" cy="312" r="16" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <polyline points="1098,312 1105,320 1118,304" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Header -->
  <text x="646" y="318" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#16A34A">With the layers</text>
  <!-- Sharp, specific, authoritative text -->
  <text x="646" y="348" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#1B1B1F">A spec where engineering estimates from acceptance</text>
  <text x="646" y="367" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#1B1B1F">criteria, finance models unit economics, QA has</text>
  <text x="646" y="386" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#1B1B1F">testable thresholds, and there's a WHEN WRONG</text>
  <text x="646" y="405" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#1B1B1F">section naming three assumptions that would</text>
  <text x="646" y="424" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#1B1B1F">invalidate the plan.</text>
  <!-- Label for strong output — vivid green -->
  <text x="646" y="448" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5" fill="#22C55E">SPECIFIC   /   TESTABLE   /   PRE-FALSIFIED</text>

  <!-- ======================== PULL QUOTE ======================== -->
  <!-- Purple left accent bar -->
  <rect x="40" y="498" width="4" height="62" rx="2" fill="#7C3AED"/>
  <!-- Callout background -->
  <rect x="52" y="496" width="1108" height="66" rx="12" fill="#FAF8FF" stroke="#E9D5FF" stroke-width="1"/>
  <!-- Pull quote — bold first sentence, lighter second -->
  <text x="76" y="522" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#4C1D95">A beautiful PRD built on the wrong assumptions isn't a document.</text>
  <text x="76" y="546" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="400" fill="#6D28D9">It's a delayed disaster with nice formatting.</text>

  <!-- ======================== FOOTER ======================== -->
  <rect x="40" y="580" width="1120" height="1" fill="#E5E7EB" opacity="0.5"/>
  <text x="600" y="604" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">rtp-personal-skills  /  Three Layers  /  April 2026</text>

</svg>