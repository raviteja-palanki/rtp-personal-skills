<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" width="1200" height="880" role="img" aria-label="The orchestrator listens, classifies, deploys agents, reviews their output, and synthesizes one decisive answer.">
  <title>The Orchestrator</title>
  <desc>Architecture diagram of how the orchestrator processes any input: silent reading and classification, parallel agent deployment, quality review, then a single executive-level synthesis to the user.</desc>
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.09"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="880" rx="16" fill="#FAFAF8"/>

  <!-- Header band -->
  <rect x="0" y="0" width="1200" height="80" rx="16" fill="#9478B8"/>
  <rect x="0" y="60" width="1200" height="20" fill="#9478B8"/>
  <text x="600" y="36" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="800" font-family="Inter, Segoe UI, sans-serif">The Orchestrator — A Brain, Not a Router</text>
  <text x="600" y="62" text-anchor="middle" fill="#E8D5FF" font-size="15" font-family="Inter, sans-serif">Depth — Comprehensive · How every input becomes a world-class output</text>

  <!-- Central brain node -->
  <rect x="420" y="110" width="360" height="90" rx="20" fill="#F8F5FF" stroke="#9478B8" stroke-width="3" filter="url(#s)"/>
  <text x="600" y="148" text-anchor="middle" fill="#5B3E7A" font-size="20" font-weight="800" font-family="Inter, Segoe UI, sans-serif">Your Input Arrives</text>
  <text x="600" y="175" text-anchor="middle" fill="#7556A0" font-size="14" font-family="Inter, sans-serif">"Write me a PRD for our AI coding assistant"</text>

  <!-- Arrow down from input -->
  <path d="M 600 200 L 600 230" stroke="#9CA3AF" stroke-width="2" fill="none"/>
  <polygon points="595,228 600,238 605,228" fill="#9CA3AF"/>

  <!-- Step 1: Listen -->
  <rect x="60" y="240" width="210" height="110" rx="14" fill="#FFFFFF" stroke="#D4789B" stroke-width="2" filter="url(#s)"/>
  <rect x="60" y="240" width="210" height="40" rx="14" fill="#D4789B"/>
  <rect x="60" y="266" width="210" height="14" fill="#D4789B"/>
  <text x="165" y="266" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" font-family="Inter, sans-serif">1. Listen Deeply</text>
  <text x="165" y="300" text-anchor="middle" fill="#5F6B7A" font-size="12" font-family="Inter, sans-serif">What did they mean?</text>
  <text x="165" y="318" text-anchor="middle" fill="#5F6B7A" font-size="12" font-family="Inter, sans-serif">What's the hidden constraint?</text>
  <text x="165" y="336" text-anchor="middle" fill="#8B3A5A" font-size="11" font-weight="600" font-family="Inter, sans-serif">Intent, not just words</text>

  <!-- Step 2: Classify -->
  <rect x="290" y="240" width="210" height="110" rx="14" fill="#FFFFFF" stroke="#5A9ABE" stroke-width="2" filter="url(#s)"/>
  <rect x="290" y="240" width="210" height="40" rx="14" fill="#5A9ABE"/>
  <rect x="290" y="266" width="210" height="14" fill="#5A9ABE"/>
  <text x="395" y="266" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" font-family="Inter, sans-serif">2. Classify the Ask</text>
  <text x="395" y="300" text-anchor="middle" fill="#5F6B7A" font-size="12" font-family="Inter, sans-serif">Quick answer? Deep thinking?</text>
  <text x="395" y="318" text-anchor="middle" fill="#5F6B7A" font-size="12" font-family="Inter, sans-serif">Direct action?</text>
  <text x="395" y="336" text-anchor="middle" fill="#2A5F7A" font-size="11" font-weight="600" font-family="Inter, sans-serif">Match depth to complexity</text>

  <!-- Step 3: Think -->
  <rect x="520" y="240" width="210" height="110" rx="14" fill="#FFFFFF" stroke="#D4A54A" stroke-width="2" filter="url(#s)"/>
  <rect x="520" y="240" width="210" height="40" rx="14" fill="#D4A54A"/>
  <rect x="520" y="266" width="210" height="14" fill="#D4A54A"/>
  <text x="625" y="266" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" font-family="Inter, sans-serif">3. Activate Thinking</text>
  <text x="625" y="300" text-anchor="middle" fill="#5F6B7A" font-size="12" font-family="Inter, sans-serif">First principles. Bias check.</text>
  <text x="625" y="318" text-anchor="middle" fill="#5F6B7A" font-size="12" font-family="Inter, sans-serif">Red Team. Cost reality.</text>
  <text x="625" y="336" text-anchor="middle" fill="#7A5A1E" font-size="11" font-weight="600" font-family="Inter, sans-serif">10 algorithms, context-selected</text>

  <!-- Step 4: Deploy -->
  <rect x="750" y="240" width="210" height="110" rx="14" fill="#FFFFFF" stroke="#6BA898" stroke-width="2" filter="url(#s)"/>
  <rect x="750" y="240" width="210" height="40" rx="14" fill="#6BA898"/>
  <rect x="750" y="266" width="210" height="14" fill="#6BA898"/>
  <text x="855" y="266" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" font-family="Inter, sans-serif">4. Deploy Workers</text>
  <text x="855" y="300" text-anchor="middle" fill="#5F6B7A" font-size="12" font-family="Inter, sans-serif">Parallel where independent.</text>
  <text x="855" y="318" text-anchor="middle" fill="#5F6B7A" font-size="12" font-family="Inter, sans-serif">Sequential where dependent.</text>
  <text x="855" y="336" text-anchor="middle" fill="#2E6B54" font-size="11" font-weight="600" font-family="Inter, sans-serif">Right agents, right order</text>

  <!-- Connecting arrows between steps -->
  <path d="M 270 295 L 290 295" stroke="#9CA3AF" stroke-width="2" fill="none"/>
  <polygon points="288,291 296,295 288,299" fill="#9CA3AF"/>
  <path d="M 500 295 L 520 295" stroke="#9CA3AF" stroke-width="2" fill="none"/>
  <polygon points="518,291 526,295 518,299" fill="#9CA3AF"/>
  <path d="M 730 295 L 750 295" stroke="#9CA3AF" stroke-width="2" fill="none"/>
  <polygon points="748,291 756,295 748,299" fill="#9CA3AF"/>

  <!-- Horizontal divider with parallel-deploy label -->
  <line x1="60" y1="223" x2="450" y2="223" stroke="#C8B8E0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="750" y1="223" x2="1140" y2="223" stroke="#C8B8E0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="600" y="227" text-anchor="middle" fill="#7556A0" font-size="10" font-weight="700" font-family="Inter, sans-serif" letter-spacing="2">DEPLOY ALL FOUR IN PARALLEL</text>

  <!-- Worker Agents Section -->
  <text x="600" y="390" text-anchor="middle" fill="#5B3E7A" font-size="18" font-weight="800" font-family="Inter, Segoe UI, sans-serif">The Worker Agents — Deployed by the Orchestrator</text>
  <text x="600" y="412" text-anchor="middle" fill="#78716C" font-size="13" font-family="Inter, sans-serif">Each worker combines specialized skills + persona context + memory from prior executions</text>

  <!-- Agent cards row 1 -->
  <rect x="40" y="432" width="175" height="130" rx="12" fill="#FFFFFF" stroke="#D4789B" stroke-width="2" filter="url(#s)"/>
  <rect x="40" y="432" width="175" height="34" rx="12" fill="#D4789B"/>
  <rect x="40" y="454" width="175" height="12" fill="#D4789B"/>
  <text x="128" y="456" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700" font-family="Inter, sans-serif">Sense-Maker</text>
  <text x="128" y="486" text-anchor="middle" fill="#5F6B7A" font-size="11" font-family="Inter, sans-serif">The real problem</text>
  <rect x="52" y="498" width="70" height="22" rx="6" fill="#FFE4ED" stroke="#F5B8CB" stroke-width="1"/>
  <text x="87" y="513" text-anchor="middle" fill="#A64D6E" font-size="11" font-weight="600" font-family="Inter, sans-serif">first-principles</text>
  <rect x="128" y="498" width="76" height="22" rx="6" fill="#FFE4ED" stroke="#F5B8CB" stroke-width="1"/>
  <text x="166" y="513" text-anchor="middle" fill="#A64D6E" font-size="11" font-weight="600" font-family="Inter, sans-serif">problem-ai-fit</text>
  <rect x="52" y="524" width="76" height="22" rx="6" fill="#FFE4ED" stroke="#F5B8CB" stroke-width="1"/>
  <text x="90" y="539" text-anchor="middle" fill="#A64D6E" font-size="11" font-weight="600" font-family="Inter, sans-serif">use-case-ready</text>
  <rect x="134" y="524" width="70" height="22" rx="6" fill="#FFE4ED" stroke="#F5B8CB" stroke-width="1"/>
  <text x="169" y="539" text-anchor="middle" fill="#A64D6E" font-size="11" font-weight="600" font-family="Inter, sans-serif">needs-guard</text>

  <rect x="230" y="432" width="175" height="130" rx="12" fill="#FFFFFF" stroke="#9478B8" stroke-width="2" filter="url(#s)"/>
  <rect x="230" y="432" width="175" height="34" rx="12" fill="#9478B8"/>
  <rect x="230" y="454" width="175" height="12" fill="#9478B8"/>
  <text x="318" y="456" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700" font-family="Inter, sans-serif">Strategist</text>
  <text x="318" y="486" text-anchor="middle" fill="#5F6B7A" font-size="11" font-family="Inter, sans-serif">Where to invest, what to kill</text>
  <rect x="242" y="498" width="78" height="22" rx="6" fill="#EDE5F8" stroke="#CDBEE8" stroke-width="1"/>
  <text x="281" y="513" text-anchor="middle" fill="#7556A0" font-size="11" font-weight="600" font-family="Inter, sans-serif">strategy-canvas</text>
  <rect x="326" y="498" width="68" height="22" rx="6" fill="#EDE5F8" stroke="#CDBEE8" stroke-width="1"/>
  <text x="360" y="513" text-anchor="middle" fill="#7556A0" font-size="11" font-weight="600" font-family="Inter, sans-serif">moat-finder</text>
  <rect x="242" y="524" width="74" height="22" rx="6" fill="#EDE5F8" stroke="#CDBEE8" stroke-width="1"/>
  <text x="279" y="539" text-anchor="middle" fill="#7556A0" font-size="11" font-weight="600" font-family="Inter, sans-serif">build-or-buy</text>
  <rect x="322" y="524" width="74" height="22" rx="6" fill="#EDE5F8" stroke="#CDBEE8" stroke-width="1"/>
  <text x="359" y="539" text-anchor="middle" fill="#7556A0" font-size="11" font-weight="600" font-family="Inter, sans-serif">cost-reality</text>

  <rect x="420" y="432" width="175" height="130" rx="12" fill="#FFFFFF" stroke="#5A9ABE" stroke-width="2" filter="url(#s)"/>
  <rect x="420" y="432" width="175" height="34" rx="12" fill="#5A9ABE"/>
  <rect x="420" y="454" width="175" height="12" fill="#5A9ABE"/>
  <text x="508" y="456" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700" font-family="Inter, sans-serif">System Architect</text>
  <text x="508" y="486" text-anchor="middle" fill="#5F6B7A" font-size="11" font-family="Inter, sans-serif">Right autonomy, right controls</text>
  <rect x="432" y="498" width="90" height="22" rx="6" fill="#DFF0FA" stroke="#A4D2E8" stroke-width="1"/>
  <text x="477" y="513" text-anchor="middle" fill="#3A7598" font-size="11" font-weight="600" font-family="Inter, sans-serif">autonomy-spectrum</text>
  <rect x="528" y="498" width="56" height="22" rx="6" fill="#DFF0FA" stroke="#A4D2E8" stroke-width="1"/>
  <text x="556" y="513" text-anchor="middle" fill="#3A7598" font-size="11" font-weight="600" font-family="Inter, sans-serif">harness</text>
  <rect x="432" y="524" width="82" height="22" rx="6" fill="#DFF0FA" stroke="#A4D2E8" stroke-width="1"/>
  <text x="473" y="539" text-anchor="middle" fill="#3A7598" font-size="11" font-weight="600" font-family="Inter, sans-serif">tool-architecture</text>

  <rect x="610" y="432" width="175" height="130" rx="12" fill="#FFFFFF" stroke="#D47B64" stroke-width="2" filter="url(#s)"/>
  <rect x="610" y="432" width="175" height="34" rx="12" fill="#D47B64"/>
  <rect x="610" y="454" width="175" height="12" fill="#D47B64"/>
  <text x="698" y="456" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700" font-family="Inter, sans-serif">Safety Expert</text>
  <text x="698" y="486" text-anchor="middle" fill="#5F6B7A" font-size="11" font-family="Inter, sans-serif">Safe AND adopted</text>
  <rect x="622" y="498" width="82" height="22" rx="6" fill="#FFE8E0" stroke="#F0BCA8" stroke-width="1"/>
  <text x="663" y="513" text-anchor="middle" fill="#A45840" font-size="11" font-weight="600" font-family="Inter, sans-serif">safety-by-design</text>
  <rect x="710" y="498" width="64" height="22" rx="6" fill="#FFE8E0" stroke="#F0BCA8" stroke-width="1"/>
  <text x="742" y="513" text-anchor="middle" fill="#A45840" font-size="11" font-weight="600" font-family="Inter, sans-serif">trust-ladder</text>
  <rect x="622" y="524" width="76" height="22" rx="6" fill="#FFE8E0" stroke="#F0BCA8" stroke-width="1"/>
  <text x="660" y="539" text-anchor="middle" fill="#A45840" font-size="11" font-weight="600" font-family="Inter, sans-serif">breach-ready</text>
  <rect x="704" y="524" width="70" height="22" rx="6" fill="#FFE8E0" stroke="#F0BCA8" stroke-width="1"/>
  <text x="739" y="539" text-anchor="middle" fill="#A45840" font-size="11" font-weight="600" font-family="Inter, sans-serif">agent-risk</text>

  <rect x="800" y="432" width="175" height="130" rx="12" fill="#FFFFFF" stroke="#6BA898" stroke-width="2" filter="url(#s)"/>
  <rect x="800" y="432" width="175" height="34" rx="12" fill="#6BA898"/>
  <rect x="800" y="454" width="175" height="12" fill="#6BA898"/>
  <text x="888" y="456" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="700" font-family="Inter, sans-serif">Evals Expert</text>
  <text x="888" y="486" text-anchor="middle" fill="#5F6B7A" font-size="11" font-family="Inter, sans-serif">Evidence, not hope</text>
  <rect x="812" y="498" width="76" height="22" rx="6" fill="#DFF0E8" stroke="#A8D4C0" stroke-width="1"/>
  <text x="850" y="513" text-anchor="middle" fill="#3D8068" font-size="11" font-weight="600" font-family="Inter, sans-serif">eval-framework</text>
  <rect x="894" y="498" width="70" height="22" rx="6" fill="#DFF0E8" stroke="#A8D4C0" stroke-width="1"/>
  <text x="929" y="513" text-anchor="middle" fill="#3D8068" font-size="11" font-weight="600" font-family="Inter, sans-serif">ai-metrics</text>
  <rect x="812" y="524" width="82" height="22" rx="6" fill="#DFF0E8" stroke="#A8D4C0" stroke-width="1"/>
  <text x="853" y="539" text-anchor="middle" fill="#3D8068" font-size="11" font-weight="600" font-family="Inter, sans-serif">experiment-rig</text>
  <rect x="900" y="524" width="66" height="22" rx="6" fill="#DFF0E8" stroke="#A8D4C0" stroke-width="1"/>
  <text x="933" y="539" text-anchor="middle" fill="#3D8068" font-size="11" font-weight="600" font-family="Inter, sans-serif">prod-watch</text>

  <!-- Crafter (below, centered) -->
  <rect x="380" y="595" width="440" height="80" rx="14" fill="#FFFFFF" stroke="#D4A54A" stroke-width="2" filter="url(#s)"/>
  <rect x="380" y="595" width="440" height="34" rx="14" fill="#D4A54A"/>
  <rect x="380" y="617" width="440" height="12" fill="#D4A54A"/>
  <text x="600" y="619" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" font-family="Inter, sans-serif">Crafter — Ship-Ready Artifacts (runs LAST, after all teams)</text>
  <rect x="395" y="641" width="56" height="22" rx="6" fill="#FFF3D6" stroke="#F0D78A" stroke-width="1"/>
  <text x="423" y="656" text-anchor="middle" fill="#946E2A" font-size="11" font-weight="600" font-family="Inter, sans-serif">ai-prd</text>
  <rect x="457" y="641" width="72" height="22" rx="6" fill="#FFF3D6" stroke="#F0D78A" stroke-width="1"/>
  <text x="493" y="656" text-anchor="middle" fill="#946E2A" font-size="11" font-weight="600" font-family="Inter, sans-serif">agent-spec</text>
  <rect x="535" y="641" width="70" height="22" rx="6" fill="#FFF3D6" stroke="#F0D78A" stroke-width="1"/>
  <text x="570" y="656" text-anchor="middle" fill="#946E2A" font-size="11" font-weight="600" font-family="Inter, sans-serif">cost-model</text>
  <rect x="611" y="641" width="78" height="22" rx="6" fill="#FFF3D6" stroke="#F0D78A" stroke-width="1"/>
  <text x="650" y="656" text-anchor="middle" fill="#946E2A" font-size="11" font-weight="600" font-family="Inter, sans-serif">ship-decision</text>
  <rect x="695" y="641" width="86" height="22" rx="6" fill="#FFF3D6" stroke="#F0D78A" stroke-width="1"/>
  <text x="738" y="656" text-anchor="middle" fill="#946E2A" font-size="11" font-weight="600" font-family="Inter, sans-serif">competitive-map</text>

  <!-- Arrows from agents to crafter -->
  <path d="M 128 562 C 128 580 400 587 480 595" stroke="#D4A54A" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 318 562 C 318 580 420 587 500 595" stroke="#D4A54A" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 508 562 L 560 595" stroke="#D4A54A" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 698 562 L 640 595" stroke="#D4A54A" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 888 562 C 888 580 780 587 720 595" stroke="#D4A54A" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- Arrow from crafter to output -->
  <path d="M 600 675 L 600 700" stroke="#7BA86C" stroke-width="3" fill="none"/>
  <polygon points="594,698 600,710 606,698" fill="#7BA86C"/>

  <!-- Output box -->
  <rect x="280" y="710" width="640" height="76" rx="14" fill="#F5FAF2" stroke="#7BA86C" stroke-width="2" filter="url(#s)"/>
  <text x="600" y="742" text-anchor="middle" fill="#3A5E2E" font-size="18" font-weight="700" font-family="Inter, sans-serif">Pre-Tested, Executive-Level Output</text>
  <text x="600" y="766" text-anchor="middle" fill="#4E7A40" font-size="14" font-family="Inter, sans-serif">Engineering builds from it. Finance models it. QA tests against it. Monday morning ready.</text>

  <!-- Feedback loop -->
  <path d="M 920 748 C 990 748 1050 600 1050 400 C 1050 250 990 200 920 195" stroke="#9478B8" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
  <polygon points="922,190 912,195 922,200" fill="#9478B8"/>
  <text x="1085" y="460" text-anchor="middle" fill="#9478B8" font-size="12" font-weight="700" font-family="Inter, sans-serif" transform="rotate(-90, 1085, 460)">Feedback compounds</text>

  <!-- Footer -->
  <text x="600" y="820" text-anchor="middle" fill="#9CA3AF" font-size="13" font-family="Inter, sans-serif">The difference: the thinking happened in the right order. Every document arrives pre-tested.</text>
