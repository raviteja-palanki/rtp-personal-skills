<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="750" fill="#FAFAF8"/>

  <!-- ===== HEADER (y=10-60) ===== -->
  <text x="600" y="36" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="800" fill="#1B1B1F" text-anchor="middle">The Orchestrator — A Brain, Not a Routing Table</text>
  <text x="600" y="56" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#5F6B7A" text-anchor="middle">How one system reasons through any AI product problem</text>

  <!-- ===== ACT 1 — THE PROBLEM (left, x=50-300) ===== -->

  <!-- Problem card — dashed stroke for roughness -->
  <rect x="50" y="120" width="240" height="200" rx="16" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2" stroke-dasharray="8,4"/>

  <text x="80" y="155" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#991B1B">The Problem</text>

  <text x="80" y="185" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">Should we build or buy the RAG layer?</text>
  <text x="80" y="205" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">Is this safe enough to ship?</text>
  <text x="80" y="225" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">What breaks at 10x scale?</text>
  <text x="80" y="245" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">Who pays the cost if we're wrong?</text>

  <text x="80" y="290" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF">Messy. Ambiguous. Real.</text>

  <!-- ===== CONNECTION: Problem → Brain (organic curve) ===== -->
  <path d="M 290 220 C 310 220 320 230 340 230" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,3" fill="none"/>

  <!-- ===== ACT 2 — THE BRAIN (center, x=340-860) ===== -->

  <!-- Shadow fallback -->
  <rect x="344" y="84" width="520" height="400" rx="20" fill="#E5E7EB" opacity="0.25"/>

  <!-- Brain container -->
  <rect x="340" y="80" width="520" height="400" rx="20" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>

  <!-- Purple header band -->
  <rect x="340" y="80" width="520" height="50" rx="20" fill="#8B5CF6"/>
  <!-- Bottom fill to cover the rounded corners at the bottom of the header -->
  <rect x="340" y="100" width="520" height="30" fill="#8B5CF6"/>

  <text x="600" y="112" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">The Orchestrator</text>

  <!-- ===== Step 1: Decompose ===== -->
  <circle cx="370" cy="165" r="6" fill="#8B5CF6"/>
  <text x="390" y="170" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">Decompose from first principles</text>
  <text x="390" y="188" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">What type of problem is this? Who's affected?</text>
  <!-- Subtle dashed underline -->
  <line x1="390" y1="196" x2="720" y2="196" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== Step 2: Pull skills ===== -->
  <circle cx="370" cy="235" r="6" fill="#8B5CF6"/>
  <text x="390" y="240" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">Pull the right skill combination</text>
  <text x="390" y="258" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">Not a lookup. Fresh reasoning every time.</text>

  <!-- Skill chips — staggered, organic positions -->
  <!-- first-principles chip -->
  <rect x="640" y="218" width="110" height="26" rx="13" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="695" y="236" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9" text-anchor="middle">first-principles</text>

  <!-- safety-by-design chip -->
  <rect x="758" y="226" width="95" height="26" rx="13" fill="#CCFBF1" stroke="#5EEAD4" stroke-width="1"/>
  <text x="805" y="244" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#0F766E" text-anchor="middle">safety-by-design</text>

  <!-- token-economics chip -->
  <rect x="660" y="254" width="105" height="26" rx="13" fill="#CCFBF1" stroke="#5EEAD4" stroke-width="1"/>
  <text x="712" y="272" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#0F766E" text-anchor="middle">token-economics</text>

  <!-- stress-test chip -->
  <rect x="774" y="260" width="72" height="26" rx="13" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="810" y="278" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9" text-anchor="middle">stress-test</text>

  <!-- Subtle dashed underline after step 2 -->
  <line x1="390" y1="296" x2="720" y2="296" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== Step 3: Synthesize ===== -->
  <circle cx="370" cy="325" r="6" fill="#8B5CF6"/>
  <text x="390" y="330" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">Synthesize into one actionable output</text>
  <text x="390" y="348" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">CPO reads it Monday morning. Acts on it.</text>

  <!-- ===== Self-correction note (bottom of brain) ===== -->
  <rect x="360" y="380" width="480" height="45" rx="10" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="408" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#B45309" text-anchor="middle">Routes wrong? Pattern captured. Next time: sharper.</text>

  <!-- ===== CONNECTION: Brain → Output (organic curve) ===== -->
  <path d="M 860 230 C 880 230 890 220 900 220" stroke="#16A34A" stroke-width="2" stroke-dasharray="6,3" fill="none"/>

  <!-- ===== ACT 3 — THE OUTPUT (right, x=900-1150) ===== -->

  <!-- Shadow fallback -->
  <rect x="904" y="124" width="250" height="200" rx="16" fill="#D1FAE5" opacity="0.25"/>

  <!-- Output card -->
  <rect x="900" y="120" width="250" height="200" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>

  <text x="930" y="155" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#065F46">The Output</text>

  <text x="930" y="185" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">Engineering ships from this spec</text>
  <text x="930" y="205" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">Finance models the unit economics</text>
  <text x="930" y="225" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">QA knows every failure threshold</text>
  <text x="930" y="250" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#065F46">WHEN WRONG section included</text>

  <text x="930" y="290" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF">Pre-tested. Actionable. Monday-ready.</text>

  <!-- ===== FEEDBACK LOOP (from output back to brain) ===== -->
  <path d="M 1025 320 C 1050 450 700 500 600 480" stroke="#F59E0B" stroke-width="2" stroke-dasharray="8,4" fill="none"/>
  <!-- Polygon arrowhead at the end of the feedback curve -->
  <polygon points="605,484 595,476 600,486" fill="#F59E0B"/>

  <!-- Feedback label -->
  <text x="830" y="460" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#B45309">Self-correction loop</text>

  <!-- ===== CALLOUT (y=560-620, centered) ===== -->
  <rect x="150" y="560" width="900" height="60" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="600" y="596" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#6D28D9" text-anchor="middle">The difference between a library of tools and an operating system that learns.</text>

  <!-- ===== FOOTER ===== -->
  <text x="600" y="720" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">Orchestrator v1.2 · 66 Skills · April 2026</text>

</svg>
