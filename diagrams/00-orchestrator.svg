<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAFAF8"/>

  <!-- ===== HEADER BAND (y=0-80) ===== -->
  <rect x="0" y="0" width="1200" height="80" fill="#F5F3FF"/>
  <text x="600" y="36" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#6D28D9" text-anchor="middle">The Orchestrator</text>
  <text x="600" y="60" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#5F6B7A" text-anchor="middle">Quick Check · A Brain, Not a Routing Table — Reads Context, Routes Skills, Learns From Every Run</text>

  <!-- ===== LEFT COLUMN — Input + Brain ===== -->

  <!-- Input Box (x=50, y=110, w=180, h=100) -->
  <rect x="52" y="113" width="180" height="100" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="50" y="110" width="180" height="100" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="140" y="150" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F" text-anchor="middle">Any AI Product</text>
  <text x="140" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F" text-anchor="middle">Problem</text>
  <text x="140" y="190" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A" text-anchor="middle">Discovery? Safety? Architecture? Eval?</text>

  <!-- Arrow: Input → Brain -->
  <line x1="240" y1="160" x2="275" y2="160" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="275,155 285,160 275,165" fill="#8B5CF6"/>

  <!-- Orchestrator Brain Box (x=290, y=100, w=260, h=280) -->
  <rect x="292" y="103" width="260" height="280" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="290" y="100" width="260" height="280" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- Purple header -->
  <rect x="290" y="100" width="260" height="48" rx="14" fill="#8B5CF6"/>
  <rect x="290" y="130" width="260" height="18" fill="#8B5CF6"/>
  <text x="420" y="130" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Orchestrator v1.2</text>

  <!-- Step 1 -->
  <circle cx="310" cy="175" r="6" fill="#8B5CF6"/>
  <text x="322" y="179" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1B1B1F">1. Decompose</text>
  <text x="322" y="196" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Break down from first principles</text>

  <!-- Step 2 -->
  <circle cx="310" cy="230" r="6" fill="#8B5CF6"/>
  <text x="322" y="234" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1B1B1F">2. Route</text>
  <text x="322" y="251" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Match skill combination to</text>
  <text x="322" y="265" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">this problem</text>

  <!-- Step 3 -->
  <circle cx="310" cy="295" r="6" fill="#8B5CF6"/>
  <text x="322" y="299" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1B1B1F">3. Synthesize</text>
  <text x="322" y="316" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Combine into actionable output</text>

  <!-- ===== RIGHT COLUMN — 6 Skill Domain Spokes ===== -->
  <!-- Row 1, Col 1: Product Sense (x=620, y=110) -->
  <rect x="622" y="113" width="240" height="80" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="620" y="110" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="620" y="110" width="240" height="30" rx="14" fill="#14B8A6"/>
  <rect x="620" y="126" width="240" height="14" fill="#14B8A6"/>
  <text x="740" y="131" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Product Sense</text>
  <text x="740" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#0F766E" text-anchor="middle">9 skills</text>

  <!-- Row 1, Col 2: AI Strategy (x=880, y=110) -->
  <rect x="882" y="113" width="240" height="80" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="880" y="110" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="880" y="110" width="240" height="30" rx="14" fill="#14B8A6"/>
  <rect x="880" y="126" width="240" height="14" fill="#14B8A6"/>
  <text x="1000" y="131" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">AI Strategy</text>
  <text x="1000" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#0F766E" text-anchor="middle">10 skills</text>

  <!-- Row 2, Col 1: Safety & Trust (x=620, y=210) -->
  <rect x="622" y="213" width="240" height="80" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="620" y="210" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="620" y="210" width="240" height="30" rx="14" fill="#EC4899"/>
  <rect x="620" y="226" width="240" height="14" fill="#EC4899"/>
  <text x="740" y="231" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Safety &amp; Trust</text>
  <text x="740" y="268" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9D174D" text-anchor="middle">7 skills</text>

  <!-- Row 2, Col 2: Agent Design (x=880, y=210) -->
  <rect x="882" y="213" width="240" height="80" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="880" y="210" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="880" y="210" width="240" height="30" rx="14" fill="#14B8A6"/>
  <rect x="880" y="226" width="240" height="14" fill="#14B8A6"/>
  <text x="1000" y="231" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Agent Design</text>
  <text x="1000" y="268" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#0F766E" text-anchor="middle">5 skills</text>

  <!-- Row 3, Col 1: Eval & Quality (x=620, y=310) -->
  <rect x="622" y="313" width="240" height="80" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="620" y="310" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="620" y="310" width="240" height="30" rx="14" fill="#06B6D4"/>
  <rect x="620" y="326" width="240" height="14" fill="#06B6D4"/>
  <text x="740" y="331" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Eval &amp; Quality</text>
  <text x="740" y="368" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#0E7490" text-anchor="middle">6 skills</text>

  <!-- Row 3, Col 2: Craft & Polish (x=880, y=310) -->
  <rect x="882" y="313" width="240" height="80" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="880" y="310" width="240" height="80" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="880" y="310" width="240" height="30" rx="14" fill="#F59E0B"/>
  <rect x="880" y="326" width="240" height="14" fill="#F59E0B"/>
  <text x="1000" y="331" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Craft &amp; Polish</text>
  <text x="1000" y="368" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#B45309" text-anchor="middle">12 skills</text>

  <!-- ===== Dashed lines: Brain → Spoke Cards ===== -->
  <line x1="550" y1="180" x2="620" y2="150" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="550" y1="190" x2="620" y2="250" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="550" y1="240" x2="620" y2="350" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="550" y1="180" x2="880" y2="150" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="550" y1="190" x2="880" y2="250" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="550" y1="240" x2="880" y2="350" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,4"/>

  <!-- ===== BOTTOM — Output Box (x=350, y=440, w=300, h=90) ===== -->
  <rect x="352" y="443" width="300" height="90" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="350" y="440" width="300" height="90" rx="14" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="500" y="470" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#1B1B1F" text-anchor="middle">CPO-Level Output</text>
  <text x="500" y="492" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A" text-anchor="middle">Actionable Monday morning.</text>
  <text x="500" y="510" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A" text-anchor="middle">Reasoning path baked in.</text>

  <!-- Arrow: Brain → Output -->
  <line x1="420" y1="380" x2="470" y2="435" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="466,430 474,438 464,437" fill="#8B5CF6"/>

  <!-- Converging dashed lines: Spoke cards → Output -->
  <line x1="740" y1="390" x2="580" y2="460" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="1000" y1="390" x2="650" y2="460" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4,4"/>

  <!-- ===== Feedback Loop (y=560) ===== -->
  <path d="M 500,530 L 500,570 Q 500,580 490,580 L 340,580 Q 280,580 280,540 L 280,400 Q 280,380 300,370" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,3" fill="none"/>
  <polygon points="296,375 304,368 300,378" fill="#F59E0B"/>
  <text x="500" y="600" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#F59E0B" text-anchor="middle">Self-correction loop — routing mistakes captured, patterns sharpened</text>

  <!-- ===== CALLOUT (y=630) ===== -->
  <rect x="150" y="630" width="900" height="60" rx="14" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="600" y="665" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#B45309" text-anchor="middle">The difference between a library of tools and an operating system that learns.</text>

  <!-- ===== FOOTER ===== -->
  <text x="600" y="760" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">Orchestrator v1.2 · 66 Skills · April 2026</text>

</svg>