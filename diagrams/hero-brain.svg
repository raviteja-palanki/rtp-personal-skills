<svg viewBox="0 0 1200 500" width="1200" height="500" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="500" fill="#FAFAF8"/>

  <!-- Header band — warm lavender with subtle depth -->
  <rect x="0" y="0" width="1200" height="72" fill="#F5F2FE"/>
  <rect x="0" y="0" width="400" height="72" fill="#F8F5FF" opacity="0.5"/>
  <rect x="800" y="0" width="400" height="72" fill="#F2EEFE" opacity="0.3"/>
  <rect x="0" y="70" width="1200" height="2" fill="#E9E2F8" opacity="0.7"/>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="3">THE ORCHESTRATOR</text>
  <text x="600" y="56" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="800" fill="#1B1B1F">A Second Brain That Deploys AI Worker Agents</text>

  <!-- ========== LEFT CARD: WHAT WALKS IN ========== -->
  <!-- Red-tinted shadow — warm, not gray -->
  <rect x="52" y="104" width="282" height="232" rx="14" fill="#F2BDB3" opacity="0.35"/>
  <!-- Card body -->
  <rect x="48" y="100" width="282" height="232" rx="14" fill="#FFFFFF" stroke="#F5A898" stroke-width="1.5"/>
  <!-- Header area — visible warmth -->
  <rect x="49" y="101" width="280" height="40" rx="13" fill="#FEF2F2"/>
  <rect x="49" y="127" width="280" height="14" fill="#FEF2F2"/>
  <!-- Label -->
  <text x="70" y="128" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#DC2626" letter-spacing="1.5">WHAT WALKS IN</text>
  <!-- Status dot -->
  <circle cx="310" cy="115" r="5" fill="#FCA5A5" opacity="0.5"/>

  <!-- Opening quote mark — large, decorative -->
  <text x="64" y="178" font-family="Georgia, serif" font-size="32" fill="#FBBFB4" opacity="0.7">"</text>
  <!-- Vague request text -->
  <text x="80" y="172" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#4B5563">We want AI in our</text>
  <text x="80" y="191" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#4B5563">enterprise app. Can we</text>
  <text x="80" y="210" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#4B5563">build an agent that gives</text>
  <text x="80" y="229" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#4B5563">users faster insights?</text>

  <!-- Diagnosis line — the gut punch -->
  <rect x="64" y="248" width="250" height="1" fill="#FCA5A5" opacity="0.4"/>
  <text x="70" y="270" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#B91C1C">Broad enough to mean anything.</text>
  <text x="70" y="288" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#B91C1C">Specific enough to feel actionable.</text>
  <text x="70" y="310" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#DC2626" opacity="0.6">Most teams start building here.</text>

  <!-- ========== ARROW: LEFT TO CENTER ========== -->
  <path d="M 332,216 C 362,212 390,210 420,214" stroke="#B0B8C4" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 414,208 L 424,214 L 414,220" stroke="#B0B8C4" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ========== CENTER CARD: THE ORCHESTRATOR (dominant) ========== -->
  <!-- Purple-tinted shadow — deeper offset for elevation -->
  <rect x="438" y="90" width="324" height="280" rx="16" fill="#C8BDE0" opacity="0.4"/>
  <!-- Card body — taller, bolder -->
  <rect x="433" y="85" width="324" height="280" rx="16" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2.5"/>
  <!-- Purple header bar -->
  <rect x="434" y="86" width="322" height="46" rx="15" fill="#7C3AED"/>
  <rect x="434" y="116" width="322" height="16" fill="#7C3AED"/>
  <text x="595" y="116" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="1.8">THE ORCHESTRATOR</text>

  <!-- Description -->
  <text x="595" y="156" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="500" fill="#374151">Reads the problem. Deploys expert</text>
  <text x="595" y="175" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="500" fill="#374151">teams. Synthesizes one decisive call.</text>

  <!-- Three layer chips — the cascade -->
  <!-- Thinking -->
  <rect x="468" y="196" width="254" height="32" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.2"/>
  <text x="595" y="217" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">10 Thinking Checks</text>

  <!-- Cascade arrow -->
  <path d="M 595,228 L 595,238" stroke="#C4B5FD" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 591,235 L 595,242 L 599,235" stroke="#C4B5FD" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Judgment -->
  <rect x="468" y="246" width="254" height="32" rx="10" fill="#F0FDFA" stroke="#5EEAD4" stroke-width="1.2"/>
  <text x="595" y="267" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">36 Judgment Calls</text>

  <!-- Cascade arrow -->
  <path d="M 595,278 L 595,288" stroke="#5EEAD4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 591,285 L 595,292 L 599,285" stroke="#5EEAD4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Craft -->
  <rect x="468" y="296" width="254" height="32" rx="10" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="595" y="317" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#B45309">8 Craft Generators</text>

  <!-- Stats — treated as a feature, not a footnote -->
  <rect x="474" y="348" width="242" height="28" rx="8" fill="#F9F7FE"/>
  <text x="517" y="367" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#14B8A6">6 Teams</text>
  <text x="553" y="367" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#D4D0E0">&#183;</text>
  <text x="595" y="367" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#7C3AED">66 Skills</text>
  <text x="637" y="367" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#D4D0E0">&#183;</text>
  <text x="673" y="367" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#F59E0B">3 Layers</text>

  <!-- ========== ARROW: CENTER TO RIGHT ========== -->
  <path d="M 759,216 C 790,210 816,212 846,218" stroke="#B0B8C4" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 840,212 L 850,218 L 840,224" stroke="#B0B8C4" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ========== RIGHT CARD: WHAT COMES OUT ========== -->
  <!-- Green-tinted shadow -->
  <rect x="862" y="104" width="292" height="232" rx="14" fill="#A3E8BC" opacity="0.3"/>
  <!-- Card body -->
  <rect x="858" y="100" width="292" height="232" rx="14" fill="#FFFFFF" stroke="#6EE7A0" stroke-width="1.5"/>
  <!-- Header area — visible warmth -->
  <rect x="859" y="101" width="290" height="40" rx="13" fill="#ECFDF5"/>
  <rect x="859" y="127" width="290" height="14" fill="#ECFDF5"/>
  <!-- Label -->
  <text x="880" y="128" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#16A34A" letter-spacing="1.5">WHAT COMES OUT</text>
  <!-- Status dot -->
  <circle cx="1130" cy="115" r="5" fill="#86EFAC" opacity="0.5"/>

  <!-- Output items — with visual weight progression -->
  <circle cx="880" cy="162" r="3.5" fill="#16A34A" opacity="0.5"/>
  <text x="894" y="166" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Scoped recommendation</text>

  <circle cx="880" cy="186" r="3.5" fill="#16A34A" opacity="0.55"/>
  <text x="894" y="190" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Cost model at 3 scales</text>

  <circle cx="880" cy="210" r="3.5" fill="#16A34A" opacity="0.6"/>
  <text x="894" y="214" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Eval gates defined</text>

  <circle cx="880" cy="234" r="3.5" fill="#16A34A" opacity="0.7"/>
  <text x="894" y="238" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Failure modes mapped</text>

  <circle cx="880" cy="258" r="4" fill="#16A34A" opacity="0.85"/>
  <text x="894" y="262" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1B1B1F">WHEN WRONG section</text>

  <!-- Crescendo line -->
  <rect x="880" y="278" width="250" height="1" fill="#86EFAC" opacity="0.4"/>
  <text x="880" y="298" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#15803D">Written before anyone asked.</text>
  <text x="880" y="314" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#16A34A" opacity="0.6">That's the system working.</text>

  <!-- ========== PUNCHLINE CALLOUT — pull-quote that demands attention ========== -->
  <rect x="120" y="420" width="960" height="44" rx="8" fill="#FAF8FF"/>
  <rect x="120" y="420" width="4" height="44" rx="2" fill="#7C3AED"/>
  <text x="144" y="439" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1B1B1F">The best product leaders don't have better answers.</text>
  <text x="144" y="457" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="400" fill="#6B7280">They have better systems for arriving at answers.</text>

  <!-- Footer -->
  <rect x="400" y="481" width="400" height="1" fill="#E5E7EB" opacity="0.4"/>
  <text x="600" y="496" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">rtp-personal-skills  &#183;  The Orchestrator  &#183;  April 2026</text>

</svg>