<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-label="10 thinking skills that produce checks before any decision, not documents.">
  <title>Thinking Layer</title>
  <desc>The first layer of the architecture: 10 cognitive skills (first-principles, bias-spotter, falsification, dual-lens, determinism-compass, stress-test, failure-design, alignment-check, judgment-guard, problem-type) that gate-check every recommendation before it reaches the judgment layer.</desc>
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#9478B8" flood-opacity="0.08"/>
    </filter>
    <filter id="headerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="#FAFAF8"/>

  <!-- Title Band -->
  <rect x="0" y="0" width="1200" height="90" fill="#9478B8" filter="url(#headerShadow)"/>
  <text x="40" y="52" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">Layer 1: Thinking</text>
  <text x="40" y="73" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.95">The Immune System — 10 Skills That Fire Before Any Decision Gets Made</text>

  <!-- ROW 1: Cards 1-5 -->

  <!-- Card 1: First Principles -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="110" width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="40" y="110" width="220" height="50" rx="12" fill="#9478B8"/>
    <text x="55" y="147" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">First Principles</text>

    <text x="55" y="184" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"What's the one atomic</text>
    <text x="55" y="202" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">operation underneath?"</text>

    <text x="55" y="232" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="55" y="252" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Hidden assumptions you</text>
    <text x="55" y="271" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">didn't know you were making</text>
  </g>

  <!-- Card 2: Bias Spotter -->
  <g filter="url(#cardShadow)">
    <rect x="270" y="110" width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="270" y="110" width="220" height="50" rx="12" fill="#9478B8"/>
    <text x="285" y="147" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Bias Spotter</text>

    <text x="285" y="184" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"Are you seeing what</text>
    <text x="285" y="202" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">you want to see?"</text>

    <text x="285" y="232" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="285" y="252" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Confirmation bias about to</text>
    <text x="285" y="271" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">derail the entire decision</text>
  </g>

  <!-- Card 3: Falsification -->
  <g filter="url(#cardShadow)">
    <rect x="500" y="110" width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="500" y="110" width="220" height="50" rx="12" fill="#9478B8"/>
    <text x="515" y="147" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Falsification</text>

    <text x="515" y="184" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"What would make this</text>
    <text x="515" y="202" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">recommendation invalid?"</text>

    <text x="515" y="232" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="515" y="252" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Untested hypotheses and</text>
    <text x="515" y="271" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">false certainty</text>
  </g>

  <!-- Card 4: Dual Lens -->
  <g filter="url(#cardShadow)">
    <rect x="730" y="110" width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="730" y="110" width="220" height="50" rx="12" fill="#9478B8"/>
    <text x="745" y="147" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Dual Lens</text>

    <text x="745" y="184" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"Business AND technical</text>
    <text x="745" y="202" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">framing?"</text>

    <text x="745" y="232" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="745" y="252" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Communication that only one</text>
    <text x="745" y="271" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">audience can actually use</text>
  </g>

  <!-- Card 5: Determinism Compass -->
  <g filter="url(#cardShadow)">
    <rect x="960" y="110" width="200" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="960" y="110" width="200" height="50" rx="12" fill="#9478B8"/>
    <text x="975" y="147" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Determinism Compass</text>

    <text x="975" y="184" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"Probabilistic or</text>
    <text x="975" y="202" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">deterministic?"</text>

    <text x="975" y="232" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="975" y="252" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">The most common AI</text>
    <text x="975" y="271" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">architecture mistake</text>
  </g>

  <!-- ROW 2: Cards 6-10 -->

  <!-- Card 6: Stress Test -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="340" width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="40" y="340" width="220" height="50" rx="12" fill="#9478B8"/>
    <text x="55" y="377" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Stress Test</text>

    <text x="55" y="414" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"What breaks under</text>
    <text x="55" y="432" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">load?"</text>

    <text x="55" y="462" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="55" y="482" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Plans that look great until</text>
    <text x="55" y="501" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">they meet production reality</text>
  </g>

  <!-- Card 7: Failure Design -->
  <g filter="url(#cardShadow)">
    <rect x="270" y="340" width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="270" y="340" width="220" height="50" rx="12" fill="#9478B8"/>
    <text x="285" y="377" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Failure Design</text>

    <text x="285" y="414" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"Gracefully or</text>
    <text x="285" y="432" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">dangerously?"</text>

    <text x="285" y="462" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="285" y="482" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Silent failures that cascade</text>
    <text x="285" y="501" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">before anyone notices</text>
  </g>

  <!-- Card 8: Alignment Check -->
  <g filter="url(#cardShadow)">
    <rect x="500" y="340" width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="500" y="340" width="220" height="50" rx="12" fill="#9478B8"/>
    <text x="515" y="377" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Alignment Check</text>

    <text x="515" y="414" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"Are incentives aligned</text>
    <text x="515" y="432" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">across stakeholders?"</text>

    <text x="515" y="462" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="515" y="482" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Org readiness gaps that</text>
    <text x="515" y="501" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">sink AI projects silently</text>
  </g>

  <!-- Card 9: Judgment Guard -->
  <g filter="url(#cardShadow)">
    <rect x="730" y="340" width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="730" y="340" width="220" height="50" rx="12" fill="#9478B8"/>
    <text x="745" y="377" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Judgment Guard</text>

    <text x="745" y="414" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"Judgment call or</text>
    <text x="745" y="432" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">data question?"</text>

    <text x="745" y="462" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="745" y="482" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Expertise erosion from over-</text>
    <text x="745" y="501" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">reliance on AI answers</text>
  </g>

  <!-- Card 10: Problem Type -->
  <g filter="url(#cardShadow)">
    <rect x="960" y="340" width="200" height="210" rx="12" fill="#FFFFFF" stroke="#E8E4F0" stroke-width="1"/>
    <rect x="960" y="340" width="200" height="50" rx="12" fill="#9478B8"/>
    <text x="975" y="377" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">Problem Type</text>

    <text x="975" y="414" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">"What type of problem,</text>
    <text x="975" y="432" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-style="italic">really?"</text>

    <text x="975" y="462" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B6F9E" letter-spacing="0.8">Catches:</text>
    <text x="975" y="482" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">Treating adaptive challenges</text>
    <text x="975" y="501" font-family="Inter, sans-serif" font-size="12" fill="#6B6160">as technical problems</text>
  </g>

  <!-- Story Callout -->
  <g>
    <rect x="40" y="580" width="1120" height="110" rx="12" fill="#F3EFF8" stroke="#DCD2E8" stroke-width="2"/>
    <text x="60" y="610" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-weight="600">10 skills that don't produce documents. They produce checks. The immune system.</text>
    <text x="60" y="633" font-family="Inter, sans-serif" font-size="13" fill="#5A5450">These fire before any domain-specific skill runs. They're agnostic to whether you're building AI products, traditional features, or org strategy. The</text>
    <text x="60" y="651" font-family="Inter, sans-serif" font-size="13" fill="#5A5450">domain specificity comes from Layers 2 and 3, where judgment skills adapt these thinking checks to specific problem spaces.</text>
    <text x="60" y="675" font-family="Inter, sans-serif" font-size="13" fill="#5A5450" font-weight="600">Every other skill imports from here first.</text>
  </g>

  <!-- Footer -->
  <text x="40" y="735" font-family="Inter, sans-serif" font-size="11" fill="#9478B8" opacity="0.8">Layer 1 · Thinking Core · 10 Skills · April 2026</text>
</svg>
