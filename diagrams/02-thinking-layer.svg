<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660">
  <!-- Background -->
  <rect width="1200" height="660" fill="#FAFAF8" rx="0"/>

  <!-- HEADER BAND -->
  <rect x="0" y="0" width="1200" height="80" fill="#F5F3FF" rx="0"/>
  <text x="600" y="36" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#6D28D9">Layer 1: Thinking</text>
  <text x="600" y="60" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#5F6B7A">Comprehensive  ·  The Immune System — 10 Skills That Fire Before Any Decision Gets Made</text>

  <!-- ==================== ROW 1 ==================== -->

  <!-- Card 1: First Principles -->
  <rect x="52" y="103" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="50" y="100" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="50" y="100" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="50" y="126" width="210" height="14" fill="#8B5CF6"/>
  <text x="155" y="126" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">First Principles</text>
  <text x="65" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"What's the one atomic</text>
  <text x="65" y="183" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">operation?"</text>
  <text x="65" y="213" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="65" y="230" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Hidden assumptions you</text>
  <text x="65" y="245" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">didn't know you were making</text>

  <!-- Card 2: Bias Spotter -->
  <rect x="282" y="103" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="280" y="100" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="280" y="100" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="280" y="126" width="210" height="14" fill="#8B5CF6"/>
  <text x="385" y="126" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Bias Spotter</text>
  <text x="295" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"Are you seeing what you</text>
  <text x="295" y="183" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">want to see?"</text>
  <text x="295" y="213" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="295" y="230" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Confirmation bias that</text>
  <text x="295" y="245" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">derails decisions</text>

  <!-- Card 3: Falsification -->
  <rect x="512" y="103" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="510" y="100" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="510" y="100" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="510" y="126" width="210" height="14" fill="#8B5CF6"/>
  <text x="615" y="126" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Falsification</text>
  <text x="525" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"What would make this</text>
  <text x="525" y="183" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">wrong?"</text>
  <text x="525" y="213" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="525" y="230" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Untested hypotheses and</text>
  <text x="525" y="245" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">false certainty</text>

  <!-- Card 4: Dual Lens -->
  <rect x="742" y="103" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="740" y="100" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="740" y="100" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="740" y="126" width="210" height="14" fill="#8B5CF6"/>
  <text x="845" y="126" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Dual Lens</text>
  <text x="755" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"Business AND technical</text>
  <text x="755" y="183" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">framing?"</text>
  <text x="755" y="213" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="755" y="230" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Communication one</text>
  <text x="755" y="245" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">audience can't use</text>

  <!-- Card 5: Determinism Compass -->
  <rect x="972" y="103" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="970" y="100" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="970" y="100" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="970" y="126" width="210" height="14" fill="#8B5CF6"/>
  <text x="1075" y="126" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Determinism Compass</text>
  <text x="985" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"Probabilistic or</text>
  <text x="985" y="183" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">deterministic?"</text>
  <text x="985" y="213" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="985" y="230" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">The most common AI</text>
  <text x="985" y="245" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">architecture mistake</text>

  <!-- ==================== ROW 2 ==================== -->

  <!-- Card 6: Stress Test -->
  <rect x="52" y="308" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="50" y="305" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="50" y="305" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="50" y="331" width="210" height="14" fill="#8B5CF6"/>
  <text x="155" y="331" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Stress Test</text>
  <text x="65" y="373" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"What breaks under</text>
  <text x="65" y="388" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">load?"</text>
  <text x="65" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="65" y="435" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Plans that look great until</text>
  <text x="65" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">production reality</text>

  <!-- Card 7: Failure Modes -->
  <rect x="282" y="308" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="280" y="305" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="280" y="305" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="280" y="331" width="210" height="14" fill="#8B5CF6"/>
  <text x="385" y="331" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Failure Modes</text>
  <text x="295" y="373" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"Gracefully or</text>
  <text x="295" y="388" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">dangerously?"</text>
  <text x="295" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="295" y="435" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Silent failures that cascade</text>
  <text x="295" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">before anyone notices</text>

  <!-- Card 8: Alignment Check -->
  <rect x="512" y="308" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="510" y="305" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="510" y="305" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="510" y="331" width="210" height="14" fill="#8B5CF6"/>
  <text x="615" y="331" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Alignment Check</text>
  <text x="525" y="373" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"Are incentives</text>
  <text x="525" y="388" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">aligned?"</text>
  <text x="525" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="525" y="435" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Org readiness gaps that</text>
  <text x="525" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">sink AI projects</text>

  <!-- Card 9: Judgment Guard -->
  <rect x="742" y="308" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="740" y="305" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="740" y="305" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="740" y="331" width="210" height="14" fill="#8B5CF6"/>
  <text x="845" y="331" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Judgment Guard</text>
  <text x="755" y="373" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"Judgment call or data</text>
  <text x="755" y="388" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">question?"</text>
  <text x="755" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="755" y="435" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Over-reliance on AI for</text>
  <text x="755" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">human decisions</text>

  <!-- Card 10: Problem Type -->
  <rect x="972" y="308" width="210" height="180" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="970" y="305" width="210" height="180" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="970" y="305" width="210" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="970" y="331" width="210" height="14" fill="#8B5CF6"/>
  <text x="1075" y="331" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Problem Type</text>
  <text x="985" y="373" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">"What type of problem,</text>
  <text x="985" y="388" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9">really?"</text>
  <text x="985" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">Catches:</text>
  <text x="985" y="435" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Treating adaptive challenges</text>
  <text x="985" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">as technical problems</text>

  <!-- ==================== CALLOUT BOX ==================== -->
  <rect x="50" y="510" width="1100" height="70" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="600" y="541" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#6D28D9">These fire before any domain-specific skill runs.</text>
  <text x="600" y="562" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">Every other skill imports from here first.</text>

  <!-- ==================== FOOTER ==================== -->
  <text x="600" y="620" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#9CA3AF">Layer 1  ·  Thinking Core  ·  10 Skills  ·  April 2026</text>
</svg>