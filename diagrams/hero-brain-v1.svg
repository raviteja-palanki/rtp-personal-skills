<svg viewBox="0 0 1200 460" width="1200" height="460" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="460" rx="0" fill="#FAFAF8"/>

  <!-- Header band -->
  <rect x="0" y="0" width="1200" height="68" fill="#F5F3FF"/>
  <line x1="0" y1="68" x2="1200" y2="68" stroke="#EDE9FE" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#8B5CF6" letter-spacing="1.5">THE ORCHESTRATOR</text>
  <text x="600" y="55" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#1B1B1F">A Second Brain That Deploys AI Worker Agents</text>

  <!-- ========== LEFT CARD: THE ASK ========== -->
  <!-- Shadow -->
  <rect x="48" y="98" width="290" height="220" rx="12" fill="#FECACA" opacity="0.25"/>
  <!-- Card -->
  <rect x="45" y="95" width="290" height="220" rx="12" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="1.5"/>
  <!-- Tinted header area -->
  <rect x="45" y="95" width="290" height="34" rx="12" fill="#FEF2F2"/>
  <rect x="45" y="115" width="290" height="14" fill="#FEF2F2"/>
  <!-- Label -->
  <text x="67" y="118" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#DC2626" letter-spacing="1">WHAT WALKS IN</text>

  <!-- Vague request text (italic) -->
  <text x="67" y="155" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#374151">"We want AI in our</text>
  <text x="67" y="175" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#374151">enterprise app. Can we</text>
  <text x="67" y="195" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#374151">build an agent that gives</text>
  <text x="67" y="215" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#374151">users faster insights?"</text>

  <!-- Problem subtext -->
  <text x="67" y="255" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#DC2626">Broad enough to mean anything.</text>
  <text x="67" y="273" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#DC2626">Specific enough to feel actionable.</text>

  <!-- Red warning accent dot -->
  <circle cx="316" cy="107" r="5" fill="#FCA5A5" opacity="0.6"/>

  <!-- ========== ARROW: LEFT TO CENTER (organic bezier) ========== -->
  <path d="M 335,205 C 370,203 395,198 430,202" stroke="#B0B8C4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="427,196 438,202 427,208" fill="#B0B8C4"/>

  <!-- ========== CENTER CARD: THE ORCHESTRATOR (dominant) ========== -->
  <!-- Shadow -->
  <rect x="446" y="83" width="308" height="225" rx="14" fill="#E9E5F5" opacity="0.45"/>
  <!-- Card -->
  <rect x="443" y="80" width="308" height="225" rx="14" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="2.5"/>
  <!-- Purple header bar -->
  <rect x="443" y="80" width="308" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="443" y="106" width="308" height="14" fill="#8B5CF6"/>
  <text x="597" y="108" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="1.2">THE ORCHESTRATOR</text>

  <!-- Description -->
  <text x="597" y="142" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Reads the problem. Deploys expert</text>
  <text x="597" y="160" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">teams. Synthesizes one decisive call.</text>

  <!-- Three layer chips with flow arrows between them -->
  <!-- Thinking chip -->
  <rect x="472" y="178" width="250" height="26" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="597" y="196" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">10 Thinking Checks</text>

  <!-- Mini arrow: thinking to judgment -->
  <path d="M 597,204 C 599,208 595,212 597,216" stroke="#B0B8C4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="594,214 597,220 600,214" fill="#B0B8C4"/>

  <!-- Judgment chip -->
  <rect x="472" y="222" width="250" height="26" rx="8" fill="#F0FDFA" stroke="#5EEAD4" stroke-width="1"/>
  <text x="597" y="240" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#0F766E">36 Judgment Calls</text>

  <!-- Mini arrow: judgment to craft -->
  <path d="M 597,248 C 599,252 595,256 597,260" stroke="#B0B8C4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="594,258 597,264 600,258" fill="#B0B8C4"/>

  <!-- Craft chip -->
  <rect x="472" y="266" width="250" height="26" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="597" y="284" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">8 Craft Generators</text>

  <!-- Stats line (below card, freestanding) -->
  <text x="597" y="354" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#8B5CF6">66 Skills</text>
  <text x="597" y="354" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280" dx="-58">&#183;</text>
  <text x="597" y="354" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#14B8A6" dx="-110">6 Teams</text>
  <text x="597" y="354" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6B7280" dx="58">&#183;</text>
  <text x="597" y="354" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#F59E0B" dx="110">3 Layers</text>

  <!-- ========== ARROW: CENTER TO RIGHT (organic bezier) ========== -->
  <path d="M 751,202 C 786,198 810,200 843,205" stroke="#B0B8C4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="840,199 851,205 840,211" fill="#B0B8C4"/>

  <!-- ========== RIGHT CARD: THE OUTPUT ========== -->
  <!-- Shadow -->
  <rect x="858" y="98" width="300" height="220" rx="12" fill="#BBF7D0" opacity="0.25"/>
  <!-- Card -->
  <rect x="855" y="95" width="300" height="220" rx="12" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.5"/>
  <!-- Tinted header area -->
  <rect x="855" y="95" width="300" height="34" rx="12" fill="#F0FDF4"/>
  <rect x="855" y="115" width="300" height="14" fill="#F0FDF4"/>
  <!-- Label -->
  <text x="877" y="118" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#16A34A" letter-spacing="1">WHAT COMES OUT</text>

  <!-- Green success accent dot -->
  <circle cx="1136" cy="107" r="5" fill="#86EFAC" opacity="0.6"/>

  <!-- Output items with green dot bullets -->
  <circle cx="877" cy="151" r="3" fill="#16A34A" opacity="0.7"/>
  <text x="888" y="155" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Scoped recommendation</text>

  <circle cx="877" cy="175" r="3" fill="#16A34A" opacity="0.7"/>
  <text x="888" y="179" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Cost model at 3 scales</text>

  <circle cx="877" cy="199" r="3" fill="#16A34A" opacity="0.7"/>
  <text x="888" y="203" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Eval gates defined</text>

  <circle cx="877" cy="223" r="3" fill="#16A34A" opacity="0.7"/>
  <text x="888" y="227" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#374151">Failure modes mapped</text>

  <circle cx="877" cy="247" r="3" fill="#16A34A" opacity="0.7"/>
  <text x="888" y="251" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1B1B1F">WHEN WRONG section</text>

  <!-- Success subtext -->
  <text x="877" y="287" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#16A34A">Written before anyone asked.</text>

  <!-- ========== PUNCHLINE CALLOUT ========== -->
  <rect x="130" y="365" width="940" height="36" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="388" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#1B1B1F">The best product leaders don't have better answers. They have better systems for arriving at answers.</text>

  <!-- Footer -->
  <text x="600" y="440" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">rtp-personal-skills  &#183;  The Orchestrator  &#183;  April 2026</text>

</svg>