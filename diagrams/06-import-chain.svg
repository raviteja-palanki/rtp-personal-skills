<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <rect width="1200" height="700" fill="#FAFAF8"/>


  <!-- HEADER BAND -->
  <rect x="0" y="0" width="1200" height="80" fill="#F9FAFB"/>
  <text x="600" y="36" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#1B1B1F">The Import Chain</text>
  <text x="600" y="60" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#5F6B7A">Quick Check · How Skills Feed Each Other — Every Output Is Pre-Tested Before Shipping</text>

  <!-- ════════════ TIER 1: THINKING SKILLS ════════════ -->
