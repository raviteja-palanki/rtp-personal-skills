<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.06"/>
    </filter>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9478B8;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#5B92B8;stop-opacity:0.08" />
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      .title-main {
        font-family: Inter, Segoe UI, sans-serif;
        font-size: 32px;
        font-weight: 700;
        fill: #1A1A1A;
        letter-spacing: -0.6px;
      }

      .title-sub {
        font-family: Inter, Segoe UI, sans-serif;
        font-size: 15px;
        font-weight: 500;
        fill: #5A5A5A;
        letter-spacing: 0.2px;
      }

      .column-title {
        font-family: Inter, Segoe UI, sans-serif;
        font-size: 14px;
        font-weight: 600;
        fill: #1A1A1A;
        text-anchor: middle;
        letter-spacing: 0.3px;
      }

      .skill-label {
        font-family: Inter, Segoe UI, sans-serif;
        font-size: 12px;
        font-weight: 600;
        fill: #FFFFFF;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .output-label {
        font-family: Inter, Segoe UI, sans-serif;
        font-size: 12px;
        font-weight: 600;
        fill: #1A1A1A;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .result-caption {
        font-family: Inter, Segoe UI, sans-serif;
        font-size: 12px;
        font-weight: 500;
        fill: #6A6A6A;
        text-anchor: center;
        line-height: 1.4;
      }

      .footer {
        font-family: Inter, Segoe UI, sans-serif;
        font-size: 11px;
        font-weight: 500;
        fill: #8A8A8A;
        text-anchor: center;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAFAF8"/>

  <!-- Title Section -->
  <rect width="1200" height="90" fill="url(#titleGrad)"/>
  <line x1="0" y1="90" x2="1200" y2="90" stroke="#D4D0CC" stroke-width="0.5" opacity="0.5"/>

  <text x="600" y="40" class="title-main">The Import Chain</text>
  <text x="600" y="62" class="title-sub">Why the output is worth reading: thinking → judgment → craft</text>

  <!-- Column Container -->
  <g id="columns">

    <!-- COLUMN 1: Writing an AI PRD -->
    <g id="col1">
      <!-- Header -->
      <text x="150" y="125" class="column-title">Writing an AI PRD</text>

      <!-- Skill 1: First Principles (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="90" y="145" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="150" y="171" class="skill-label" font-size="11">First</text>
        <text x="150" y="184" class="skill-label" font-size="11">Principles</text>
      </g>

      <!-- Arrow -->
      <path d="M 150 193 L 150 218" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="150,224 147,219 153,219" fill="#CCCCCC"/>

      <!-- Skill 2: Bias Spotter (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="90" y="228" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="150" y="254" class="skill-label" font-size="11">Bias</text>
        <text x="150" y="267" class="skill-label" font-size="11">Spotter</text>
      </g>

      <!-- Arrow -->
      <path d="M 150 276 L 150 301" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="150,307 147,302 153,302" fill="#CCCCCC"/>

      <!-- Skill 3: Build-or-Buy (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="90" y="311" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="150" y="335" class="skill-label" font-size="11">Build</text>
        <text x="150" y="348" class="skill-label" font-size="11">or Buy</text>
      </g>

      <!-- Arrow -->
      <path d="M 150 359 L 150 384" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="150,390 147,385 153,385" fill="#CCCCCC"/>

      <!-- Skill 4: Token Economics (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="90" y="394" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="150" y="418" class="skill-label" font-size="11">Token</text>
        <text x="150" y="431" class="skill-label" font-size="11">Economics</text>
      </g>

      <!-- Arrow -->
      <path d="M 150 442 L 150 467" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="150,473 147,468 153,468" fill="#CCCCCC"/>

      <!-- Output: AI-PRD (Moss) -->
      <g filter="url(#softShadow)">
        <rect x="75" y="477" width="150" height="56" rx="8" fill="#6BA08A" opacity="0.9"/>
        <text x="150" y="508" class="output-label">AI-PRD</text>
      </g>

      <!-- Result Caption -->
      <text x="150" y="555" class="result-caption">A PRD engineering</text>
      <text x="150" y="570" class="result-caption">can build from</text>
    </g>

    <!-- COLUMN 2: Ship/No-Ship Decision -->
    <g id="col2">
      <!-- Header -->
      <text x="450" y="125" class="column-title">Ship/No-Ship Decision</text>

      <!-- Skill 1: Stress Test (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="390" y="145" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="450" y="171" class="skill-label" font-size="11">Stress</text>
        <text x="450" y="184" class="skill-label" font-size="11">Test</text>
      </g>

      <!-- Arrow -->
      <path d="M 450 193 L 450 218" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="450,224 447,219 453,219" fill="#CCCCCC"/>

      <!-- Skill 2: Failure Modes (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="390" y="228" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="450" y="254" class="skill-label" font-size="11">Failure</text>
        <text x="450" y="267" class="skill-label" font-size="11">Modes</text>
      </g>

      <!-- Arrow -->
      <path d="M 450 276 L 450 301" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="450,307 447,302 453,302" fill="#CCCCCC"/>

      <!-- Skill 3: Eval-Driven Dev (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="390" y="311" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="450" y="335" class="skill-label" font-size="11">Eval-Driven</text>
        <text x="450" y="348" class="skill-label" font-size="11">Dev</text>
      </g>

      <!-- Arrow -->
      <path d="M 450 359 L 450 384" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="450,390 447,385 453,385" fill="#CCCCCC"/>

      <!-- Skill 4: Trust Ladder (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="390" y="394" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="450" y="418" class="skill-label" font-size="11">Trust</text>
        <text x="450" y="431" class="skill-label" font-size="11">Ladder</text>
      </g>

      <!-- Arrow -->
      <path d="M 450 442 L 450 467" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="450,473 447,468 453,468" fill="#CCCCCC"/>

      <!-- Output: Ship Decision (Moss) -->
      <g filter="url(#softShadow)">
        <rect x="375" y="477" width="150" height="56" rx="8" fill="#6BA08A" opacity="0.9"/>
        <text x="450" y="508" class="output-label">Ship Decision</text>
      </g>

      <!-- Result Caption -->
      <text x="450" y="555" class="result-caption">A decision backed</text>
      <text x="450" y="570" class="result-caption">by evidence</text>
    </g>

    <!-- COLUMN 3: Designing an Agent -->
    <g id="col3">
      <!-- Header -->
      <text x="750" y="125" class="column-title">Designing an Agent</text>

      <!-- Skill 1: First Principles (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="690" y="145" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="750" y="171" class="skill-label" font-size="11">First</text>
        <text x="750" y="184" class="skill-label" font-size="11">Principles</text>
      </g>

      <!-- Arrow -->
      <path d="M 750 193 L 750 218" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="750,224 747,219 753,219" fill="#CCCCCC"/>

      <!-- Skill 2: Alignment Check (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="690" y="228" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="750" y="254" class="skill-label" font-size="11">Alignment</text>
        <text x="750" y="267" class="skill-label" font-size="11">Check</text>
      </g>

      <!-- Arrow -->
      <path d="M 750 276 L 750 301" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="750,307 747,302 753,302" fill="#CCCCCC"/>

      <!-- Skill 3: Autonomy Spectrum (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="690" y="311" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="750" y="335" class="skill-label" font-size="11">Autonomy</text>
        <text x="750" y="348" class="skill-label" font-size="11">Spectrum</text>
      </g>

      <!-- Arrow -->
      <path d="M 750 359 L 750 384" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="750,390 747,385 753,385" fill="#CCCCCC"/>

      <!-- Skill 4: Agent Risk (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="690" y="394" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="750" y="418" class="skill-label" font-size="11">Agent</text>
        <text x="750" y="431" class="skill-label" font-size="11">Risk</text>
      </g>

      <!-- Arrow -->
      <path d="M 750 442 L 750 467" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="750,473 747,468 753,468" fill="#CCCCCC"/>

      <!-- Output: Agent Spec (Moss) -->
      <g filter="url(#softShadow)">
        <rect x="675" y="477" width="150" height="56" rx="8" fill="#6BA08A" opacity="0.9"/>
        <text x="750" y="508" class="output-label">Agent Spec</text>
      </g>

      <!-- Result Caption -->
      <text x="750" y="555" class="result-caption">An agent spec with</text>
      <text x="750" y="570" class="result-caption">safety built in</text>
    </g>

    <!-- COLUMN 4: Cost Modeling -->
    <g id="col4">
      <!-- Header -->
      <text x="1050" y="125" class="column-title">Cost Modeling</text>

      <!-- Skill 1: Falsification (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="990" y="145" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="1050" y="171" class="skill-label" font-size="11">Falsifi-</text>
        <text x="1050" y="184" class="skill-label" font-size="11">cation</text>
      </g>

      <!-- Arrow -->
      <path d="M 1050 193 L 1050 218" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="1050,224 1047,219 1053,219" fill="#CCCCCC"/>

      <!-- Skill 2: Determinism Compass (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="990" y="228" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="1050" y="254" class="skill-label" font-size="11">Determinism</text>
        <text x="1050" y="267" class="skill-label" font-size="11">Compass</text>
      </g>

      <!-- Arrow -->
      <path d="M 1050 276 L 1050 301" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="1050,307 1047,302 1053,302" fill="#CCCCCC"/>

      <!-- Skill 3: Token Economics (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="990" y="311" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="1050" y="335" class="skill-label" font-size="11">Token</text>
        <text x="1050" y="348" class="skill-label" font-size="11">Economics</text>
      </g>

      <!-- Arrow -->
      <path d="M 1050 359 L 1050 384" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="1050,390 1047,385 1053,385" fill="#CCCCCC"/>

      <!-- Skill 4: Build-or-Buy (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="990" y="394" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="1050" y="418" class="skill-label" font-size="11">Build</text>
        <text x="1050" y="431" class="skill-label" font-size="11">or Buy</text>
      </g>

      <!-- Arrow -->
      <path d="M 1050 442 L 1050 467" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="1050,473 1047,468 1053,468" fill="#CCCCCC"/>

      <!-- Output: Cost Model (Moss) -->
      <g filter="url(#softShadow)">
        <rect x="975" y="477" width="150" height="56" rx="8" fill="#6BA08A" opacity="0.9"/>
        <text x="1050" y="508" class="output-label">Cost Model</text>
      </g>

      <!-- Result Caption -->
      <text x="1050" y="555" class="result-caption">A cost model that</text>
      <text x="1050" y="570" class="result-caption">survives scrutiny</text>
    </g>

  </g>

  <!-- Legend at bottom -->
  <g id="legend">
    <!-- Legend line separator -->
    <line x1="60" y1="615" x2="1140" y2="615" stroke="#E0DCDA" stroke-width="0.5"/>

    <!-- Legend items -->
    <g>
      <!-- Thinking -->
      <rect x="80" y="635" width="12" height="12" rx="6" fill="#9478B8"/>
      <text x="100" y="644" class="footer" text-anchor="start" font-size="11">Thinking</text>

      <!-- Judgment -->
      <rect x="280" y="635" width="12" height="12" rx="6" fill="#5B92B8"/>
      <text x="300" y="644" class="footer" text-anchor="start" font-size="11">Judgment</text>

      <!-- Craft -->
      <rect x="480" y="635" width="12" height="12" rx="6" fill="#6BA08A"/>
      <text x="500" y="644" class="footer" text-anchor="start" font-size="11">Craft</text>

      <!-- Principle -->
      <text x="650" y="644" class="footer" font-size="11">Every chain: Purple (thinking) → Blue (judgment) → Green (craft) = Trustworthy output</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="600" y="780" class="footer">Import Chain · Dependency Graph · April 2026</text>
</svg>