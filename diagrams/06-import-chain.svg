<svg viewBox="0 0 1200 840" width="1200" height="840" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How skills compose: every output becomes the next skill's input without translation loss.">
  <title>The Import Chain</title>
  <desc>Dependency map showing which skills import which. The compounding pattern: every quality gate validates upstream context before the next skill runs.</desc>
  <defs>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.06"/>
    </filter>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9478B8" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#5B92B8" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="840" fill="#FAFAF8"/>

  <!-- Title Section -->
  <rect width="1200" height="90" fill="url(#titleGrad)"/>
  <line x1="0" y1="90" x2="1200" y2="90" stroke="#D4D0CC" stroke-width="0.5" opacity="0.5"/>

  <text x="600" y="40" font-family="Inter, Segoe UI, sans-serif" font-size="32" font-weight="700" fill="#1A1A1A" letter-spacing="-0.6" text-anchor="middle">The Import Chain</text>
  <text x="600" y="62" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="500" fill="#5A5A5A" letter-spacing="0.2" text-anchor="middle">Why the output is worth reading: thinking → judgment → craft</text>

  <!-- Column Container -->
  <g id="columns">

    <!-- COLUMN 1: Writing an AI PRD -->
    <g id="col1">
      <!-- Header -->
      <text x="150" y="125" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.3">Writing an AI PRD</text>

      <!-- Skill 1: First Principles (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="90" y="145" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="150" y="171" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">First</text>
        <text x="150" y="184" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Principles</text>
      </g>

      <!-- Arrow -->
      <path d="M 150 193 L 150 218" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="150,224 147,219 153,219" fill="#CCCCCC"/>

      <!-- Skill 2: Bias Spotter (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="90" y="228" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="150" y="254" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Bias</text>
        <text x="150" y="267" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Spotter</text>
      </g>

      <!-- Arrow -->
      <path d="M 150 276 L 150 301" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="150,307 147,302 153,302" fill="#CCCCCC"/>

      <!-- Skill 3: Build-or-Buy (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="90" y="311" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="150" y="335" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Build</text>
        <text x="150" y="348" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">or Buy</text>
      </g>

      <!-- Arrow -->
      <path d="M 150 359 L 150 384" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="150,390 147,385 153,385" fill="#CCCCCC"/>

      <!-- Skill 4: Token Economics (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="90" y="394" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="150" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Token</text>
        <text x="150" y="431" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Economics</text>
      </g>

      <!-- Arrow -->
      <path d="M 150 442 L 150 467" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="150,473 147,468 153,468" fill="#CCCCCC"/>

      <!-- Output: AI-PRD (Moss) -->
      <g filter="url(#softShadow)">
        <rect x="75" y="477" width="150" height="56" rx="8" fill="#6BA08A" opacity="0.9"/>
        <text x="150" y="508" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">AI-PRD</text>
      </g>

      <!-- Result Caption -->
      <text x="150" y="555" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#6A6A6A" text-anchor="middle">A PRD engineering</text>
      <text x="150" y="570" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#6A6A6A" text-anchor="middle">can build from</text>
    </g>

    <!-- COLUMN 2: Ship/No-Ship Decision -->
    <g id="col2">
      <!-- Header -->
      <text x="450" y="125" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.3">Ship/No-Ship Decision</text>

      <!-- Skill 1: Stress Test (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="390" y="145" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="450" y="171" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Stress</text>
        <text x="450" y="184" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Test</text>
      </g>

      <!-- Arrow -->
      <path d="M 450 193 L 450 218" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="450,224 447,219 453,219" fill="#CCCCCC"/>

      <!-- Skill 2: Failure Modes (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="390" y="228" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="450" y="254" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Failure</text>
        <text x="450" y="267" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Modes</text>
      </g>

      <!-- Arrow -->
      <path d="M 450 276 L 450 301" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="450,307 447,302 453,302" fill="#CCCCCC"/>

      <!-- Skill 3: Eval-Driven Dev (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="390" y="311" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="450" y="335" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Eval-Driven</text>
        <text x="450" y="348" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Dev</text>
      </g>

      <!-- Arrow -->
      <path d="M 450 359 L 450 384" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="450,390 447,385 453,385" fill="#CCCCCC"/>

      <!-- Skill 4: Trust Ladder (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="390" y="394" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="450" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Trust</text>
        <text x="450" y="431" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Ladder</text>
      </g>

      <!-- Arrow -->
      <path d="M 450 442 L 450 467" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="450,473 447,468 453,468" fill="#CCCCCC"/>

      <!-- Output: Ship Decision (Moss) -->
      <g filter="url(#softShadow)">
        <rect x="375" y="477" width="150" height="56" rx="8" fill="#6BA08A" opacity="0.9"/>
        <text x="450" y="508" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Ship Decision</text>
      </g>

      <!-- Result Caption -->
      <text x="450" y="555" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#6A6A6A" text-anchor="middle">A decision backed</text>
      <text x="450" y="570" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#6A6A6A" text-anchor="middle">by evidence</text>
    </g>

    <!-- COLUMN 3: Designing an Agent -->
    <g id="col3">
      <!-- Header -->
      <text x="750" y="125" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.3">Designing an Agent</text>

      <!-- Skill 1: First Principles (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="690" y="145" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="750" y="171" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">First</text>
        <text x="750" y="184" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Principles</text>
      </g>

      <!-- Arrow -->
      <path d="M 750 193 L 750 218" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="750,224 747,219 753,219" fill="#CCCCCC"/>

      <!-- Skill 2: Alignment Check (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="690" y="228" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="750" y="254" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Alignment</text>
        <text x="750" y="267" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Check</text>
      </g>

      <!-- Arrow -->
      <path d="M 750 276 L 750 301" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="750,307 747,302 753,302" fill="#CCCCCC"/>

      <!-- Skill 3: Autonomy Spectrum (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="690" y="311" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="750" y="335" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Autonomy</text>
        <text x="750" y="348" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Spectrum</text>
      </g>

      <!-- Arrow -->
      <path d="M 750 359 L 750 384" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="750,390 747,385 753,385" fill="#CCCCCC"/>

      <!-- Skill 4: Agent Risk (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="690" y="394" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="750" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Agent</text>
        <text x="750" y="431" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Risk</text>
      </g>

      <!-- Arrow -->
      <path d="M 750 442 L 750 467" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="750,473 747,468 753,468" fill="#CCCCCC"/>

      <!-- Output: Agent Spec (Moss) -->
      <g filter="url(#softShadow)">
        <rect x="675" y="477" width="150" height="56" rx="8" fill="#6BA08A" opacity="0.9"/>
        <text x="750" y="508" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Agent Spec</text>
      </g>

      <!-- Result Caption -->
      <text x="750" y="555" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#6A6A6A" text-anchor="middle">An agent spec with</text>
      <text x="750" y="570" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#6A6A6A" text-anchor="middle">safety built in</text>
    </g>

    <!-- COLUMN 4: Cost Modeling -->
    <g id="col4">
      <!-- Header -->
      <text x="1050" y="125" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.3">Cost Modeling</text>

      <!-- Skill 1: Red Team (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="990" y="145" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="1050" y="178" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Red Team</text>
      </g>

      <!-- Arrow -->
      <path d="M 1050 193 L 1050 218" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="1050,224 1047,219 1053,219" fill="#CCCCCC"/>

      <!-- Skill 2: Determinism Compass (Purple) -->
      <g filter="url(#softShadow)">
        <rect x="990" y="228" width="120" height="48" rx="24" fill="#9478B8" opacity="0.9"/>
        <text x="1050" y="254" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Determinism</text>
        <text x="1050" y="267" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Compass</text>
      </g>

      <!-- Arrow -->
      <path d="M 1050 276 L 1050 301" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="1050,307 1047,302 1053,302" fill="#CCCCCC"/>

      <!-- Skill 3: Token Economics (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="990" y="311" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="1050" y="335" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Token</text>
        <text x="1050" y="348" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Economics</text>
      </g>

      <!-- Arrow -->
      <path d="M 1050 359 L 1050 384" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="1050,390 1047,385 1053,385" fill="#CCCCCC"/>

      <!-- Skill 4: Build-or-Buy (Blue) -->
      <g filter="url(#softShadow)">
        <rect x="990" y="394" width="120" height="48" rx="24" fill="#5B92B8" opacity="0.9"/>
        <text x="1050" y="418" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Build</text>
        <text x="1050" y="431" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">or Buy</text>
      </g>

      <!-- Arrow -->
      <path d="M 1050 442 L 1050 467" stroke="#CCCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <polygon points="1050,473 1047,468 1053,468" fill="#CCCCCC"/>

      <!-- Output: Cost Model (Moss) -->
      <g filter="url(#softShadow)">
        <rect x="975" y="477" width="150" height="56" rx="8" fill="#6BA08A" opacity="0.9"/>
        <text x="1050" y="508" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Cost Model</text>
      </g>

      <!-- Result Caption -->
      <text x="1050" y="555" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#6A6A6A" text-anchor="middle">A cost model that</text>
      <text x="1050" y="570" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#6A6A6A" text-anchor="middle">survives scrutiny</text>
    </g>

  </g>

  <!-- Legend at bottom -->
  <g id="legend">
    <!-- Legend line separator -->
    <line x1="60" y1="615" x2="1140" y2="615" stroke="#E0DCDA" stroke-width="0.5"/>

    <!-- Legend items -->
    <g>
      <!-- Thinking -->
      <rect x="80" y="635" width="12" height="12" rx="6" fill="#9478B8"/>
      <text x="100" y="644" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#8A8A8A" text-anchor="start">Thinking</text>

      <!-- Judgment -->
      <rect x="280" y="635" width="12" height="12" rx="6" fill="#5B92B8"/>
      <text x="300" y="644" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#8A8A8A" text-anchor="start">Judgment</text>

      <!-- Craft -->
      <rect x="480" y="635" width="12" height="12" rx="6" fill="#6BA08A"/>
      <text x="500" y="644" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#8A8A8A" text-anchor="start">Craft</text>

      <!-- Principle -->
      <text x="650" y="644" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#8A8A8A" text-anchor="middle">Every chain: Purple (thinking) → Blue (judgment) → Green (craft) = Trustworthy output</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="600" y="780" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#8A8A8A" text-anchor="middle">Import Chain · Dependency Graph · April 2026</text>
</svg>
