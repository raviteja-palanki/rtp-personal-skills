  <rect x="72" y="290" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="167" y="320" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#0F766E">strategy-canvas</text>

  <!-- Skill 2: safety-by-design -->
  <rect x="282" y="290" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="377" y="320" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#0F766E">safety-by-design</text>

  <!-- Skill 3: autonomy-spectrum -->
  <rect x="492" y="290" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="587" y="320" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#0F766E">autonomy-spectrum</text>

  <!-- Skill 4: eval-framework -->
  <rect x="702" y="290" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="797" y="320" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#0F766E">eval-framework</text>

  <!-- Skill 5: token-economics -->
  <rect x="912" y="290" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1007" y="320" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#0F766E">token-economics</text>

  <!-- ════════════ ARROWS: TIER 2 → TIER 3 ════════════ -->
  <line x1="167" y1="360" x2="167" y2="394" stroke="#14B8A6" stroke-width="2"/>
  <polygon points="161,394 167,404 173,394" fill="#14B8A6"/>
  <line x1="377" y1="360" x2="377" y2="394" stroke="#14B8A6" stroke-width="2"/>
  <polygon points="371,394 377,404 383,394" fill="#14B8A6"/>
  <line x1="587" y1="360" x2="587" y2="394" stroke="#14B8A6" stroke-width="2"/>
  <polygon points="581,394 587,404 593,394" fill="#14B8A6"/>
  <line x1="797" y1="360" x2="797" y2="394" stroke="#14B8A6" stroke-width="2"/>
  <polygon points="791,394 797,404 803,394" fill="#14B8A6"/>
  <line x1="1007" y1="360" x2="1007" y2="394" stroke="#14B8A6" stroke-width="2"/>
  <polygon points="1001,394 1007,404 1013,394" fill="#14B8A6"/>
  <!-- Arrow label -->
  <text x="600" y="387" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#14B8A6">validated output feeds</text>

  <!-- ════════════ TIER 3: CRAFT GENERATORS ════════════ -->
  <!-- Zone shadow -->
  <rect x="52" y="403" width="1100" height="110" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <!-- Zone -->
  <rect x="50" y="400" width="1100" height="110" rx="14" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <!-- Label -->
  <text x="70" y="425" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#B45309">LAYER 3: CRAFT</text>

  <!-- Skill 1: ai-prd -->
  <rect x="112" y="440" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="212" y="470" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#B45309">ai-prd</text>

  <!-- Skill 2: agent-spec -->
  <rect x="342" y="440" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="442" y="470" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#B45309">agent-spec</text>

  <!-- Skill 3: cost-model -->
  <rect x="572" y="440" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="672" y="470" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#B45309">cost-model</text>

  <!-- Skill 4: ship-decision -->
  <rect x="802" y="440" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="902" y="470" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#B45309">ship-decision</text>

  <!-- ════════════ ARROWS: TIER 3 → FINAL OUTPUT ════════════ -->
  <line x1="212" y1="490" x2="485" y2="550" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="480,545 490,555 485,543" fill="#F59E0B"/>
  <line x1="442" y1="490" x2="535" y2="550" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="530,545 540,555 535,543" fill="#F59E0B"/>
  <line x1="672" y1="490" x2="665" y2="550" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="659,545 670,555 665,543" fill="#F59E0B"/>
  <line x1="902" y1="490" x2="715" y2="550" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="710,545 720,555 715,543" fill="#F59E0B"/>

  <!-- ════════════ FINAL OUTPUT BOX ════════════ -->
  <!-- Shadow fallback -->
  <rect x="402" y="558" width="400" height="70" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <!-- Main box -->
  <rect x="400" y="555" width="400" height="70" rx="14" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
  <text x="600" y="585" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#B45309">Ship-Ready Deliverable</text>
  <text x="600" y="608" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">Pre-tested by all three layers</text>

  <!-- ════════════ CALLOUT: WITHOUT vs WITH ════════════ -->
  <!-- LEFT panel (without) -->
  <rect x="120" y="640" width="480" height="40" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="360" y="665" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#991B1B">Without: "We should leverage AI to enhance productivity."</text>

  <!-- RIGHT panel (with) -->
  <rect x="620" y="640" width="480" height="40" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="860" y="665" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#065F46">With: A spec engineering can ship from on Monday.</text>

  <!-- ════════════ FOOTER ════════════ -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#9CA3AF">Import Chain · 3 Layers · Every Output Pre-Tested · April 2026</text>
</svg>