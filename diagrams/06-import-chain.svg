  <line x1="167" y1="210" x2="167" y2="244" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="161,244 167,254 173,244" fill="#8B5CF6"/>
  <line x1="377" y1="210" x2="377" y2="244" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="371,244 377,254 383,244" fill="#8B5CF6"/>
  <line x1="587" y1="210" x2="587" y2="244" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="581,244 587,254 593,244" fill="#8B5CF6"/>
  <line x1="797" y1="210" x2="797" y2="244" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="791,244 797,254 803,244" fill="#8B5CF6"/>
  <line x1="1007" y1="210" x2="1007" y2="244" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="1001,244 1007,254 1013,244" fill="#8B5CF6"/>
  <!-- Arrow label -->
  <text x="600" y="237" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6">imports feed</text>

