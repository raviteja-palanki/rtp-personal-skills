<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" width="1200" height="880">
  <rect width="1200" height="880" fill="#FAFAF8"/>

  <!-- HEADER -->
  <text x="600" y="32" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#1B1B1F">The Import Chain in Action</text>
  <text x="600" y="54" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#5F6B7A">A real request. Watch what fires, what gets caught, and what actually ships.</text>

  <!-- ═══════════ THE REQUEST ═══════════ -->
  <rect x="150" y="74" width="900" height="55" rx="14" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="600" y="100" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="600" font-style="italic" fill="#1B1B1F">"We need AI to predict equipment failures on our plant floor."</text>
  <text x="160" y="118" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9CA3AF">What the stakeholder asked for</text>

  <!-- Arrow down -->
  <line x1="600" y1="129" x2="600" y2="148" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="594,146 600,156 606,146" fill="#9CA3AF"/>

  <!-- ═══════════ LAYER 1: THINKING CATCHES PROBLEMS ═══════════ -->
  <rect x="60" y="160" width="1080" height="168" rx="16" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="80" y="183" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#6D28D9">THINKING SKILLS CATCH WHAT NOBODY ASKED ABOUT</text>

  <!-- Card 1: first-principles -->
  <rect x="80" y="196" width="240" height="116" rx="10" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1"/>
  <rect x="80" y="196" width="240" height="26" rx="10" fill="#EDE9FE"/>
  <rect x="80" y="212" width="240" height="10" fill="#EDE9FE"/>
  <text x="200" y="214" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#6D28D9">first-principles</text>
  <text x="90" y="240" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">What's the atomic operation?</text>
  <line x1="90" y1="250" x2="310" y2="250" stroke="#EDE9FE" stroke-width="1"/>
  <text x="90" y="268" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#991B1B">Prediction = classification.</text>
  <text x="90" y="282" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#991B1B">Needs labeled failure events.</text>
  <text x="90" y="296" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">Failures are rare. Labels don't exist.</text>

  <!-- Card 2: bias-spotter -->
  <rect x="340" y="196" width="240" height="116" rx="10" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1"/>
  <rect x="340" y="196" width="240" height="26" rx="10" fill="#EDE9FE"/>
  <rect x="340" y="212" width="240" height="10" fill="#EDE9FE"/>
  <text x="460" y="214" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#6D28D9">bias-spotter</text>
  <text x="350" y="240" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">Are you seeing what you want?</text>
  <line x1="350" y1="250" x2="570" y2="250" stroke="#EDE9FE" stroke-width="1"/>
  <text x="350" y="268" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#991B1B">"Prediction" chosen because</text>
  <text x="350" y="282" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#991B1B">it sells well to leadership.</text>
  <text x="350" y="296" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">Real need: fewer surprise stops.</text>

  <!-- Card 3: falsification -->
  <rect x="600" y="196" width="240" height="116" rx="10" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1"/>
  <rect x="600" y="196" width="240" height="26" rx="10" fill="#EDE9FE"/>
  <rect x="600" y="212" width="240" height="10" fill="#EDE9FE"/>
  <text x="720" y="214" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#6D28D9">falsification</text>
  <text x="610" y="240" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">What makes this wrong?</text>
  <line x1="610" y1="250" x2="830" y2="250" stroke="#EDE9FE" stroke-width="1"/>
  <text x="610" y="268" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#991B1B">Black-box predictions fail if</text>
  <text x="610" y="282" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#991B1B">operators don't trust the output.</text>
  <text x="610" y="296" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">Plant ops ignores what it can't verify.</text>

  <!-- Card 4: problem-type -->
  <rect x="860" y="196" width="240" height="116" rx="10" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1"/>
  <rect x="860" y="196" width="240" height="26" rx="10" fill="#EDE9FE"/>
  <rect x="860" y="212" width="240" height="10" fill="#EDE9FE"/>
  <text x="980" y="214" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#6D28D9">problem-type</text>
  <text x="870" y="240" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#5F6B7A">What type of problem, really?</text>
  <line x1="870" y1="250" x2="1090" y2="250" stroke="#EDE9FE" stroke-width="1"/>
  <text x="870" y="268" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">Not a prediction problem.</text>
  <text x="870" y="282" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">It's anomaly detection +</text>
  <text x="870" y="296" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6D28D9">escalation with current data.</text>

  <!-- ═══════════ PIVOT CALLOUT ═══════════ -->
  <line x1="600" y1="328" x2="600" y2="345" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="594,343 600,353 606,343" fill="#9CA3AF"/>
  <rect x="250" y="355" width="700" height="36" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="600" y="378" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#991B1B">PIVOT: "ML prediction" reframed to "explainable anomaly detection + operator escalation"</text>

  <!-- Arrow down -->
  <line x1="600" y1="391" x2="600" y2="410" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="594,408 600,418 606,408" fill="#9CA3AF"/>

  <!-- ═══════════ LAYER 2: JUDGMENT SHAPES THE APPROACH ═══════════ -->
  <rect x="60" y="420" width="1080" height="138" rx="16" fill="#F0FDFA" stroke="#5EEAD4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="80" y="443" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#0F766E">JUDGMENT SKILLS SHAPE THE REALISTIC APPROACH</text>

  <!-- Card 1: build-or-buy -->
  <rect x="80" y="456" width="310" height="86" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1"/>
  <rect x="80" y="456" width="310" height="26" rx="10" fill="#CCFBF1"/>
  <rect x="80" y="472" width="310" height="10" fill="#CCFBF1"/>
  <text x="235" y="474" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0F766E">build-or-buy</text>
  <text x="90" y="500" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">Build anomaly rules on existing data.</text>
  <text x="90" y="516" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">Buy the alerting + dashboard layer.</text>

  <!-- Card 2: token-economics -->
  <rect x="410" y="456" width="310" height="86" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1"/>
  <rect x="410" y="456" width="310" height="26" rx="10" fill="#CCFBF1"/>
  <rect x="410" y="472" width="310" height="10" fill="#CCFBF1"/>
  <text x="565" y="474" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0F766E">token-economics</text>
  <text x="420" y="500" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">$0.008/alert at GPT-4o-mini.</text>
  <text x="420" y="516" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">~2,400 alerts/mo = $19.20/mo.</text>

  <!-- Card 3: safety-by-design -->
  <rect x="740" y="456" width="310" height="86" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1"/>
  <rect x="740" y="456" width="310" height="26" rx="10" fill="#CCFBF1"/>
  <rect x="740" y="472" width="310" height="10" fill="#CCFBF1"/>
  <text x="895" y="474" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0F766E">safety-by-design</text>
  <text x="750" y="500" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">Never auto-shutdown equipment.</text>
  <text x="750" y="516" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E">Flag + escalate to operator only.</text>

  <!-- Arrow down -->
  <line x1="600" y1="558" x2="600" y2="578" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="594,576 600,586 606,576" fill="#9CA3AF"/>

  <!-- ═══════════ LAYER 3: CRAFT PRODUCES THE PRD ═══════════ -->
  <rect x="180" y="588" width="840" height="100" rx="16" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2"/>
  <text x="600" y="614" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#B45309">ai-prd generates the ship-ready spec</text>

  <!-- Output chips -->
  <rect x="200" y="628" width="120" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="260" y="647" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">Problem spec</text>

  <rect x="330" y="628" width="130" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="395" y="647" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">Architecture</text>

  <rect x="470" y="628" width="100" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="520" y="647" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">Eval gates</text>

  <rect x="580" y="628" width="130" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="645" y="647" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">Failure budget</text>

  <rect x="720" y="628" width="115" height="28" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="777" y="647" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#B45309">Cost model</text>

  <rect x="845" y="628" width="140" height="28" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="915" y="647" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#991B1B">WHEN WRONG</text>

  <!-- ═══════════ BEFORE / AFTER TRANSFORMATION ═══════════ -->
  <!-- BEFORE -->
  <rect x="62" y="712" width="520" height="80" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="82" y="735" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#991B1B">WITHOUT THE SYSTEM</text>
  <text x="82" y="755" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#5F6B7A">"AI-powered predictive maintenance platform"</text>
  <text x="82" y="775" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#991B1B">Ships. Operators ignore it. No labels. No trust. Shelfware by Q3.</text>

  <!-- AFTER -->
  <rect x="618" y="712" width="520" height="80" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="638" y="735" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#065F46">WITH THE SYSTEM</text>
  <text x="638" y="755" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#065F46">"Explainable anomaly detection + operator escalation"</text>
  <text x="638" y="775" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#5F6B7A">Uses existing sensor data. Operators trust it. $19/mo. Ships in 6 weeks.</text>

  <!-- ═══════════ PUNCHLINE ═══════════ -->
  <rect x="100" y="812" width="1000" height="40" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="600" y="838" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#6D28D9">The hard questions got asked before any spec was written. That's the architecture doing its job.</text>

  <!-- FOOTER -->
  <text x="600" y="872" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#9CA3AF">Worked Example · Import Chain in Action · April 2026</text>
</svg>
