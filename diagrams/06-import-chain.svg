  <rect x="50" y="100" width="1100" height="110" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <!-- Label -->
  <text x="70" y="125" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#6D28D9">LAYER 1: THINKING</text>

  <!-- Skill 1: first-principles -->
  <rect x="72" y="140" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="167" y="170" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#6D28D9">first-principles</text>

  <!-- Skill 2: bias-spotter -->
  <rect x="282" y="140" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="377" y="170" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#6D28D9">bias-spotter</text>

  <!-- Skill 3: falsification -->
  <rect x="492" y="140" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="587" y="170" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#6D28D9">falsification</text>

  <!-- Skill 4: stress-test -->
  <rect x="702" y="140" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="797" y="170" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#6D28D9">stress-test</text>

  <!-- Skill 5: failure-modes -->
  <rect x="912" y="140" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="1007" y="170" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#6D28D9">failure-modes</text>

