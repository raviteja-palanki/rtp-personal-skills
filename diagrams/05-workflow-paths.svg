<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#FAFAF8"/>

  <!-- HEADER BAND -->
  <rect x="0" y="0" width="1200" height="80" fill="#F9FAFB"/>
  <text x="600" y="36" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#1B1B1F">Workflow Paths</text>
  <text x="600" y="60" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#5F6B7A">Quick Check · Six Ways Through the System — Different Situations Activate Different Skill Subsets</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 1, CARD 1 — New AI Feature (Teal)      -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="52" y="103" width="340" height="220" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="50" y="100" width="340" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- Top color bar -->
  <rect x="50" y="100" width="340" height="14" rx="14" fill="#14B8A6"/>
  <rect x="50" y="107" width="340" height="12" fill="#14B8A6"/>
  <rect x="50" y="107" width="340" height="12" fill="#FFFFFF" opacity="0"/>
  <!-- Mask bottom of bar with white to keep only top 5px visible -->
  <rect x="50" y="105" width="340" height="5" rx="14" fill="#14B8A6"/>
  <rect x="50" y="110" width="340" height="10" fill="#FFFFFF"/>
  <!-- Workflow name -->
  <text x="70" y="135" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1B1B1F">New AI Feature</text>
  <!-- Duration -->
  <text x="70" y="155" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">Full cycle, ~2-4 weeks</text>
  <!-- Big number -->
  <text x="70" y="200" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#14B8A6">54</text>
  <!-- Skills label -->
  <text x="70" y="218" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#5F6B7A">skills</text>
  <!-- Thin line -->
  <line x1="70" y1="235" x2="370" y2="235" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Flow path -->
  <text x="70" y="258" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0F766E" letter-spacing="0.5">Discovery → Strategy → Safety → Build → Ship</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 1, CARD 2 — Incident Response (Red)     -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="422" y="103" width="340" height="220" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="420" y="100" width="340" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="420" y="100" width="340" height="5" rx="14" fill="#EF4444"/>
  <rect x="420" y="105" width="340" height="5" fill="#FFFFFF"/>
  <rect x="420" y="100" width="340" height="5" rx="14" fill="#EF4444"/>
  <text x="440" y="135" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1B1B1F">Incident Response</text>
  <text x="440" y="155" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">Hours to resolution</text>
  <text x="440" y="200" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#EF4444">25</text>
  <text x="440" y="218" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#5F6B7A">skills</text>
  <line x1="440" y1="235" x2="740" y2="235" stroke="#E5E7EB" stroke-width="1"/>
  <text x="440" y="258" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#991B1B" letter-spacing="0.5">Failure analysis → Safety audit → Decision → Recovery</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 1, CARD 3 — Strategic Review (Amber)    -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="792" y="103" width="340" height="220" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="790" y="100" width="340" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="790" y="100" width="340" height="5" rx="14" fill="#F59E0B"/>
  <rect x="790" y="105" width="340" height="5" fill="#FFFFFF"/>
  <rect x="790" y="100" width="340" height="5" rx="14" fill="#F59E0B"/>
  <text x="810" y="135" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1B1B1F">Strategic Review</text>
  <text x="810" y="155" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">1-2 days of depth</text>
  <text x="810" y="200" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#F59E0B">15</text>
  <text x="810" y="218" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#5F6B7A">skills</text>
  <line x1="810" y1="235" x2="1110" y2="235" stroke="#E5E7EB" stroke-width="1"/>
  <text x="810" y="258" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#B45309" letter-spacing="0.5">Portfolio review → Capability scan → Roadmap</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 2, CARD 4 — Technical Architecture (Purple) -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="52" y="353" width="340" height="220" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="50" y="350" width="340" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="50" y="350" width="340" height="5" rx="14" fill="#8B5CF6"/>
  <rect x="50" y="355" width="340" height="5" fill="#FFFFFF"/>
  <rect x="50" y="350" width="340" height="5" rx="14" fill="#8B5CF6"/>
  <text x="70" y="385" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1B1B1F">Technical Architecture</text>
  <text x="70" y="405" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">1 week of spec-and-build</text>
  <text x="70" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#8B5CF6">20</text>
  <text x="70" y="468" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#5F6B7A">skills</text>
  <line x1="70" y1="485" x2="370" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <text x="70" y="508" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#6D28D9" letter-spacing="0.5">First principles → Build-or-buy → Cost model → Spec</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 2, CARD 5 — Product Launch (Green)      -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="422" y="353" width="340" height="220" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="420" y="350" width="340" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="420" y="350" width="340" height="5" rx="14" fill="#16A34A"/>
  <rect x="420" y="355" width="340" height="5" fill="#FFFFFF"/>
  <rect x="420" y="350" width="340" height="5" rx="14" fill="#16A34A"/>
  <text x="440" y="385" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1B1B1F">Product Launch</text>
  <text x="440" y="405" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">1-2 weeks of execution</text>
  <text x="440" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#16A34A">18</text>
  <text x="440" y="468" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#5F6B7A">skills</text>
  <line x1="440" y1="485" x2="740" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <text x="440" y="508" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#065F46" letter-spacing="0.5">Fit signal → Adoption plan → Alignment → Ship</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 2, CARD 6 — Safety Audit (Pink)         -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="792" y="353" width="340" height="220" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="790" y="350" width="340" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="790" y="350" width="340" height="5" rx="14" fill="#EC4899"/>
  <rect x="790" y="355" width="340" height="5" fill="#FFFFFF"/>
  <rect x="790" y="350" width="340" height="5" rx="14" fill="#EC4899"/>
  <text x="810" y="385" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1B1B1F">Safety Audit</text>
  <text x="810" y="405" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">2-3 days of rigor</text>
  <text x="810" y="450" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#EC4899">12</text>
  <text x="810" y="468" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#5F6B7A">skills</text>
  <line x1="810" y1="485" x2="1110" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <text x="810" y="508" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#9D174D" letter-spacing="0.5">Trust ladder → Harm taxonomy → Red team → Ready</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CALLOUT BOX                                 -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="50" y="600" width="1100" height="50" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="600" y="630" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#6D28D9">The orchestrator also composes custom paths on the fly — matching skill subsets to any context.</text>

  <!-- FOOTER -->
  <text x="600" y="680" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#9CA3AF">6 Workflow Templates · 54 AI PM + 12 General Skills · April 2026</text>
</svg>