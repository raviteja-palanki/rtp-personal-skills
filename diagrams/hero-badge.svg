<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="#FAFAF8" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Rainbow accent bar at top -->
  <rect width="240" height="6" rx="0" fill="#8B5CF6"/>
  <rect x="240" width="240" height="6" fill="#14B8A6"/>
  <rect x="480" width="240" height="6" fill="#06B6D4"/>
  <rect x="720" width="240" height="6" fill="#F59E0B"/>
  <rect x="960" width="240" height="6" fill="#EC4899"/>
  <!-- Round just the top-left and top-right corners -->
  <rect width="1200" height="6" rx="16" fill="transparent"/>
  <rect width="16" height="6" fill="#FAFAF8"/>
  <rect x="0" y="0" width="20" height="6" rx="16" fill="#8B5CF6"/>
  <rect x="1180" y="0" width="20" height="6" rx="16" fill="#EC4899"/>

  <!-- ═══════════════ LEFT SIDE (x=50 to x=540) ═══════════════ -->

  <!-- Author line -->
  <text x="50" y="50" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#8B5CF6" letter-spacing="2">RAVI TEJA PALANKI</text>

  <!-- Title -->
  <text x="50" y="100" font-family="Inter, Segoe UI, sans-serif" font-size="38" font-weight="800" fill="#1B1B1F">rtp-personal-skills</text>

  <!-- Tagline -->
  <text x="50" y="130" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#5F6B7A">66 skills. 3 layers. One compounding system.</text>

  <!-- Thin line separator -->
  <line x1="50" y1="148" x2="480" y2="148" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ═══════════════ Layer Badges Row (y=165) ═══════════════ -->

  <!-- THINK badge -->
  <rect x="50" y="165" width="120" height="70" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="50" y="165" width="120" height="24" rx="10" fill="#8B5CF6"/>
  <!-- Clip the bottom corners of the header bar -->
  <rect x="50" y="175" width="120" height="14" fill="#8B5CF6"/>
  <text x="110" y="182" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">THINK</text>
  <text x="110" y="216" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="400" fill="#5F6B7A" text-anchor="middle">Catch errors</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="200" x2="200" y2="200" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="200,196 210,200 200,204" fill="#9CA3AF"/>

  <!-- JUDGE badge -->
  <rect x="210" y="165" width="120" height="70" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="210" y="165" width="120" height="24" rx="10" fill="#14B8A6"/>
  <rect x="210" y="175" width="120" height="14" fill="#14B8A6"/>
  <text x="270" y="182" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">JUDGE</text>
  <text x="270" y="216" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="400" fill="#5F6B7A" text-anchor="middle">Make calls</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="200" x2="360" y2="200" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="360,196 370,200 360,204" fill="#9CA3AF"/>

  <!-- SHIP badge -->
  <rect x="370" y="165" width="120" height="70" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="370" y="165" width="120" height="24" rx="10" fill="#F59E0B"/>
  <rect x="370" y="175" width="120" height="14" fill="#F59E0B"/>
  <text x="430" y="182" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">SHIP</text>
  <text x="430" y="216" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="400" fill="#5F6B7A" text-anchor="middle">Deliver work</text>

  <!-- Footer -->
  <text x="50" y="270" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF">Built with Claude  ·  April 2026</text>

  <!-- ═══════════════ RIGHT SIDE (x=560 to x=1150) ═══════════════ -->

  <!-- White card panel with shadow fallback -->
  <rect x="562" y="33" width="590" height="240" rx="14" fill="#E5E7EB" opacity="0.3"/>
  <rect x="560" y="30" width="590" height="240" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- THE ARCHITECTURE label -->
  <text x="855" y="70" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#9CA3AF" letter-spacing="2" text-anchor="middle">THE ARCHITECTURE</text>

  <!-- Stat 1: 66 SKILLS (centered in first third: x=560 to x=757 → center=658) -->
  <text x="658" y="130" font-family="Inter, Segoe UI, sans-serif" font-size="42" font-weight="800" fill="#8B5CF6" text-anchor="middle">66</text>
  <text x="658" y="150" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1B1B1F" letter-spacing="1" text-anchor="middle">SKILLS</text>
  <text x="658" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="400" fill="#5F6B7A" text-anchor="middle">Think + Judge + Ship</text>

  <!-- Vertical divider 1 -->
  <line x1="757" y1="92" x2="757" y2="178" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Stat 2: 3 LAYERS (centered in second third: x=757 to x=953 → center=855) -->
  <text x="855" y="130" font-family="Inter, Segoe UI, sans-serif" font-size="42" font-weight="800" fill="#14B8A6" text-anchor="middle">3</text>
  <text x="855" y="150" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1B1B1F" letter-spacing="1" text-anchor="middle">LAYERS</text>
  <text x="855" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="400" fill="#5F6B7A" text-anchor="middle">Each checks the next</text>

  <!-- Vertical divider 2 -->
  <line x1="953" y1="92" x2="953" y2="178" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Stat 3: 1 SYSTEM (centered in third third: x=953 to x=1150 → center=1052) -->
  <text x="1052" y="130" font-family="Inter, Segoe UI, sans-serif" font-size="42" font-weight="800" fill="#F59E0B" text-anchor="middle">1</text>
  <text x="1052" y="150" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1B1B1F" letter-spacing="1" text-anchor="middle">SYSTEM</text>
  <text x="1052" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="400" fill="#5F6B7A" text-anchor="middle">Built to compound</text>

  <!-- Horizontal line separator below stats -->
  <line x1="596" y1="190" x2="1114" y2="190" stroke="#E5E7EB" stroke-width="1"/>

  <!-- HOW IT WORKS label -->
  <text x="855" y="216" font-family="Inter, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2" text-anchor="middle">HOW IT WORKS</text>

  <!-- Body text -->
  <text x="855" y="240" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="400" fill="#5F6B7A" text-anchor="middle">Each layer earns the right to exist by making the next layer's</text>
  <text x="855" y="258" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="400" fill="#5F6B7A" text-anchor="middle">output trustworthy. Every output is pre-tested before shipping.</text>

</svg>
