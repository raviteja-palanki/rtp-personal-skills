    <text x="335" y="638" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Produces:</text>
    <text x="335" y="656" font-family="Inter, sans-serif" font-size="12" fill="#2D3D37" letter-spacing="-0.3">Production prompts with structure and tests</text>

    <text x="335" y="685" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Imports from:</text>

