<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" width="1200" height="1100" role="img" aria-label="10 craft skills that produce ship-ready artifacts already pre-tested by upstream layers.">
  <title>Craft Layer</title>
  <desc>The final layer: PRDs, agent specs, cost models, ship decisions, competitive maps, prompt specs, and stakeholder communications — every artifact arrives with its own thinking and judgment baked in.</desc>
  <defs>
    <!-- Gradients -->
    <linearGradient id="mossGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7AB89D" stop-opacity="1" />
      <stop offset="100%" stop-color="#5F9B84" stop-opacity="1" />
    </linearGradient>

    <linearGradient id="mossLightBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F9F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#EFF5F0" stop-opacity="1" />
    </linearGradient>

    <linearGradient id="purpleChip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8DFF7" stop-opacity="1" />
      <stop offset="100%" stop-color="#DCC8F0" stop-opacity="1" />
    </linearGradient>

    <linearGradient id="blueChip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9E9F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5DDF0" stop-opacity="1" />
    </linearGradient>

    <!-- Shadows -->
    <filter id="cardShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.08" />
    </filter>

    <filter id="headerShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1100" fill="#FAFAF8"/>

  <!-- Title Band -->
  <rect x="0" y="0" width="1200" height="85" fill="url(#mossGradient)" filter="url(#headerShadow)"/>
  <text x="40" y="38" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="-0.5">
    Layer 3: Craft
  </text>
  <text x="40" y="64" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.92" letter-spacing="0.3">
    Ship-Ready Artifacts  ·  10 generators, each pre-tested by Layers 1 + 2
  </text>

  <!-- Grid Container for 2x4 Cards -->
  <!-- ROW 1: Cards 1-4 -->

  <!-- Card 1: ai-prd -->
  <g>
