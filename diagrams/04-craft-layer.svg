    <text x="915" y="168" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Produces:</text>
    <text x="915" y="186" font-family="Inter, sans-serif" font-size="12" fill="#2D3D37" letter-spacing="-0.3">Token cost at scale + path to profitability</text>

    <text x="915" y="215" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Imports from:</text>

