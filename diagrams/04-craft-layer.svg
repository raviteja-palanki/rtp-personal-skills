    <rect x="25" y="105" width="270" height="210" rx="12" fill="white" filter="url(#cardShadow)"/>

    <!-- Header bar -->
    <rect x="25" y="105" width="270" height="48" rx="12" fill="url(#mossGradient)"/>
    <text x="45" y="137" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="white">ai-prd</text>

    <!-- Produces section -->
    <text x="45" y="168" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Produces:</text>
    <text x="45" y="186" font-family="Inter, sans-serif" font-size="12" fill="#2D3D37" letter-spacing="-0.3">PRD with eval gates, failure budgets, probabilistic specs</text>

    <!-- Imports section -->
    <text x="45" y="215" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Imports from:</text>

    <!-- Purple chips (Layer 1) -->
    <rect x="45" y="228" width="105" height="22" rx="5" fill="url(#purpleChip)" stroke="#C9B8E0" stroke-width="1"/>
    <text x="54" y="242" font-family="Inter, sans-serif" font-size="10" fill="#6B5B95">first-principles</text>

    <rect x="160" y="228" width="105" height="22" rx="5" fill="url(#purpleChip)" stroke="#C9B8E0" stroke-width="1"/>
    <text x="169" y="242" font-family="Inter, sans-serif" font-size="10" fill="#6B5B95">bias-spotter</text>

    <!-- Blue chips (Layer 2) -->
    <rect x="45" y="256" width="105" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="54" y="270" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">build-or-buy</text>

    <rect x="160" y="256" width="105" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="169" y="270" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">token-economics</text>
  </g>

