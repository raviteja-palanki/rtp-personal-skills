    <rect x="450" y="698" width="105" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="459" y="712" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">eval-framework</text>

    <rect x="335" y="726" width="220" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
