    <text x="625" y="656" font-family="Inter, sans-serif" font-size="12" fill="#2D3D37" letter-spacing="-0.3">Audience-tailored exec, eng, and legal briefs</text>

    <text x="625" y="685" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Imports from:</text>

    <rect x="625" y="698" width="105" height="22" rx="5" fill="url(#purpleChip)" stroke="#C9B8E0" stroke-width="1"/>
    <text x="634" y="712" font-family="Inter, sans-serif" font-size="10" fill="#6B5B95">dual-lens</text>

    <rect x="740" y="698" width="105" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="749" y="712" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">trust-ladder</text>

    <rect x="625" y="726" width="220" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="634" y="740" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">purpose-dialogue</text>
