    <rect x="1030" y="463" width="105" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="1039" y="477" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">eval-design</text>
  </g>

  <!-- ROW 3: Cards 9-10 (centered) -->

