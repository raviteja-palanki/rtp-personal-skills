    <rect x="335" y="491" width="220" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="344" y="505" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">competitive-moat</text>
  </g>

  <!-- Card 7: fit-signal -->
