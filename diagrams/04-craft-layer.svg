    <rect x="605" y="340" width="270" height="210" rx="12" fill="white" filter="url(#cardShadow)"/>
    <rect x="605" y="340" width="270" height="48" rx="12" fill="url(#mossGradient)" />
    <text x="625" y="372" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="white">fit-signal</text>

    <text x="625" y="403" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Produces:</text>
    <text x="625" y="421" font-family="Inter, sans-serif" font-size="12" fill="#2D3D37" letter-spacing="-0.3">PMF diagnosis for probabilistic products</text>

    <text x="625" y="450" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5F9B84">Imports from:</text>

    <rect x="625" y="463" width="105" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="634" y="477" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">ai-product-metrics</text>

    <rect x="740" y="463" width="105" height="22" rx="5" fill="url(#blueChip)" stroke="#A8CBDF" stroke-width="1"/>
    <text x="749" y="477" font-family="Inter, sans-serif" font-size="10" fill="#3B5A7A">adoption-launch</text>

    <rect x="625" y="491" width="220" height="22" rx="5" fill="url(#purpleChip)" stroke="#C9B8E0" stroke-width="1"/>
    <text x="634" y="505" font-family="Inter, sans-serif" font-size="10" fill="#6B5B95">stress-test</text>
