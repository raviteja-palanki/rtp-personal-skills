  <!-- Core Story Callout -->
  <rect x="35" y="820" width="1130" height="110" rx="10" fill="url(#mossLightBg)" stroke="#6BA08A" stroke-width="2"/>

  <text x="55" y="848" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5F9B84">The Architecture Story</text>

  <text x="55" y="872" font-family="Inter, sans-serif" font-size="12" fill="#2D3D37" letter-spacing="-0.2">
    <tspan x="55" dy="0">None of these skills start by asking "what do you need?" They start by running Layers 1 and 2 first.</tspan>
    <tspan x="55" dy="16">Every output arrives pre-tested: first-principles decomposed, bias checked, risk-mapped, evaluated. Not bolted on. Built in.</tspan>
  </text>

  <!-- Footer -->
  <text x="40" y="970" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#9A8A7A" letter-spacing="0.5">Layer 3 Craft  ·  10 Generators  ·  April 2026</text>
  <text x="1120" y="970" font-family="Inter, sans-serif" font-size="11" fill="#9A8A7A" text-anchor="end" letter-spacing="0.5">Luminous Pastel · Moss #6BA08A</text>
</svg>